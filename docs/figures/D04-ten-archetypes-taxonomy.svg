<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" font-family="Helvetica, Arial, sans-serif">
  <!-- AIMS D04 - The Ten Archetypes Taxonomy: Mode x Layer Grid -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->

  <defs>
    <marker id="arrow_d4" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="black"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="270" y="285" font-size="18" font-weight="bold">D04</text>
  <text x="270" y="310" font-size="13" font-style="italic">The Ten Archetypes Taxonomy - Functional Mode x Operational Layer</text>
  <text x="270" y="332" font-size="10">Source: AIMS Implementation Architecture §1.2; AIMS specification §3.16 (Archetype Derivation)</text>

  <!-- Column headers (modes) -->
  <text x="370" y="365" font-size="11" font-weight="bold" text-anchor="middle">M-GENERATIVE</text>
  <text x="370" y="378" font-size="9" text-anchor="middle" font-style="italic">"yes"</text>
  <text x="370" y="389" font-size="9" text-anchor="middle" font-style="italic">exploration</text>

  <text x="500" y="365" font-size="11" font-weight="bold" text-anchor="middle">M-CONSTRAINING</text>
  <text x="500" y="378" font-size="9" text-anchor="middle" font-style="italic">"no"</text>
  <text x="500" y="389" font-size="9" text-anchor="middle" font-style="italic">boundary enforcement</text>

  <text x="630" y="365" font-size="11" font-weight="bold" text-anchor="middle">M-INTEGRATIVE</text>
  <text x="630" y="378" font-size="9" text-anchor="middle" font-style="italic">"it depends"</text>
  <text x="630" y="389" font-size="9" text-anchor="middle" font-style="italic">synthesis</text>

  <!-- L-INTENT row (only Sovereign at this layer; mode N/A) -->
  <text x="300" y="425" font-size="12" font-weight="bold" text-anchor="end">L-INTENT</text>
  <text x="300" y="441" font-size="9" font-style="italic" text-anchor="end">why / who</text>

  <rect x="370" y="400" width="260" height="62" fill="none" stroke="black" stroke-width="2"/>
  <text x="500" y="420" font-size="11" font-weight="bold" text-anchor="middle">SOVEREIGN</text>
  <text x="500" y="435" font-size="9" text-anchor="middle">System Intent (Source)</text>
  <text x="500" y="447" font-size="9" text-anchor="middle">mode: N/A (source)</text>
  <text x="500" y="459" font-size="9" text-anchor="middle" font-style="italic">shadow: SCHISM</text>

  <!-- L-PLAN row -->
  <text x="300" y="500" font-size="12" font-weight="bold" text-anchor="end">L-PLAN</text>
  <text x="300" y="515" font-size="9" font-style="italic" text-anchor="end">what / when</text>

  <rect x="305" y="476" width="130" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="370" y="495" font-size="11" font-weight="bold" text-anchor="middle">VISIONARY</text>
  <text x="370" y="510" font-size="9" text-anchor="middle">Research</text>
  <text x="370" y="522" font-size="9" text-anchor="middle">Discovery</text>
  <text x="370" y="534" font-size="9" text-anchor="middle" font-style="italic">shadow: CHAOS</text>

  <rect x="435" y="476" width="130" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="500" y="495" font-size="11" font-weight="bold" text-anchor="middle">ARCHITECT</text>
  <text x="500" y="510" font-size="9" text-anchor="middle">Analysis</text>
  <text x="500" y="522" font-size="9" text-anchor="middle">Structure</text>
  <text x="500" y="534" font-size="9" text-anchor="middle" font-style="italic">shadow: OBSCURITY</text>

  <!-- L-FORM row -->
  <text x="300" y="580" font-size="12" font-weight="bold" text-anchor="end">L-FORM</text>
  <text x="300" y="595" font-size="9" font-style="italic" text-anchor="end">how</text>

  <rect x="305" y="556" width="130" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="370" y="575" font-size="11" font-weight="bold" text-anchor="middle">PROVIDER</text>
  <text x="370" y="590" font-size="9" text-anchor="middle">Resource</text>
  <text x="370" y="602" font-size="9" text-anchor="middle">Allocation</text>
  <text x="370" y="614" font-size="9" text-anchor="middle" font-style="italic">shadow: WASTE</text>

  <rect x="435" y="556" width="130" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="500" y="575" font-size="11" font-weight="bold" text-anchor="middle">ENFORCER</text>
  <text x="500" y="590" font-size="9" text-anchor="middle">Validation</text>
  <text x="500" y="602" font-size="9" text-anchor="middle">Constraint</text>
  <text x="500" y="614" font-size="9" text-anchor="middle" font-style="italic">shadow: TYRANNY</text>

  <rect x="565" y="556" width="130" height="62" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="630" y="575" font-size="11" font-weight="bold" text-anchor="middle">ORCHESTRATOR</text>
  <text x="630" y="590" font-size="9" text-anchor="middle">Integration</text>
  <text x="630" y="602" font-size="9" text-anchor="middle">Synthesis</text>
  <text x="630" y="614" font-size="9" text-anchor="middle" font-style="italic">shadow: PARALYSIS</text>

  <!-- L-EXEC row -->
  <text x="300" y="660" font-size="12" font-weight="bold" text-anchor="end">L-EXEC</text>
  <text x="300" y="675" font-size="9" font-style="italic" text-anchor="end">do (act)</text>

  <rect x="305" y="636" width="130" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="370" y="655" font-size="11" font-weight="bold" text-anchor="middle">SUSTAINER</text>
  <text x="370" y="670" font-size="9" text-anchor="middle">Persistence</text>
  <text x="370" y="682" font-size="9" text-anchor="middle">Retry</text>
  <text x="370" y="694" font-size="9" text-anchor="middle" font-style="italic">shadow: OBSESSION</text>

  <rect x="435" y="636" width="130" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="500" y="655" font-size="11" font-weight="bold" text-anchor="middle">ARTICULATOR</text>
  <text x="500" y="670" font-size="9" text-anchor="middle">Communication</text>
  <text x="500" y="682" font-size="9" text-anchor="middle">Format</text>
  <text x="500" y="694" font-size="9" text-anchor="middle" font-style="italic">shadow: DECEPTION</text>

  <rect x="565" y="636" width="130" height="62" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="630" y="652" font-size="11" font-weight="bold" text-anchor="middle">RELAY</text>
  <text x="630" y="666" font-size="9" text-anchor="middle">Message Bus</text>
  <text x="630" y="678" font-size="9" text-anchor="middle">Context Mgmt</text>
  <text x="630" y="691" font-size="9" text-anchor="middle" font-style="italic">shadow: DISTORTION</text>

  <!-- Executor sits below Relay - integrative at L-Exec, alongside Relay -->
  <rect x="565" y="708" width="130" height="62" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="630" y="727" font-size="11" font-weight="bold" text-anchor="middle">EXECUTOR</text>
  <text x="630" y="742" font-size="9" text-anchor="middle">Execution</text>
  <text x="630" y="754" font-size="9" text-anchor="middle">Environment</text>
  <text x="630" y="766" font-size="9" text-anchor="middle" font-style="italic">shadow: ILLUSION</text>

  <!-- Mode-band guides (light dashed) -->
  <line x1="305" y1="395" x2="305" y2="775" stroke="black" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="435" y1="465" x2="435" y2="775" stroke="black" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="565" y1="465" x2="565" y2="775" stroke="black" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="695" y1="395" x2="695" y2="775" stroke="black" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Counts callout -->
  <rect x="245" y="800" width="465" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="818" font-size="11" font-weight="bold">10 ARCHETYPES = FINITE BASIS</text>
  <text x="255" y="836" font-size="10">M-Generative (4): VISIONARY, PROVIDER, SUSTAINER (+ SOVEREIGN as source)</text>
  <text x="255" y="850" font-size="10">M-Constraining (3): ARCHITECT, ENFORCER, ARTICULATOR</text>

  <!-- Connection rule callout -->
  <rect x="245" y="872" width="465" height="62" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="890" font-size="11" font-weight="bold">M-INTEGRATIVE (3): ORCHESTRATOR, RELAY, EXECUTOR</text>
  <text x="255" y="908" font-size="10">ORCHESTRATOR is the most-connected archetype (8 paths) and required at every</text>
  <text x="255" y="922" font-size="10">M-Generative + M-Constraining synthesis per the Integration Principle.</text>

  <!-- Bottom legend -->
  <text x="270" y="990" font-size="8">Bold-stroked cells (M-Integrative column) mark archetypes whose presence is required wherever generative and constraining</text>
  <text x="270" y="1002" font-size="8">signals must be synthesized. Each archetype's mode + layer + shadow are derived (read-only) per §3.16 ArchetypeDerivationTable.</text>
</svg>
