<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1110" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- AIMS D04 - The Ten Archetypes Taxonomy: Mode x Layer Grid -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->
  <!-- Register: XSI Sapphire Standards (Technical-light) per XSI-Diagram-Design-Guide v1.0 -->

  <defs>
    <marker id="arrow_d04" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="780" height="1110" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="110" y="40" font-size="18" font-weight="bold" fill="#1F2937">D04</text>
  <text x="110" y="64" font-size="13" font-style="italic" fill="#1F2937">The Ten Archetypes Taxonomy - Functional Mode x Operational Layer</text>
  <text x="110" y="84" font-size="10" fill="#6B7280">Source: AIMS Implementation Architecture §1.2; AIMS specification §3.16 (Archetype Derivation)</text>

  <!-- ================= L-INTENT row (SOVEREIGN spans the three mode columns; mode N/A) ================= -->
  <text x="170" y="156" font-size="12" font-weight="bold" text-anchor="end" fill="#1F2937">L-INTENT</text>
  <text x="170" y="172" font-size="9" font-style="italic" text-anchor="end" fill="#6B7280">why / who</text>

  <g>
    <rect x="190" y="120" width="550" height="80" fill="#FFFFFF"/>
    <rect x="190" y="120" width="550" height="80" fill="#0A3B85" fill-opacity="0.13" stroke="#0A3B85" stroke-width="2"/>
    <text x="465" y="140" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">SOVEREIGN</text>
    <text x="465" y="157" font-size="9" text-anchor="middle" fill="#1F2937">System Intent (Source)</text>
    <text x="465" y="170" font-size="9" text-anchor="middle" fill="#1F2937">mode: N/A (source)</text>
    <text x="465" y="185" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: SCHISM</text>
  </g>

  <!-- ================= Mode group containers (replace the draft dashed band guides) ================= -->
  <rect x="190" y="224" width="170" height="466" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1"/>
  <rect x="380" y="224" width="170" height="466" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1"/>
  <rect x="570" y="224" width="170" height="466" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1"/>

  <!-- Mode group headers -->
  <text x="275" y="250" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">M-GENERATIVE</text>
  <text x="275" y="266" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">"yes"</text>
  <text x="275" y="279" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">exploration</text>

  <text x="465" y="250" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">M-CONSTRAINING</text>
  <text x="465" y="266" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">"no"</text>
  <text x="465" y="279" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">boundary enforcement</text>

  <text x="655" y="250" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">M-INTEGRATIVE</text>
  <text x="655" y="266" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">"it depends"</text>
  <text x="655" y="279" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">synthesis</text>

  <!-- ================= L-PLAN row ================= -->
  <text x="170" y="338" font-size="12" font-weight="bold" text-anchor="end" fill="#1F2937">L-PLAN</text>
  <text x="170" y="354" font-size="9" font-style="italic" text-anchor="end" fill="#6B7280">what / when</text>

  <g>
    <rect x="200" y="302" width="150" height="80" fill="#FFFFFF"/>
    <rect x="200" y="302" width="150" height="80" fill="#0EA5E9" fill-opacity="0.13" stroke="#0EA5E9" stroke-width="2"/>
    <text x="275" y="322" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">VISIONARY</text>
    <text x="275" y="339" font-size="9" text-anchor="middle" fill="#1F2937">Research</text>
    <text x="275" y="352" font-size="9" text-anchor="middle" fill="#1F2937">Discovery</text>
    <text x="275" y="367" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: CHAOS</text>
  </g>

  <g>
    <rect x="390" y="302" width="150" height="80" fill="#FFFFFF"/>
    <rect x="390" y="302" width="150" height="80" fill="#1E40AF" fill-opacity="0.13" stroke="#1E40AF" stroke-width="2"/>
    <text x="465" y="322" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">ARCHITECT</text>
    <text x="465" y="339" font-size="9" text-anchor="middle" fill="#1F2937">Analysis</text>
    <text x="465" y="352" font-size="9" text-anchor="middle" fill="#1F2937">Structure</text>
    <text x="465" y="367" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: OBSCURITY</text>
  </g>

  <!-- ================= L-FORM row ================= -->
  <text x="170" y="438" font-size="12" font-weight="bold" text-anchor="end" fill="#1F2937">L-FORM</text>
  <text x="170" y="454" font-size="9" font-style="italic" text-anchor="end" fill="#6B7280">how</text>

  <g>
    <rect x="200" y="402" width="150" height="80" fill="#FFFFFF"/>
    <rect x="200" y="402" width="150" height="80" fill="#0D9488" fill-opacity="0.13" stroke="#0D9488" stroke-width="2"/>
    <text x="275" y="422" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">PROVIDER</text>
    <text x="275" y="439" font-size="9" text-anchor="middle" fill="#1F2937">Resource</text>
    <text x="275" y="452" font-size="9" text-anchor="middle" fill="#1F2937">Allocation</text>
    <text x="275" y="467" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: WASTE</text>
  </g>

  <g>
    <rect x="390" y="402" width="150" height="80" fill="#FFFFFF"/>
    <rect x="390" y="402" width="150" height="80" fill="#3730A3" fill-opacity="0.13" stroke="#3730A3" stroke-width="2"/>
    <text x="465" y="422" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">ENFORCER</text>
    <text x="465" y="439" font-size="9" text-anchor="middle" fill="#1F2937">Validation</text>
    <text x="465" y="452" font-size="9" text-anchor="middle" fill="#1F2937">Constraint</text>
    <text x="465" y="467" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: TYRANNY</text>
  </g>

  <g>
    <rect x="580" y="402" width="150" height="80" fill="#FFFFFF"/>
    <rect x="580" y="402" width="150" height="80" fill="#7C3AED" fill-opacity="0.13" stroke="#7C3AED" stroke-width="2"/>
    <text x="655" y="422" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">ORCHESTRATOR</text>
    <text x="655" y="439" font-size="9" text-anchor="middle" fill="#1F2937">Integration</text>
    <text x="655" y="452" font-size="9" text-anchor="middle" fill="#1F2937">Synthesis</text>
    <text x="655" y="467" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: PARALYSIS</text>
  </g>

  <!-- ================= L-EXEC row ================= -->
  <text x="170" y="538" font-size="12" font-weight="bold" text-anchor="end" fill="#1F2937">L-EXEC</text>
  <text x="170" y="554" font-size="9" font-style="italic" text-anchor="end" fill="#6B7280">do (act)</text>

  <g>
    <rect x="200" y="502" width="150" height="80" fill="#FFFFFF"/>
    <rect x="200" y="502" width="150" height="80" fill="#059669" fill-opacity="0.13" stroke="#059669" stroke-width="2"/>
    <text x="275" y="522" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">SUSTAINER</text>
    <text x="275" y="539" font-size="9" text-anchor="middle" fill="#1F2937">Persistence</text>
    <text x="275" y="552" font-size="9" text-anchor="middle" fill="#1F2937">Retry</text>
    <text x="275" y="567" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: OBSESSION</text>
  </g>

  <g>
    <rect x="390" y="502" width="150" height="80" fill="#FFFFFF"/>
    <rect x="390" y="502" width="150" height="80" fill="#5B21B6" fill-opacity="0.13" stroke="#5B21B6" stroke-width="2"/>
    <text x="465" y="522" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">ARTICULATOR</text>
    <text x="465" y="539" font-size="9" text-anchor="middle" fill="#1F2937">Communication</text>
    <text x="465" y="552" font-size="9" text-anchor="middle" fill="#1F2937">Format</text>
    <text x="465" y="567" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: DECEPTION</text>
  </g>

  <g>
    <rect x="580" y="502" width="150" height="80" fill="#FFFFFF"/>
    <rect x="580" y="502" width="150" height="80" fill="#475569" fill-opacity="0.13" stroke="#475569" stroke-width="2"/>
    <text x="655" y="522" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">RELAY</text>
    <text x="655" y="539" font-size="9" text-anchor="middle" fill="#1F2937">Message Bus</text>
    <text x="655" y="552" font-size="9" text-anchor="middle" fill="#1F2937">Context Mgmt</text>
    <text x="655" y="567" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: DISTORTION</text>
  </g>

  <!-- Executor sits below Relay - integrative at L-Exec, alongside Relay -->
  <g>
    <rect x="580" y="598" width="150" height="80" fill="#FFFFFF"/>
    <rect x="580" y="598" width="150" height="80" fill="#B45309" fill-opacity="0.13" stroke="#B45309" stroke-width="3"/>
    <text x="655" y="618" font-size="11" font-weight="bold" text-anchor="middle" fill="#1F2937">EXECUTOR</text>
    <text x="655" y="635" font-size="9" text-anchor="middle" fill="#1F2937">Execution</text>
    <text x="655" y="648" font-size="9" text-anchor="middle" fill="#1F2937">Environment</text>
    <text x="655" y="663" font-size="9" font-style="italic" text-anchor="middle" fill="#6B7280">shadow: ILLUSION</text>
  </g>

  <!-- ================= Counts callout ================= -->
  <rect x="190" y="714" width="550" height="70" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="202" y="736" font-size="11" font-weight="bold" fill="#1F2937">10 ARCHETYPES = FINITE BASIS</text>
  <text x="202" y="755" font-size="10" fill="#1F2937">M-Generative (4): VISIONARY, PROVIDER, SUSTAINER (+ SOVEREIGN as source)</text>
  <text x="202" y="770" font-size="10" fill="#1F2937">M-Constraining (3): ARCHITECT, ENFORCER, ARTICULATOR</text>

  <!-- ================= Connection rule callout ================= -->
  <rect x="190" y="800" width="550" height="70" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="202" y="822" font-size="11" font-weight="bold" fill="#1F2937">M-INTEGRATIVE (3): ORCHESTRATOR, RELAY, EXECUTOR</text>
  <text x="202" y="841" font-size="10" fill="#1F2937">ORCHESTRATOR is the most-connected archetype (8 paths) and required at every</text>
  <text x="202" y="856" font-size="10" fill="#1F2937">M-Generative + M-Constraining synthesis per the Integration Principle.</text>

  <!-- ================= Bottom annotation ================= -->
  <text x="190" y="894" font-size="9" fill="#6B7280">Cells in the M-Integrative column mark archetypes whose presence is required wherever</text>
  <text x="190" y="908" font-size="9" fill="#6B7280">generative and constraining signals must be synthesized. Each archetype's mode + layer + shadow</text>
  <text x="190" y="922" font-size="9" fill="#6B7280">are derived (read-only) per §3.16 ArchetypeDerivationTable.</text>

  <!-- ================= Legend (signature colors + gatekeeper stroke) ================= -->
  <rect x="190" y="942" width="550" height="140" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>

  <rect x="202" y="956" width="18" height="12" fill="#0A3B85" fill-opacity="0.13" stroke="#0A3B85" stroke-width="2"/>
  <text x="228" y="966" font-size="10" fill="#1F2937">SOVEREIGN - L-Intent</text>
  <rect x="202" y="976" width="18" height="12" fill="#0EA5E9" fill-opacity="0.13" stroke="#0EA5E9" stroke-width="2"/>
  <text x="228" y="986" font-size="10" fill="#1F2937">VISIONARY - L-Plan</text>
  <rect x="202" y="996" width="18" height="12" fill="#1E40AF" fill-opacity="0.13" stroke="#1E40AF" stroke-width="2"/>
  <text x="228" y="1006" font-size="10" fill="#1F2937">ARCHITECT - L-Plan</text>
  <rect x="202" y="1016" width="18" height="12" fill="#0D9488" fill-opacity="0.13" stroke="#0D9488" stroke-width="2"/>
  <text x="228" y="1026" font-size="10" fill="#1F2937">PROVIDER - L-Form</text>
  <rect x="202" y="1036" width="18" height="12" fill="#3730A3" fill-opacity="0.13" stroke="#3730A3" stroke-width="2"/>
  <text x="228" y="1046" font-size="10" fill="#1F2937">ENFORCER - L-Form</text>

  <rect x="460" y="956" width="18" height="12" fill="#7C3AED" fill-opacity="0.13" stroke="#7C3AED" stroke-width="2"/>
  <text x="486" y="966" font-size="10" fill="#1F2937">ORCHESTRATOR - L-Form</text>
  <rect x="460" y="976" width="18" height="12" fill="#059669" fill-opacity="0.13" stroke="#059669" stroke-width="2"/>
  <text x="486" y="986" font-size="10" fill="#1F2937">SUSTAINER - L-Exec</text>
  <rect x="460" y="996" width="18" height="12" fill="#5B21B6" fill-opacity="0.13" stroke="#5B21B6" stroke-width="2"/>
  <text x="486" y="1006" font-size="10" fill="#1F2937">ARTICULATOR - L-Exec</text>
  <rect x="460" y="1016" width="18" height="12" fill="#475569" fill-opacity="0.13" stroke="#475569" stroke-width="2"/>
  <text x="486" y="1026" font-size="10" fill="#1F2937">RELAY - L-Exec</text>
  <rect x="460" y="1036" width="18" height="12" fill="#B45309" fill-opacity="0.13" stroke="#B45309" stroke-width="3"/>
  <text x="486" y="1046" font-size="10" fill="#1F2937">EXECUTOR - L-Exec</text>

  <rect x="202" y="1056" width="26" height="12" fill="#FFFFFF" stroke="#B45309" stroke-width="3"/>
  <text x="236" y="1066" font-size="10" fill="#1F2937">3px gold-bronze stroke = EXECUTOR gatekeeper accent</text>
</svg>
