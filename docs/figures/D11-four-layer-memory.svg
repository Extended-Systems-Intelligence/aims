<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" font-family="Helvetica, Arial, sans-serif">
  <!-- AIMS D11 - Four-Layer Memory Architecture: Working / Episodic / Semantic / Procedural -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->

  <defs>
    <marker id="arrow_d11" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="black"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="270" y="285" font-size="18" font-weight="bold">D11</text>
  <text x="270" y="310" font-size="13" font-style="italic">Four-Layer Memory Architecture - Working / Episodic / Semantic / Procedural</text>
  <text x="270" y="332" font-size="10">Source: AIMS specification §3.11 (Agent Memory Architecture); Implementation Architecture §6</text>

  <!-- Layer 1: Working Memory (top) -->
  <text x="265" y="375" font-size="11" font-weight="bold">LAYER 1</text>
  <text x="265" y="389" font-size="9" font-style="italic">active session</text>
  <text x="265" y="401" font-size="9" font-style="italic">context</text>

  <rect x="370" y="358" width="330" height="80" fill="none" stroke="black" stroke-width="2"/>
  <text x="535" y="377" font-size="12" font-weight="bold" text-anchor="middle">WORKING MEMORY</text>
  <text x="378" y="394" font-size="9">capacity: token_window_size (inherits from foundation)</text>
  <text x="378" y="406" font-size="9">overflow: WITNESS_ARCHIVE (never discarded; preserved immutably)</text>
  <text x="378" y="418" font-size="9">refresh triggers: COHERENCE_CORRECTION,</text>
  <text x="378" y="430" font-size="9">NEW_SEMANTIC_MEMORY, SESSION_START</text>

  <!-- Connector down -->
  <line x1="535" y1="438" x2="535" y2="448" stroke="black" stroke-width="1.5" marker-end="url(#arrow_d11)"/>

  <!-- Layer 2: Episodic Memory -->
  <text x="265" y="465" font-size="11" font-weight="bold">LAYER 2</text>
  <text x="265" y="479" font-size="9" font-style="italic">read view on</text>
  <text x="265" y="491" font-size="9" font-style="italic">Witness Layer</text>

  <rect x="370" y="450" width="330" height="78" fill="none" stroke="black" stroke-width="2"/>
  <text x="535" y="469" font-size="12" font-weight="bold" text-anchor="middle">EPISODIC MEMORY</text>
  <text x="378" y="486" font-size="9">source: WitnessLayer (NOT a separate store - a query interface)</text>
  <text x="378" y="498" font-size="8">scopeFilter: TOPOLOGY_GOVERNED (only events agent is authorized to see)</text>
  <text x="378" y="510" font-size="9">rankingFunction: relevance_rank(events, query_context)</text>
  <text x="378" y="522" font-size="9">layerTransform: REQUIRED on cross-layer retrieval</text>

  <!-- Connector down (consolidation) -->
  <line x1="535" y1="528" x2="535" y2="547" stroke="black" stroke-width="1.5" marker-end="url(#arrow_d11)"/>
  <text x="545" y="540" font-size="9" font-style="italic">Ascent consolidation</text>

  <!-- Layer 3: Semantic Memory -->
  <text x="265" y="567" font-size="11" font-weight="bold">LAYER 3</text>
  <text x="265" y="581" font-size="9" font-style="italic">distilled</text>
  <text x="265" y="593" font-size="9" font-style="italic">knowledge</text>

  <rect x="370" y="552" width="330" height="78" fill="none" stroke="black" stroke-width="2"/>
  <text x="535" y="571" font-size="12" font-weight="bold" text-anchor="middle">SEMANTIC MEMORY</text>
  <text x="378" y="588" font-size="9">store: AGENT_LOCAL (MEMORY.md) + SHARED (topology-governed)</text>
  <text x="378" y="600" font-size="8">consolidation: AscentProtocol (pattern detection on episodic events)</text>
  <text x="378" y="612" font-size="9">confidenceDecay: configurable (default 0.01/day staleness rate)</text>
  <text x="378" y="624" font-size="8">contradictionPolicy: ESCALATE_TO_ORCHESTRATOR (no silent overwrite)</text>

  <!-- Connector down -->
  <line x1="535" y1="630" x2="535" y2="649" stroke="black" stroke-width="1.5" marker-end="url(#arrow_d11)"/>
  <text x="545" y="642" font-size="9" font-style="italic">outcome-tracked patterns</text>

  <!-- Layer 4: Procedural Memory -->
  <text x="265" y="669" font-size="11" font-weight="bold">LAYER 4</text>
  <text x="265" y="683" font-size="9" font-style="italic">learned</text>
  <text x="265" y="695" font-size="9" font-style="italic">workflows</text>

  <rect x="370" y="654" width="330" height="78" fill="none" stroke="black" stroke-width="2"/>
  <text x="535" y="673" font-size="12" font-weight="bold" text-anchor="middle">PROCEDURAL MEMORY</text>
  <text x="378" y="690" font-size="9">store: skills/*.md extension (static authored + learned procedures)</text>
  <text x="378" y="702" font-size="8">learningSource: WitnessLayer (successful executions become candidates)</text>
  <text x="378" y="714" font-size="9">validationMethod: OUTCOME_TRACKING (success rate over time)</text>
  <text x="378" y="726" font-size="8">improvementPolicy: VERIFIABILITY_CONSTRAINT; rollbackPath: REQUIRED</text>

  <!-- Witness Layer foundation slab -->
  <text x="265" y="773" font-size="12" font-weight="bold">WITNESS</text>
  <text x="265" y="788" font-size="12" font-weight="bold">LAYER</text>
  <text x="265" y="803" font-size="9" font-style="italic">(ground truth)</text>

  <rect x="370" y="755" width="330" height="55" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="535" y="774" font-size="11" font-weight="bold" text-anchor="middle">UNBOUNDED IMMUTABLE WITNESS LAYER (§3.10)</text>
  <text x="535" y="790" font-size="9" text-anchor="middle">WORM-compliant; hash-chained per path; episodic = FILTERED VIEW</text>
  <text x="535" y="803" font-size="9" font-style="italic" text-anchor="middle">Forensic Query Engine retrieves records by witness_record_id</text>

  <!-- Capacity manager callout -->
  <rect x="245" y="830" width="465" height="78" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="848" font-size="11" font-weight="bold">MEMORY CAPACITY MANAGER (tiered overflow - nothing is ever lost)</text>
  <text x="255" y="866" font-size="9">workingMemory   -&gt; overflow_to WITNESS_ARCHIVE (full events preserved immutably)</text>
  <text x="255" y="878" font-size="9">semanticMemory  -&gt; overflow_by CONFIDENCE_EVICTION (lowest confidence archived first)</text>
  <text x="255" y="890" font-size="9">proceduralMemory -&gt; overflow_by SUCCESS_RATE_EVICTION (least-successful archived first)</text>
  <text x="255" y="902" font-size="9" font-style="italic">retrievalPath: ForensicQueryEngine -&gt; WitnessLayer -&gt; originalEvent</text>

  <!-- Architectural principle callout -->
  <rect x="245" y="922" width="465" height="56" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="940" font-size="11" font-weight="bold">ARCHITECTURAL PRINCIPLE</text>
  <text x="255" y="958" font-size="9">Memory is not a separate system - it is a VIEW on existing AIMS components.</text>
  <text x="255" y="970" font-size="9">Episodic = Witness filtered by topology. Semantic consolidation = Ascent applied to knowledge.</text>

  <!-- Bottom legend -->
  <text x="270" y="1015" font-size="8">Memory access control follows the Communication Topology (§3.4). Memory coherence is the 5th dimension of the Coherence</text>
  <text x="270" y="1027" font-size="8">Maintenance Loop. Capacity limits apply to ACTIVE CONTEXT only - the Witness Layer is the unbounded immutable ground truth.</text>
</svg>
