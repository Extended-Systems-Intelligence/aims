<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1132" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- AIMS D11 - Four-Layer Memory Architecture: Working / Episodic / Semantic / Procedural -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->
  <!-- Register: XSI Standards (Sapphire) per XSI-Diagram-Design-Guide.md v1.0 -->

  <defs>
    <marker id="arrow_d11_data" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#1F2937"/>
    </marker>
    <marker id="arrow_d11_wit" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="860" height="1132" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="120" y="48" font-size="20" font-weight="bold" fill="#0F52BA">D11</text>
  <text x="120" y="72" font-size="13" font-style="italic" fill="#1F2937">Four-Layer Memory Architecture - Working / Episodic / Semantic / Procedural</text>
  <text x="120" y="90" font-size="10" fill="#6B7280">Source: AIMS specification &#167;3.11 (Agent Memory Architecture); Implementation Architecture &#167;6</text>

  <!-- Layer 1: Working Memory (top) -->
  <text x="232" y="140" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="end">LAYER 1</text>
  <text x="232" y="156" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">active session</text>
  <text x="232" y="170" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">context</text>

  <rect x="250" y="120" width="430" height="100" fill="#DCE7F5" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="465" y="145" font-size="13" font-weight="bold" fill="#1F2937" text-anchor="middle">WORKING MEMORY</text>
  <text x="262" y="163" font-size="9" fill="#1F2937">capacity: token_window_size (inherits from foundation)</text>
  <text x="262" y="177" font-size="9" fill="#1F2937">overflow: WITNESS_ARCHIVE (never discarded; preserved immutably)</text>
  <text x="262" y="191" font-size="9" fill="#1F2937">refresh triggers: COHERENCE_CORRECTION,</text>
  <text x="262" y="205" font-size="9" fill="#1F2937">NEW_SEMANTIC_MEMORY, SESSION_START</text>

  <!-- Connector down -->
  <line x1="465" y1="220" x2="465" y2="244" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d11_data)"/>

  <!-- Layer 2: Episodic Memory -->
  <text x="232" y="268" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="end">LAYER 2</text>
  <text x="232" y="284" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">read view on</text>
  <text x="232" y="298" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">Witness Layer</text>

  <rect x="250" y="248" width="430" height="100" fill="#C4D5EF" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="465" y="273" font-size="13" font-weight="bold" fill="#1F2937" text-anchor="middle">EPISODIC MEMORY</text>
  <text x="262" y="291" font-size="9" fill="#1F2937">source: WitnessLayer (NOT a separate store - a query interface)</text>
  <text x="262" y="305" font-size="9" fill="#1F2937">scopeFilter: TOPOLOGY_GOVERNED (only events agent is authorized to see)</text>
  <text x="262" y="319" font-size="9" fill="#1F2937">rankingFunction: relevance_rank(events, query_context)</text>
  <text x="262" y="333" font-size="9" fill="#1F2937">layerTransform: REQUIRED on cross-layer retrieval</text>

  <!-- Connector down (consolidation) -->
  <line x1="465" y1="348" x2="465" y2="378" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d11_data)"/>
  <text x="483" y="367" font-size="9" font-style="italic" fill="#6B7280">Ascent consolidation</text>

  <!-- Layer 3: Semantic Memory -->
  <text x="232" y="402" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="end">LAYER 3</text>
  <text x="232" y="418" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">distilled</text>
  <text x="232" y="432" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">knowledge</text>

  <rect x="250" y="382" width="430" height="100" fill="#A9C2E7" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="465" y="407" font-size="13" font-weight="bold" fill="#1F2937" text-anchor="middle">SEMANTIC MEMORY</text>
  <text x="262" y="425" font-size="9" fill="#1F2937">store: AGENT_LOCAL (MEMORY.md) + SHARED (topology-governed)</text>
  <text x="262" y="439" font-size="9" fill="#1F2937">consolidation: AscentProtocol (pattern detection on episodic events)</text>
  <text x="262" y="453" font-size="9" fill="#1F2937">confidenceDecay: configurable (default 0.01/day staleness rate)</text>
  <text x="262" y="467" font-size="9" fill="#1F2937">contradictionPolicy: ESCALATE_TO_ORCHESTRATOR (no silent overwrite)</text>

  <!-- Connector down -->
  <line x1="465" y1="482" x2="465" y2="512" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d11_data)"/>
  <text x="483" y="501" font-size="9" font-style="italic" fill="#6B7280">outcome-tracked patterns</text>

  <!-- Layer 4: Procedural Memory -->
  <text x="232" y="536" font-size="11" font-weight="bold" fill="#1F2937" text-anchor="end">LAYER 4</text>
  <text x="232" y="552" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">learned</text>
  <text x="232" y="566" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">workflows</text>

  <rect x="250" y="516" width="430" height="100" fill="#8EB0DF" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="465" y="541" font-size="13" font-weight="bold" fill="#1F2937" text-anchor="middle">PROCEDURAL MEMORY</text>
  <text x="262" y="559" font-size="9" fill="#1F2937">store: skills/*.md extension (static authored + learned procedures)</text>
  <text x="262" y="573" font-size="9" fill="#1F2937">learningSource: WitnessLayer (successful executions become candidates)</text>
  <text x="262" y="587" font-size="9" fill="#1F2937">validationMethod: OUTCOME_TRACKING (success rate over time)</text>
  <text x="262" y="601" font-size="9" fill="#1F2937">improvementPolicy: VERIFIABILITY_CONSTRAINT; rollbackPath: REQUIRED</text>

  <!-- Witness Layer foundation slab -->
  <text x="232" y="668" font-size="12" font-weight="bold" fill="#0A3B85" text-anchor="end">WITNESS</text>
  <text x="232" y="684" font-size="12" font-weight="bold" fill="#0A3B85" text-anchor="end">LAYER</text>
  <text x="232" y="700" font-size="9" font-style="italic" fill="#6B7280" text-anchor="end">(ground truth)</text>

  <rect x="250" y="640" width="430" height="74" fill="#0A3B85" stroke="#0A3B85" stroke-width="1.5"/>
  <text x="465" y="664" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">UNBOUNDED IMMUTABLE WITNESS LAYER (&#167;3.10)</text>
  <text x="465" y="682" font-size="9" fill="#DCE7F5" text-anchor="middle">WORM-compliant; hash-chained per path; episodic = FILTERED VIEW</text>
  <text x="465" y="698" font-size="9" font-style="italic" fill="#DCE7F5" text-anchor="middle">Forensic Query Engine retrieves records by witness_record_id</text>

  <!-- Witness read-view link (topology-governed): Witness Layer feeds the Episodic read view -->
  <path d="M 680,677 H 724 V 298 H 684" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow_d11_wit)"/>
  <text x="736" y="480" font-size="9" font-style="italic" fill="#6B7280">topology-governed</text>
  <text x="736" y="494" font-size="9" font-style="italic" fill="#6B7280">read view</text>

  <!-- Capacity manager callout -->
  <rect x="120" y="742" width="560" height="100" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="132" y="763" font-size="11" font-weight="bold" fill="#1F2937">MEMORY CAPACITY MANAGER (tiered overflow - nothing is ever lost)</text>
  <text x="132" y="781" font-size="9" fill="#1F2937">workingMemory   -&gt; overflow_to WITNESS_ARCHIVE (full events preserved immutably)</text>
  <text x="132" y="795" font-size="9" fill="#1F2937">semanticMemory  -&gt; overflow_by CONFIDENCE_EVICTION (lowest confidence archived first)</text>
  <text x="132" y="809" font-size="9" fill="#1F2937">proceduralMemory -&gt; overflow_by SUCCESS_RATE_EVICTION (least-successful archived first)</text>
  <text x="132" y="823" font-size="9" font-style="italic" fill="#6B7280">retrievalPath: ForensicQueryEngine -&gt; WitnessLayer -&gt; originalEvent</text>

  <!-- Architectural principle callout -->
  <rect x="120" y="858" width="560" height="74" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="132" y="879" font-size="11" font-weight="bold" fill="#1F2937">ARCHITECTURAL PRINCIPLE</text>
  <text x="132" y="897" font-size="9" fill="#1F2937">Memory is not a separate system - it is a VIEW on existing AIMS components.</text>
  <text x="132" y="911" font-size="9" fill="#1F2937">Episodic = Witness filtered by topology. Semantic consolidation = Ascent applied to knowledge.</text>

  <!-- Legend -->
  <rect x="120" y="956" width="560" height="110" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="132" y="976" font-size="11" font-weight="bold" fill="#1F2937">LEGEND</text>
  <rect x="132" y="988" width="18" height="10" fill="#DCE7F5" stroke="#0F52BA" stroke-width="0.5"/>
  <rect x="154" y="988" width="18" height="10" fill="#C4D5EF" stroke="#0F52BA" stroke-width="0.5"/>
  <rect x="176" y="988" width="18" height="10" fill="#A9C2E7" stroke="#0F52BA" stroke-width="0.5"/>
  <rect x="198" y="988" width="18" height="10" fill="#8EB0DF" stroke="#0F52BA" stroke-width="0.5"/>
  <text x="226" y="997" font-size="10" fill="#1F2937">Tint ramp = memory layers, working (lightest) to procedural (darkest)</text>
  <rect x="132" y="1006" width="18" height="10" fill="#0A3B85"/>
  <text x="226" y="1015" font-size="10" fill="#1F2937">Deep sapphire slab = Witness Layer (immutable ground-truth foundation)</text>
  <line x1="132" y1="1029" x2="216" y2="1029" stroke="#1F2937" stroke-width="2"/>
  <text x="226" y="1033" font-size="10" fill="#1F2937">Solid dark = data / consolidation flow (downward)</text>
  <line x1="132" y1="1047" x2="216" y2="1047" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="226" y="1051" font-size="10" fill="#1F2937">Dashed grey = witness read-view link (topology-governed)</text>

  <!-- Bottom caption -->
  <text x="120" y="1090" font-size="9" fill="#6B7280">Memory access control follows the Communication Topology (&#167;3.4). Memory coherence is the 5th dimension of the Coherence</text>
  <text x="120" y="1104" font-size="9" fill="#6B7280">Maintenance Loop. Capacity limits apply to ACTIVE CONTEXT only - the Witness Layer is the unbounded immutable ground truth.</text>
</svg>
