<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- AIMS D01 - Stacked Architecture: Operational Layers, Functional Modes, Safety Substrate -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->
  <!-- Register: XSI Standards (Sapphire) per XSI-Diagram-Design-Guide.md v1.0 -->

  <defs>
    <marker id="arrow_d01" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#1F2937"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="800" height="1100" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="40" y="40" font-size="18" font-weight="700" fill="#1F2937">D01</text>
  <text x="40" y="64" font-size="13" font-style="italic" fill="#1F2937">AIMS Stacked Architecture - Operational Layers, Functional Modes, Safety Substrate</text>
  <text x="40" y="84" font-size="10" fill="#6B7280">Source: AIMS specification &#167;2.1 (Four Operational Layers), &#167;2.2 (Three Functional Modes), &#167;3.18 (Safety Substrate)</text>

  <!-- Mode-column pillar tint bands (A-B-A: pale / neutral / pale) -->
  <rect x="230" y="112" width="160" height="544" fill="#DCE7F5"/>
  <rect x="414" y="112" width="160" height="544" fill="#EBEDF3"/>
  <rect x="598" y="112" width="160" height="544" fill="#DCE7F5"/>

  <!-- Top column headers (mode bands) -->
  <text x="310" y="136" font-size="11" font-weight="700" letter-spacing="0.01em" text-anchor="middle" fill="#1F2937">M-GENERATIVE</text>
  <text x="310" y="152" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">"yes"</text>
  <text x="310" y="166" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">exploration</text>

  <text x="494" y="136" font-size="11" font-weight="700" letter-spacing="0.01em" text-anchor="middle" fill="#1F2937">M-CONSTRAINING</text>
  <text x="494" y="152" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">"no"</text>
  <text x="494" y="166" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">boundary enforcement</text>

  <text x="678" y="136" font-size="11" font-weight="700" letter-spacing="0.01em" text-anchor="middle" fill="#1F2937">M-INTEGRATIVE</text>
  <text x="678" y="152" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">"it depends"</text>
  <text x="678" y="166" font-size="9" text-anchor="middle" font-style="italic" fill="#6B7280">synthesis</text>

  <!-- Layer rows: each is a horizontal band labeled on the LEFT, with 3 mode cells -->

  <!-- L-INTENT row (top) -->
  <text x="90" y="214" font-size="12" font-weight="700" fill="#1F2937">L-INTENT</text>
  <text x="90" y="231" font-size="9" font-style="italic" fill="#6B7280">why / who</text>
  <text x="90" y="246" font-size="9" font-style="italic" fill="#6B7280">strategic purpose</text>

  <rect x="230" y="184" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="310" y="214" font-size="10" text-anchor="middle" fill="#1F2937">propose</text>
  <text x="310" y="230" font-size="10" text-anchor="middle" fill="#1F2937">intents,</text>
  <text x="310" y="246" font-size="10" text-anchor="middle" fill="#1F2937">objectives</text>

  <rect x="414" y="184" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="494" y="214" font-size="10" text-anchor="middle" fill="#1F2937">policy &amp;</text>
  <text x="494" y="230" font-size="10" text-anchor="middle" fill="#1F2937">authority</text>
  <text x="494" y="246" font-size="10" text-anchor="middle" fill="#1F2937">scope check</text>

  <rect x="598" y="184" width="160" height="88" fill="none" stroke="#0A3B85" stroke-width="2.5"/>
  <text x="678" y="208" font-size="10" text-anchor="middle" fill="#1F2937">approved</text>
  <text x="678" y="224" font-size="10" text-anchor="middle" fill="#1F2937">objective</text>
  <text x="678" y="240" font-size="10" text-anchor="middle" fill="#1F2937">(synthesized)</text>
  <text x="678" y="255" font-size="9" font-weight="700" text-anchor="middle" font-style="italic" fill="#0A3B85">REQUIRED</text>

  <!-- Transformation arrow between L-Intent and L-Plan -->
  <line x1="494" y1="276" x2="494" y2="306" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d01)"/>
  <text x="506" y="295" font-size="9" font-style="italic" fill="#1F2937">SPECIALIZE</text>

  <!-- L-PLAN row -->
  <text x="90" y="340" font-size="12" font-weight="700" fill="#1F2937">L-PLAN</text>
  <text x="90" y="357" font-size="9" font-style="italic" fill="#6B7280">what / when</text>
  <text x="90" y="372" font-size="9" font-style="italic" fill="#6B7280">structured plan</text>

  <rect x="230" y="310" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="310" y="340" font-size="10" text-anchor="middle" fill="#1F2937">enumerate</text>
  <text x="310" y="356" font-size="10" text-anchor="middle" fill="#1F2937">candidate</text>
  <text x="310" y="372" font-size="10" text-anchor="middle" fill="#1F2937">plans</text>

  <rect x="414" y="310" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="494" y="340" font-size="10" text-anchor="middle" fill="#1F2937">feasibility,</text>
  <text x="494" y="356" font-size="10" text-anchor="middle" fill="#1F2937">constraints,</text>
  <text x="494" y="372" font-size="10" text-anchor="middle" fill="#1F2937">precedent</text>

  <rect x="598" y="310" width="160" height="88" fill="none" stroke="#0A3B85" stroke-width="2.5"/>
  <text x="678" y="334" font-size="10" text-anchor="middle" fill="#1F2937">selected plan</text>
  <text x="678" y="350" font-size="10" text-anchor="middle" fill="#1F2937">(weighted</text>
  <text x="678" y="366" font-size="10" text-anchor="middle" fill="#1F2937">judgment)</text>
  <text x="678" y="381" font-size="9" font-weight="700" text-anchor="middle" font-style="italic" fill="#0A3B85">REQUIRED</text>

  <line x1="494" y1="402" x2="494" y2="432" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d01)"/>
  <text x="506" y="421" font-size="9" font-style="italic" fill="#1F2937">SPECIALIZE</text>

  <!-- L-FORM row -->
  <text x="90" y="466" font-size="12" font-weight="700" fill="#1F2937">L-FORM</text>
  <text x="90" y="483" font-size="9" font-style="italic" fill="#6B7280">how (concretize)</text>
  <text x="90" y="498" font-size="9" font-style="italic" fill="#6B7280">executable form</text>

  <rect x="230" y="436" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="310" y="466" font-size="10" text-anchor="middle" fill="#1F2937">draft</text>
  <text x="310" y="482" font-size="10" text-anchor="middle" fill="#1F2937">artifact /</text>
  <text x="310" y="498" font-size="10" text-anchor="middle" fill="#1F2937">command</text>

  <rect x="414" y="436" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="494" y="466" font-size="10" text-anchor="middle" fill="#1F2937">syntax,</text>
  <text x="494" y="482" font-size="10" text-anchor="middle" fill="#1F2937">schema,</text>
  <text x="494" y="498" font-size="10" text-anchor="middle" fill="#1F2937">safety lint</text>

  <rect x="598" y="436" width="160" height="88" fill="none" stroke="#0A3B85" stroke-width="2.5"/>
  <text x="678" y="460" font-size="10" text-anchor="middle" fill="#1F2937">approved</text>
  <text x="678" y="476" font-size="10" text-anchor="middle" fill="#1F2937">artifact</text>
  <text x="678" y="492" font-size="10" text-anchor="middle" fill="#1F2937">(integrated)</text>
  <text x="678" y="507" font-size="9" font-weight="700" text-anchor="middle" font-style="italic" fill="#0A3B85">REQUIRED</text>

  <line x1="494" y1="528" x2="494" y2="558" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d01)"/>
  <text x="506" y="547" font-size="9" font-style="italic" fill="#1F2937">SPECIALIZE</text>

  <!-- L-EXEC row -->
  <text x="90" y="592" font-size="12" font-weight="700" fill="#1F2937">L-EXEC</text>
  <text x="90" y="609" font-size="9" font-style="italic" fill="#6B7280">do (act on world)</text>
  <text x="90" y="624" font-size="9" font-style="italic" fill="#6B7280">side effects</text>

  <rect x="230" y="562" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="310" y="592" font-size="10" text-anchor="middle" fill="#1F2937">attempt</text>
  <text x="310" y="608" font-size="10" text-anchor="middle" fill="#1F2937">action,</text>
  <text x="310" y="624" font-size="10" text-anchor="middle" fill="#1F2937">retry path</text>

  <rect x="414" y="562" width="160" height="88" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="494" y="592" font-size="10" text-anchor="middle" fill="#1F2937">authorization,</text>
  <text x="494" y="608" font-size="10" text-anchor="middle" fill="#1F2937">circuit-</text>
  <text x="494" y="624" font-size="10" text-anchor="middle" fill="#1F2937">breakers</text>

  <rect x="598" y="562" width="160" height="88" fill="none" stroke="#0A3B85" stroke-width="2.5"/>
  <text x="678" y="586" font-size="10" text-anchor="middle" fill="#1F2937">executed</text>
  <text x="678" y="602" font-size="10" text-anchor="middle" fill="#1F2937">action</text>
  <text x="678" y="618" font-size="10" text-anchor="middle" fill="#1F2937">+ outcome</text>
  <text x="678" y="633" font-size="9" font-weight="700" text-anchor="middle" font-style="italic" fill="#0A3B85">REQUIRED</text>

  <!-- ABSTRACT-up arrow on the FAR LEFT -->
  <line x1="60" y1="650" x2="60" y2="190" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d01)"/>
  <text x="46" y="420" font-size="11" text-anchor="middle" fill="#1F2937" transform="rotate(-90 46 420)">ABSTRACT (up)</text>

  <!-- Safety substrate slab (foundation) -->
  <text x="90" y="706" font-size="12" font-weight="700" fill="#1F2937">SAFETY</text>
  <text x="90" y="722" font-size="12" font-weight="700" fill="#1F2937">SUBSTRATE</text>
  <text x="90" y="737" font-size="9" font-style="italic" fill="#6B7280">(foundation)</text>

  <rect x="230" y="690" width="528" height="62" fill="#EBEDF3" stroke="#0A3B85" stroke-width="2"/>

  <!-- Six substrate cells -->
  <line x1="318" y1="690" x2="318" y2="752" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="406" y1="690" x2="406" y2="752" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="494" y1="690" x2="494" y2="752" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="582" y1="690" x2="582" y2="752" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="670" y1="690" x2="670" y2="752" stroke="#9CA3AF" stroke-width="1"/>

  <text x="274" y="710" font-size="9" text-anchor="middle" fill="#6B7280">&#167;3.18.1</text>
  <text x="274" y="724" font-size="9" text-anchor="middle" fill="#1F2937">Correlated</text>
  <text x="274" y="738" font-size="9" text-anchor="middle" fill="#1F2937">Shadow</text>

  <text x="362" y="710" font-size="9" text-anchor="middle" fill="#6B7280">&#167;3.18.2</text>
  <text x="362" y="724" font-size="9" text-anchor="middle" fill="#1F2937">Monitor</text>
  <text x="362" y="738" font-size="9" text-anchor="middle" fill="#1F2937">Self-Verify</text>

  <text x="450" y="710" font-size="9" text-anchor="middle" fill="#6B7280">&#167;3.18.3</text>
  <text x="450" y="724" font-size="9" text-anchor="middle" fill="#1F2937">Provocation</text>
  <text x="450" y="738" font-size="9" text-anchor="middle" fill="#1F2937">Test</text>

  <text x="538" y="710" font-size="9" text-anchor="middle" fill="#6B7280">&#167;3.18.4</text>
  <text x="538" y="724" font-size="9" text-anchor="middle" fill="#1F2937">Trust</text>
  <text x="538" y="738" font-size="9" text-anchor="middle" fill="#1F2937">Gradient</text>

  <text x="626" y="710" font-size="9" text-anchor="middle" fill="#6B7280">&#167;3.18.5</text>
  <text x="626" y="724" font-size="9" text-anchor="middle" fill="#1F2937">IAME</text>
  <text x="626" y="738" font-size="9" text-anchor="middle" fill="#1F2937">Envelope</text>

  <text x="714" y="710" font-size="9" text-anchor="middle" fill="#6B7280">&#167;3.18.6</text>
  <text x="714" y="724" font-size="9" text-anchor="middle" fill="#1F2937">Quarantine</text>
  <text x="714" y="738" font-size="9" text-anchor="middle" fill="#1F2937">+ Rollback</text>

  <!-- Layer Discipline Rule callout -->
  <rect x="90" y="776" width="668" height="62" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="102" y="794" font-size="11" font-weight="700" fill="#1F2937">LAYER DISCIPLINE RULE</text>
  <text x="102" y="810" font-size="10" fill="#1F2937">No layer-skipping. Mandatory transformation at each boundary -</text>
  <text x="102" y="824" font-size="10" fill="#1F2937">ABSTRACT (up) when reasoning upward, SPECIALIZE (down) when acting downward.</text>

  <!-- Integration Principle callout -->
  <rect x="90" y="854" width="668" height="62" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="102" y="872" font-size="11" font-weight="700" fill="#1F2937">INTEGRATION PRINCIPLE</text>
  <text x="102" y="888" font-size="10" fill="#1F2937">In any operation involving M-Generative and M-Constraining agents,</text>
  <text x="102" y="902" font-size="10" fill="#1F2937">an M-Integrative agent must be present (the highlighted column).</text>

  <!-- Legend -->
  <rect x="90" y="940" width="560" height="106" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="102" y="958" font-size="11" font-weight="700" fill="#1F2937">LEGEND</text>
  <rect x="102" y="967" width="16" height="12" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="126" y="976" font-size="10" fill="#1F2937">Sapphire Pale tint = M-Generative and M-Integrative mode columns</text>
  <rect x="102" y="985" width="16" height="12" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1"/>
  <text x="126" y="994" font-size="10" fill="#1F2937">Cool Neutral tint = M-Constraining mode column</text>
  <rect x="102" y="1003" width="16" height="12" fill="none" stroke="#0A3B85" stroke-width="2.5"/>
  <text x="126" y="1012" font-size="10" fill="#1F2937">2.5px sapphire stroke = M-Integrative synthesis cell (REQUIRED at every layer)</text>
  <line x1="102" y1="1026" x2="118" y2="1026" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d01)"/>
  <text x="126" y="1030" font-size="10" fill="#1F2937">Solid 2px arrows = mandatory layer transformations (SPECIALIZE down, ABSTRACT up)</text>

  <!-- Caption notes -->
  <text x="40" y="1066" font-size="9" fill="#6B7280">Bold-stroked cells (M-Integrative column) mark the synthesis function present at every operational layer.</text>
  <text x="40" y="1080" font-size="9" fill="#6B7280">Mode descriptions are illustrative; actual agent behaviors per layer are configured via archetype declarations (see D04).</text>
</svg>
