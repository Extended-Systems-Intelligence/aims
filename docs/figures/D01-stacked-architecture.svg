<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" font-family="Helvetica, Arial, sans-serif">
  <!-- AIMS D01 — Stacked Architecture: Operational Layers, Functional Modes, Safety Substrate -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->

  <defs>
    <marker id="arrow_d1" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="black"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="270" y="285" font-size="18" font-weight="bold">D01</text>
  <text x="270" y="310" font-size="13" font-style="italic">AIMS Stacked Architecture — Operational Layers, Functional Modes, Safety Substrate</text>
  <text x="270" y="332" font-size="10">Source: AIMS specification §2.1 (Four Operational Layers), §2.2 (Three Functional Modes), §3.18 (Safety Substrate)</text>

  <!-- Top column headers (mode bands) -->
  <text x="425" y="365" font-size="11" font-weight="bold" text-anchor="middle">M-GENERATIVE</text>
  <text x="425" y="378" font-size="9" text-anchor="middle" font-style="italic">"yes"</text>
  <text x="425" y="389" font-size="9" text-anchor="middle" font-style="italic">exploration</text>

  <text x="535" y="365" font-size="11" font-weight="bold" text-anchor="middle">M-CONSTRAINING</text>
  <text x="535" y="378" font-size="9" text-anchor="middle" font-style="italic">"no"</text>
  <text x="535" y="389" font-size="9" text-anchor="middle" font-style="italic">boundary enforcement</text>

  <text x="645" y="365" font-size="11" font-weight="bold" text-anchor="middle">M-INTEGRATIVE</text>
  <text x="645" y="378" font-size="9" text-anchor="middle" font-style="italic">"it depends"</text>
  <text x="645" y="389" font-size="9" text-anchor="middle" font-style="italic">synthesis</text>

  <!-- Vertical mode-band guides (lightly emphasizing M-Integrative) -->
  <line x1="370" y1="395" x2="370" y2="700" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="480" y1="395" x2="480" y2="700" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="590" y1="395" x2="590" y2="700" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="700" y1="395" x2="700" y2="700" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Layer rows: each is a horizontal band labeled on the LEFT, with 3 mode cells -->

  <!-- L-INTENT row (top) -->
  <text x="265" y="420" font-size="12" font-weight="bold">L-INTENT</text>
  <text x="265" y="437" font-size="9" font-style="italic">why / who</text>
  <text x="265" y="452" font-size="9" font-style="italic">strategic purpose</text>

  <rect x="370" y="395" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="425" y="425" font-size="10" text-anchor="middle">propose</text>
  <text x="425" y="440" font-size="10" text-anchor="middle">intents,</text>
  <text x="425" y="455" font-size="10" text-anchor="middle">objectives</text>

  <rect x="480" y="395" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="535" y="425" font-size="10" text-anchor="middle">policy &amp;</text>
  <text x="535" y="440" font-size="10" text-anchor="middle">authority</text>
  <text x="535" y="455" font-size="10" text-anchor="middle">scope check</text>

  <rect x="590" y="395" width="110" height="70" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="645" y="420" font-size="10" text-anchor="middle">approved</text>
  <text x="645" y="435" font-size="10" text-anchor="middle">objective</text>
  <text x="645" y="450" font-size="10" text-anchor="middle">(synthesized)</text>
  <text x="645" y="462" font-size="9" text-anchor="middle" font-style="italic">REQUIRED</text>

  <!-- Transformation arrow between L-Intent and L-Plan -->
  <line x1="535" y1="465" x2="535" y2="490" stroke="black" stroke-width="1.5" marker-end="url(#arrow_d1)"/>
  <text x="545" y="481" font-size="9" font-style="italic">SPECIALIZE</text>

  <!-- L-PLAN row -->
  <text x="265" y="515" font-size="12" font-weight="bold">L-PLAN</text>
  <text x="265" y="532" font-size="9" font-style="italic">what / when</text>
  <text x="265" y="547" font-size="9" font-style="italic">structured plan</text>

  <rect x="370" y="490" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="425" y="520" font-size="10" text-anchor="middle">enumerate</text>
  <text x="425" y="535" font-size="10" text-anchor="middle">candidate</text>
  <text x="425" y="550" font-size="10" text-anchor="middle">plans</text>

  <rect x="480" y="490" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="535" y="520" font-size="10" text-anchor="middle">feasibility,</text>
  <text x="535" y="535" font-size="10" text-anchor="middle">constraints,</text>
  <text x="535" y="550" font-size="10" text-anchor="middle">precedent</text>

  <rect x="590" y="490" width="110" height="70" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="645" y="515" font-size="10" text-anchor="middle">selected plan</text>
  <text x="645" y="530" font-size="10" text-anchor="middle">(weighted</text>
  <text x="645" y="545" font-size="10" text-anchor="middle">judgment)</text>
  <text x="645" y="558" font-size="9" text-anchor="middle" font-style="italic">REQUIRED</text>

  <line x1="535" y1="560" x2="535" y2="585" stroke="black" stroke-width="1.5" marker-end="url(#arrow_d1)"/>
  <text x="545" y="576" font-size="9" font-style="italic">SPECIALIZE</text>

  <!-- L-FORM row -->
  <text x="265" y="610" font-size="12" font-weight="bold">L-FORM</text>
  <text x="265" y="627" font-size="9" font-style="italic">how (concretize)</text>
  <text x="265" y="642" font-size="9" font-style="italic">executable form</text>

  <rect x="370" y="585" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="425" y="615" font-size="10" text-anchor="middle">draft</text>
  <text x="425" y="630" font-size="10" text-anchor="middle">artifact /</text>
  <text x="425" y="645" font-size="10" text-anchor="middle">command</text>

  <rect x="480" y="585" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="535" y="615" font-size="10" text-anchor="middle">syntax,</text>
  <text x="535" y="630" font-size="10" text-anchor="middle">schema,</text>
  <text x="535" y="645" font-size="10" text-anchor="middle">safety lint</text>

  <rect x="590" y="585" width="110" height="70" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="645" y="610" font-size="10" text-anchor="middle">approved</text>
  <text x="645" y="625" font-size="10" text-anchor="middle">artifact</text>
  <text x="645" y="640" font-size="10" text-anchor="middle">(integrated)</text>
  <text x="645" y="652" font-size="9" text-anchor="middle" font-style="italic">REQUIRED</text>

  <line x1="535" y1="655" x2="535" y2="680" stroke="black" stroke-width="1.5" marker-end="url(#arrow_d1)"/>
  <text x="545" y="671" font-size="9" font-style="italic">SPECIALIZE</text>

  <!-- L-EXEC row -->
  <text x="265" y="705" font-size="12" font-weight="bold">L-EXEC</text>
  <text x="265" y="722" font-size="9" font-style="italic">do (act on world)</text>
  <text x="265" y="737" font-size="9" font-style="italic">side effects</text>

  <rect x="370" y="680" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="425" y="710" font-size="10" text-anchor="middle">attempt</text>
  <text x="425" y="725" font-size="10" text-anchor="middle">action,</text>
  <text x="425" y="740" font-size="10" text-anchor="middle">retry path</text>

  <rect x="480" y="680" width="110" height="70" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="535" y="710" font-size="10" text-anchor="middle">authorization,</text>
  <text x="535" y="725" font-size="10" text-anchor="middle">circuit-</text>
  <text x="535" y="740" font-size="10" text-anchor="middle">breakers</text>

  <rect x="590" y="680" width="110" height="70" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="645" y="705" font-size="10" text-anchor="middle">executed</text>
  <text x="645" y="720" font-size="10" text-anchor="middle">action</text>
  <text x="645" y="735" font-size="10" text-anchor="middle">+ outcome</text>
  <text x="645" y="747" font-size="9" text-anchor="middle" font-style="italic">REQUIRED</text>

  <!-- ABSTRACT-up arrow on the FAR LEFT -->
  <line x1="245" y1="730" x2="245" y2="400" stroke="black" stroke-width="2" marker-end="url(#arrow_d1)"/>
  <text x="225" y="565" font-size="11" text-anchor="middle" transform="rotate(-90 225 565)">ABSTRACT  ↑</text>

  <!-- Safety substrate slab (foundation) -->
  <text x="265" y="788" font-size="12" font-weight="bold">SAFETY</text>
  <text x="265" y="803" font-size="12" font-weight="bold">SUBSTRATE</text>
  <text x="265" y="818" font-size="9" font-style="italic">(foundation)</text>

  <rect x="370" y="770" width="330" height="55" fill="none" stroke="black" stroke-width="2.5"/>

  <!-- Six substrate cells -->
  <line x1="425" y1="770" x2="425" y2="825" stroke="black" stroke-width="1"/>
  <line x1="480" y1="770" x2="480" y2="825" stroke="black" stroke-width="1"/>
  <line x1="535" y1="770" x2="535" y2="825" stroke="black" stroke-width="1"/>
  <line x1="590" y1="770" x2="590" y2="825" stroke="black" stroke-width="1"/>
  <line x1="645" y1="770" x2="645" y2="825" stroke="black" stroke-width="1"/>

  <text x="397" y="785" font-size="9" text-anchor="middle">§3.18.1</text>
  <text x="397" y="797" font-size="9" text-anchor="middle">Correlated</text>
  <text x="397" y="809" font-size="9" text-anchor="middle">Shadow</text>

  <text x="452" y="785" font-size="9" text-anchor="middle">§3.18.2</text>
  <text x="452" y="797" font-size="9" text-anchor="middle">Monitor</text>
  <text x="452" y="809" font-size="9" text-anchor="middle">Self-Verify</text>

  <text x="507" y="785" font-size="9" text-anchor="middle">§3.18.3</text>
  <text x="507" y="797" font-size="9" text-anchor="middle">Provocation</text>
  <text x="507" y="809" font-size="9" text-anchor="middle">Test</text>

  <text x="562" y="785" font-size="9" text-anchor="middle">§3.18.4</text>
  <text x="562" y="797" font-size="9" text-anchor="middle">Trust</text>
  <text x="562" y="809" font-size="9" text-anchor="middle">Gradient</text>

  <text x="617" y="785" font-size="9" text-anchor="middle">§3.18.5</text>
  <text x="617" y="797" font-size="9" text-anchor="middle">IAME</text>
  <text x="617" y="809" font-size="9" text-anchor="middle">Envelope</text>

  <text x="672" y="785" font-size="9" text-anchor="middle">§3.18.6</text>
  <text x="672" y="797" font-size="9" text-anchor="middle">Quarantine</text>
  <text x="672" y="809" font-size="9" text-anchor="middle">+ Rollback</text>

  <!-- Layer Discipline Rule callout -->
  <rect x="245" y="855" width="465" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="873" font-size="11" font-weight="bold">LAYER DISCIPLINE RULE</text>
  <text x="255" y="889" font-size="10">No layer-skipping. Mandatory transformation at each boundary —</text>
  <text x="255" y="901" font-size="10">ABSTRACT (↑) when reasoning upward, SPECIALIZE (↓) when acting downward.</text>

  <!-- Integration Principle callout -->
  <rect x="245" y="915" width="465" height="50" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="933" font-size="11" font-weight="bold">INTEGRATION PRINCIPLE</text>
  <text x="255" y="949" font-size="10">In any operation involving M-Generative and M-Constraining agents,</text>
  <text x="255" y="961" font-size="10">an M-Integrative agent must be present (the highlighted column).</text>

  <!-- Bottom legend -->
  <text x="270" y="1000" font-size="8">Bold-stroked cells (M-Integrative column) mark the synthesis function present at every operational layer.</text>
  <text x="270" y="1012" font-size="8">Mode descriptions are illustrative; actual agent behaviors per layer are configured via archetype declarations (see D04).</text>
</svg>
