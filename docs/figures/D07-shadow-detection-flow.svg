<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1270" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- AIMS D07 - Shadow Detection Process Flow -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->
  <!-- Register: XSI Standards (Sapphire) per XSI-Diagram-Design-Guide.md v1.0. Style-B process flow. -->
  <!-- Flow direction (Guide section 12.5): top-to-bottom; the "no" branch returns left to step 1. -->

  <defs>
    <marker id="arrow_d07_data" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#1F2937"/>
    </marker>
    <marker id="arrow_d07_trig" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#EF4444"/>
    </marker>
    <marker id="arrow_d07_wit" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="880" height="1270" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="120" y="44" font-size="20" font-weight="bold" fill="#0F52BA">D07</text>
  <text x="120" y="70" font-size="14" font-weight="bold" fill="#1F2937">Shadow Detection Process Flow - Per-Class Sampling, Thresholding, and Escalation</text>
  <text x="120" y="90" font-size="10" fill="#6B7280">Source: AIMS specification &#167;3.7 (Shadow Profile), &#167;3.18.1 (Correlated), &#167;3.18.3 (Provocation), &#167;3.17.7 (Redistribution)</text>
  <text x="120" y="108" font-size="9.5" font-style="italic" fill="#6B7280">Flow direction: top-to-bottom; the "no" branch loops back left to step 1.</text>

  <!-- Step 1: Agent operates -->
  <text x="262" y="160" font-size="10" font-weight="bold" text-anchor="end" fill="#6B7280">1</text>
  <rect x="280" y="136" width="320" height="56" fill="#DCE7F5" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="440" y="160" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">Agent operates (per archetype)</text>
  <text x="440" y="178" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">L-Intent / L-Plan / L-Form / L-Exec activity</text>

  <line x1="440" y1="192" x2="440" y2="218" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d07_data)"/>

  <!-- Step 2: Enforcer samples per-class metrics (ENFORCER-owned; archetype tint) -->
  <text x="262" y="244" font-size="10" font-weight="bold" text-anchor="end" fill="#6B7280">2</text>
  <rect x="280" y="220" width="320" height="72" fill="#3730A3" fill-opacity="0.13" stroke="#3730A3" stroke-width="2"/>
  <text x="440" y="244" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">Enforcer samples archetype metric</text>
  <text x="440" y="262" font-size="9.5" text-anchor="middle" fill="#1F2937">VISIONARY: constraint_violation_rate</text>
  <text x="440" y="278" font-size="9.5" text-anchor="middle" fill="#1F2937">ENFORCER: false_rejection_rate ... (10 metrics)</text>

  <line x1="440" y1="292" x2="440" y2="318" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d07_data)"/>

  <!-- Step 3: Threshold comparator (decision diamond) -->
  <text x="262" y="366" font-size="10" font-weight="bold" text-anchor="end" fill="#6B7280">3</text>
  <polygon points="440,320 590,372 440,424 290,372" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="440" y="358" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">metric &gt; threshold?</text>
  <text x="440" y="376" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">gradient-weighted</text>
  <text x="440" y="390" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">(low-trust trips earlier)</text>

  <!-- "no" branch loops back to step 1 (normal flow: continue monitoring) -->
  <polyline points="290,372 200,372 200,164 278,164" fill="none" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d07_data)"/>
  <text x="208" y="272" font-size="9.5" font-style="italic" fill="#6B7280">no</text>
  <text x="208" y="286" font-size="9.5" font-style="italic" fill="#6B7280">(continue)</text>

  <!-- "yes" branch: threshold exceeded = triggered detection event -->
  <line x1="440" y1="424" x2="440" y2="450" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow_d07_trig)"/>
  <text x="452" y="442" font-size="9.5" font-style="italic" fill="#6B7280">yes</text>

  <!-- Step 4: Severity classify -->
  <text x="262" y="476" font-size="10" font-weight="bold" text-anchor="end" fill="#6B7280">4</text>
  <rect x="280" y="452" width="320" height="72" fill="#DCE7F5" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="440" y="476" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">Classify severity</text>
  <text x="440" y="494" font-size="9.5" text-anchor="middle" fill="#1F2937">EMERGING / ACTIVE / CRITICAL</text>
  <text x="440" y="510" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">apply gradient aggravator (&#167;3.18.4)</text>

  <line x1="440" y1="524" x2="440" y2="550" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d07_data)"/>

  <!-- Step 5: Provocation test (ARTICULATOR-owned; archetype tint) -->
  <text x="262" y="576" font-size="10" font-weight="bold" text-anchor="end" fill="#6B7280">5</text>
  <rect x="280" y="552" width="320" height="84" fill="#5B21B6" fill-opacity="0.13" stroke="#5B21B6" stroke-width="2"/>
  <text x="440" y="576" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">Articulator runs provocation</text>
  <text x="440" y="594" font-size="9.5" text-anchor="middle" fill="#1F2937">archetype-specific stressor (&#167;3.18.3)</text>
  <text x="440" y="608" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">SHADOW_MODE / SANDBOX target only</text>
  <text x="440" y="622" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">never against production principal</text>

  <line x1="440" y1="636" x2="440" y2="662" stroke="#1F2937" stroke-width="2" marker-end="url(#arrow_d07_data)"/>

  <!-- Step 6: Decision diamond - shadow confirmed? -->
  <text x="262" y="710" font-size="10" font-weight="bold" text-anchor="end" fill="#6B7280">6</text>
  <polygon points="440,664 590,716 440,768 290,716" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="440" y="712" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">shadow signal</text>
  <text x="440" y="728" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">confirmed?</text>

  <!-- left branch: pass = log only (witness emission) -->
  <polyline points="290,716 190,716 190,824 228,824" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow_d07_wit)"/>
  <text x="198" y="748" font-size="9.5" font-style="italic" fill="#6B7280">pass</text>

  <rect x="230" y="804" width="130" height="40" fill="#DCE7F5" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="295" y="829" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#1F2937">witness log</text>

  <!-- right branch: fail/correlated -> escalation (triggered detection event) -->
  <polyline points="590,716 650,716 650,790" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow_d07_trig)"/>
  <text x="598" y="708" font-size="9.5" font-style="italic" fill="#6B7280">fail / corr</text>

  <rect x="530" y="792" width="240" height="70" fill="#FCD34D" fill-opacity="0.35" stroke="#B45309" stroke-width="2"/>
  <text x="650" y="818" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#1F2937">Escalation decision</text>
  <text x="650" y="836" font-size="9.5" text-anchor="middle" fill="#1F2937">circuit-breaker | quarantine</text>
  <text x="650" y="850" font-size="9.5" text-anchor="middle" fill="#1F2937">| autonomy reduction | sovereign</text>

  <!-- Step 6 decision criterion annotation -->
  <text x="440" y="886" font-size="9.5" font-style="italic" text-anchor="middle" fill="#6B7280">decision criterion: signal threshold + correlation across archetypes</text>

  <!-- Severity-Action mapping callout -->
  <rect x="120" y="910" width="640" height="102" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="132" y="930" font-size="11" font-weight="bold" fill="#1F2937">SEVERITY -&gt; AUTO ACTION (gradient impact applied per &#167;3.18.4)</text>
  <text x="132" y="948" font-size="9.5" fill="#1F2937">EMERGING: log + tighten provocation cadence to PT4H; gradient -0.02 (sustained -0.01/event/24h)</text>
  <text x="132" y="964" font-size="9.5" fill="#1F2937">ACTIVE: reduce autonomy; gradient -0.10; archetype review P7D</text>
  <text x="132" y="980" font-size="9.5" fill="#1F2937">CRITICAL: AUTONOMY_REDUCTION_BY_TWO_TIERS; gradient -0.30</text>
  <text x="132" y="996" font-size="9.5" fill="#1F2937">CORRELATED across archetypes (&#167;3.18.1): topology-wide quarantine boundary escalation (&#167;3.18.6)</text>

  <!-- Ownership notes -->
  <text x="120" y="1036" font-size="9" fill="#6B7280">Per-class metrics are sampled by the Enforcer (per &#167;3.17.7 redistribution). Provocation testing is owned by the Articulator</text>
  <text x="120" y="1050" font-size="9" fill="#6B7280">to keep the testing authority structurally distinct from the monitoring authority (per &#167;3.18.2 self-verification rule).</text>

  <!-- Legend (diagram-content only, per Guide section 8) -->
  <rect x="120" y="1074" width="450" height="172" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="132" y="1094" font-size="11" font-weight="bold" fill="#1F2937">LEGEND</text>
  <rect x="132" y="1104" width="24" height="12" fill="#DCE7F5" stroke="#0F52BA" stroke-width="1.5"/>
  <text x="170" y="1114" font-size="10" fill="#1F2937">Sapphire-pale box = process step</text>
  <rect x="132" y="1121" width="24" height="12" fill="#3730A3" fill-opacity="0.13" stroke="#3730A3" stroke-width="2"/>
  <text x="170" y="1131" font-size="10" fill="#1F2937">Indigo tint = ENFORCER-owned step (metric sampling)</text>
  <rect x="132" y="1138" width="24" height="12" fill="#5B21B6" fill-opacity="0.13" stroke="#5B21B6" stroke-width="2"/>
  <text x="170" y="1148" font-size="10" fill="#1F2937">Violet tint = ARTICULATOR-owned step (provocation)</text>
  <polygon points="144,1155 156,1161 144,1167 132,1161" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="170" y="1165" font-size="10" fill="#1F2937">Cool-neutral diamond = decision point</text>
  <rect x="132" y="1172" width="24" height="12" fill="#FCD34D" fill-opacity="0.35" stroke="#B45309" stroke-width="2"/>
  <text x="170" y="1182" font-size="10" fill="#1F2937">Amber box = escalation / alert outcome</text>
  <line x1="132" y1="1195" x2="162" y2="1195" stroke="#1F2937" stroke-width="2"/>
  <text x="170" y="1199" font-size="10" fill="#1F2937">Solid dark = process flow</text>
  <line x1="132" y1="1212" x2="162" y2="1212" stroke="#EF4444" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="170" y="1216" font-size="10" fill="#1F2937">Red dashed = triggered detection event</text>
  <line x1="132" y1="1229" x2="162" y2="1229" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="170" y="1233" font-size="10" fill="#1F2937">Grey dashed = witness emission</text>
</svg>
