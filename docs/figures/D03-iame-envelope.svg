<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1100" font-family="Helvetica, Arial, sans-serif">
  <!-- AIMS D03 - IAME Envelope: Inter-Agent Message Envelope Record Layout -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->

  <defs>
    <marker id="arrow_d3" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="black"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="270" y="285" font-size="18" font-weight="bold">D03</text>
  <text x="270" y="310" font-size="13" font-style="italic">IAME Envelope - Inter-Agent Message Envelope Record Layout</text>
  <text x="270" y="332" font-size="10">Source: AIMS specification §3.18.5 (Inter-Agent Message Integrity)</text>

  <!-- IAME Envelope outer rectangle -->
  <text x="265" y="365" font-size="11" font-weight="bold">SCOPE</text>
  <text x="265" y="378" font-size="9" font-style="italic">intra-deployment,</text>
  <text x="265" y="390" font-size="9" font-style="italic">cross-deployment,</text>
  <text x="265" y="402" font-size="9" font-style="italic">auxiliary, relay</text>
  <text x="265" y="416" font-size="9" font-style="italic">version: 1</text>

  <rect x="370" y="355" width="330" height="380" fill="none" stroke="black" stroke-width="2.5"/>
  <text x="535" y="372" font-size="11" font-weight="bold" text-anchor="middle">InterAgentMessageEnvelope</text>

  <!-- Sender block -->
  <rect x="380" y="382" width="310" height="68" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="388" y="397" font-size="10" font-weight="bold">sender</text>
  <text x="388" y="412" font-size="9">agent_id: string</text>
  <text x="388" y="424" font-size="9">credential_ref: CredentialRef (§3.21)</text>
  <text x="388" y="436" font-size="9">signature: Ed25519 over (header || body)</text>
  <text x="388" y="448" font-size="9">key_epoch: number (rotation tracking)</text>

  <!-- Header block -->
  <rect x="380" y="455" width="310" height="118" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="388" y="470" font-size="10" font-weight="bold">header</text>
  <text x="388" y="485" font-size="9">message_id: ULID (globally ordered)</text>
  <text x="388" y="497" font-size="9">timestamp: ISO8601 with microseconds</text>
  <text x="388" y="509" font-size="9">sequence_number: uint64 (per-sender monotonic)</text>
  <text x="388" y="521" font-size="9">path_id: PathID (per §3.4 topology)</text>
  <text x="388" y="533" font-size="9">message_type: enum (per §3.4)</text>
  <text x="388" y="545" font-size="9">transform_applied: enum (NONE if same-layer)</text>
  <text x="388" y="557" font-size="9">witness_chain_predecessor: WitnessRecordID</text>
  <text x="388" y="569" font-size="9">ttl: Duration   |   replay_nonce: 256-bit</text>

  <!-- Body block -->
  <rect x="380" y="578" width="310" height="68" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="388" y="593" font-size="10" font-weight="bold">body</text>
  <text x="388" y="608" font-size="9">payload: opaque_bytes</text>
  <text x="388" y="620" font-size="9">payload_hash: SHA-256</text>
  <text x="388" y="632" font-size="9">transform_attestation: pre/post hashes +</text>
  <text x="388" y="644" font-size="9">  transformer_signature (Ed25519)</text>

  <!-- Witness attestation block -->
  <rect x="380" y="651" width="310" height="78" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="388" y="666" font-size="10" font-weight="bold">witness_attestation</text>
  <text x="388" y="681" font-size="9" font-style="italic">(added by Witness Layer on write)</text>
  <text x="388" y="693" font-size="9">witness_record_id: WitnessRecordID</text>
  <text x="388" y="705" font-size="9">chain_hash: SHA-256 (links to predecessor)</text>
  <text x="388" y="717" font-size="9">timestamp + witness_signature: Ed25519</text>

  <!-- Verification callout -->
  <rect x="245" y="755" width="465" height="92" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="773" font-size="11" font-weight="bold">RECEIVER VERIFICATION CHECKS</text>
  <text x="255" y="790" font-size="9">- signature_valid     - credential_active     - key_epoch_matches</text>
  <text x="255" y="803" font-size="9">- sequence_monotonic     - ttl_not_expired     - replay_nonce_unseen</text>
  <text x="255" y="816" font-size="9">- witness_chain_intact     - path_valid (per archetype derivation)</text>
  <text x="255" y="829" font-size="9">- transform_required_satisfied (if path crosses layer)</text>
  <text x="255" y="842" font-size="9" font-style="italic">verification_latency_p99: &lt; 1ms     |     payload_size_overhead: ~200 bytes</text>

  <!-- Failure response callout -->
  <rect x="245" y="857" width="465" height="78" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="255" y="875" font-size="11" font-weight="bold">FAILURE RESPONSE (graduated)</text>
  <text x="255" y="892" font-size="9">signature_failure -&gt; gradient -1.0, auto-quarantine, sovereign review</text>
  <text x="255" y="905" font-size="9">sequence_replay -&gt; gradient -0.30, forensic_query_for_replay_origin</text>
  <text x="255" y="918" font-size="9">transform_attestation_invalid -&gt; gradient -0.30, invoke §3.18.2 Ring 3</text>
  <text x="255" y="931" font-size="9">witness_chain_break -&gt; CRITICAL: emergency halt broadcast, all paths PAUSE</text>

  <!-- Bottom legend -->
  <text x="270" y="990" font-size="8">Algorithms: Ed25519 signatures, SHA-256 hashes. Replay cache: 100k entries per path, window = 2x ttl.</text>
  <text x="270" y="1002" font-size="8">No emergency bypass: there is no condition under which an agent may accept an unenveloped or invalid-envelope message.</text>
</svg>
