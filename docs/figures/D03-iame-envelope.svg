<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 796 1471" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <!-- AIMS D03 - IAME Envelope: Inter-Agent Message Envelope Record Layout -->
  <!-- Educational diagram. Sanitized: canonical AIMS engineering lexicon only. -->
  <!-- Register: XSI Sapphire Standards (Technical-light) per XSI-Diagram-Design-Guide v1.0. Record layout - no pillar tints (guide 13.3). -->
  <defs>
    <marker id="arrow_d03" viewBox="0 0 12 8" refX="11" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#1F2937"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="796" height="1471" fill="#FFFFFF"/>
  <text x="32" y="48" font-size="18" fill="#0F52BA" font-weight="bold">D03</text>
  <text x="32" y="72" font-size="13" fill="#1F2937" font-style="italic">IAME Envelope - Inter-Agent Message Envelope Record Layout</text>
  <text x="32" y="90" font-size="10" fill="#6B7280">Source: AIMS specification §3.18.5 (Inter-Agent Message Integrity)</text>
  <rect x="32" y="114" width="130" height="109" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="44" y="137" font-size="11" fill="#1F2937" font-weight="bold">SCOPE</text>
  <text x="44" y="155" font-size="10" fill="#6B7280" font-style="italic">intra-deployment,</text>
  <text x="44" y="173" font-size="10" fill="#6B7280" font-style="italic">cross-deployment,</text>
  <text x="44" y="191" font-size="10" fill="#6B7280" font-style="italic">auxiliary, relay</text>
  <text x="44" y="209" font-size="10" fill="#6B7280" font-style="italic">version: 1</text>
  <rect x="186" y="114" width="376" height="876" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="374" y="138" font-size="12" fill="#0A3B85" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace" font-weight="bold" text-anchor="middle">InterAgentMessageEnvelope</text>
  <rect x="198" y="162" width="352" height="166" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="210" y="185" font-size="12" fill="#0A3B85" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace" font-weight="bold">sender</text>
  <rect x="210" y="196" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="212" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">agent_id: string</text>
  <rect x="210" y="228" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="244" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">credential_ref: CredentialRef (§3.21)</text>
  <rect x="210" y="260" width="328" height="24" fill="#DCE7F5" stroke="#0A3B85" stroke-width="2"/>
  <text x="222" y="276" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">signature: Ed25519 over (header || body)</text>
  <rect x="210" y="292" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="308" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">key_epoch: number (rotation tracking)</text>
  <rect x="198" y="344" width="352" height="294" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="210" y="367" font-size="12" fill="#0A3B85" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace" font-weight="bold">header</text>
  <rect x="210" y="378" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="394" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">message_id: ULID (globally ordered)</text>
  <rect x="210" y="410" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="426" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">timestamp: ISO8601 with microseconds</text>
  <rect x="210" y="442" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="458" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">sequence_number: uint64 (per-sender monotonic)</text>
  <rect x="210" y="474" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="490" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">path_id: PathID (per §3.4 topology)</text>
  <rect x="210" y="506" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="522" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">message_type: enum (per §3.4)</text>
  <rect x="210" y="538" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="554" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">transform_applied: enum (NONE if same-layer)</text>
  <rect x="210" y="570" width="328" height="24" fill="#FFFFFF" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="222" y="586" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">witness_chain_predecessor: WitnessRecordID</text>
  <rect x="210" y="602" width="328" height="24" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="618" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">ttl: Duration   |   replay_nonce: 256-bit</text>
  <rect x="198" y="654" width="352" height="150" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="210" y="677" font-size="12" fill="#0A3B85" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace" font-weight="bold">body</text>
  <rect x="210" y="688" width="328" height="24" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1"/>
  <text x="222" y="704" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">payload: opaque_bytes</text>
  <rect x="210" y="720" width="328" height="24" fill="#DCE7F5" stroke="#0A3B85" stroke-width="2"/>
  <text x="222" y="736" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">payload_hash: SHA-256</text>
  <rect x="210" y="752" width="328" height="40" fill="#DCE7F5" stroke="#0A3B85" stroke-width="2"/>
  <text x="222" y="768" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">transform_attestation: pre/post hashes +</text>
  <text x="222" y="784" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">  transformer_signature (Ed25519)</text>
  <rect x="198" y="820" width="352" height="158" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="210" y="843" font-size="12" fill="#0A3B85" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace" font-weight="bold">witness_attestation</text>
  <text x="210" y="863" font-size="9" fill="#6B7280" font-style="italic">(added by Witness Layer on write)</text>
  <rect x="210" y="878" width="328" height="24" fill="#FFFFFF" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="222" y="894" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">witness_record_id: WitnessRecordID</text>
  <rect x="210" y="910" width="328" height="24" fill="#FFFFFF" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="222" y="926" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">chain_hash: SHA-256 (links to predecessor)</text>
  <rect x="210" y="942" width="328" height="24" fill="#FFFFFF" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="222" y="958" font-size="11" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">timestamp + witness_signature: Ed25519</text>
  <rect x="32" y="1014" width="474" height="123" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="44" y="1037" font-size="11" fill="#1F2937" font-weight="bold">RECEIVER VERIFICATION CHECKS</text>
  <text x="44" y="1057" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">- signature_valid     - credential_active     - key_epoch_matches</text>
  <text x="44" y="1073" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">- sequence_monotonic     - ttl_not_expired     - replay_nonce_unseen</text>
  <text x="44" y="1089" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">- witness_chain_intact     - path_valid (per archetype derivation)</text>
  <text x="44" y="1105" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">- transform_required_satisfied (if path crosses layer)</text>
  <text x="44" y="1121" font-size="10" fill="#6B7280" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace" font-style="italic">verification_latency_p99: &lt; 1ms     |     payload_size_overhead: ~200 bytes</text>
  <rect x="32" y="1153" width="474" height="107" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="44" y="1176" font-size="11" fill="#1F2937" font-weight="bold">FAILURE RESPONSE (graduated)</text>
  <text x="44" y="1196" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">signature_failure -&gt; gradient -1.0, auto-quarantine, sovereign review</text>
  <text x="44" y="1212" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">sequence_replay -&gt; gradient -0.30, forensic_query_for_replay_origin</text>
  <text x="44" y="1228" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">transform_attestation_invalid -&gt; gradient -0.30, invoke §3.18.2 Ring 3</text>
  <text x="44" y="1244" font-size="10" fill="#1F2937" font-family="JetBrains Mono, 'Cascadia Code', Consolas, ui-monospace, monospace">witness_chain_break -&gt; CRITICAL: emergency halt broadcast, all paths PAUSE</text>
  <rect x="32" y="1284" width="455" height="115" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1"/>
  <text x="44" y="1307" font-size="11" fill="#1F2937" font-weight="bold">LEGEND</text>
  <rect x="44" y="1315" width="20" height="12" fill="#DCE7F5" stroke="#9CA3AF" stroke-width="1"/>
  <text x="72" y="1325" font-size="10" fill="#1F2937">Pale fill, 1px grey stroke = identity / authentication field</text>
  <rect x="44" y="1335" width="20" height="12" fill="#DCE7F5" stroke="#0A3B85" stroke-width="2"/>
  <text x="72" y="1345" font-size="10" fill="#1F2937">Pale fill, 2px sapphire-deep stroke = integrity / signature field</text>
  <rect x="44" y="1355" width="20" height="12" fill="#EBEDF3" stroke="#9CA3AF" stroke-width="1"/>
  <text x="72" y="1365" font-size="10" fill="#1F2937">Cool-neutral fill, 1px grey stroke = payload field</text>
  <rect x="44" y="1375" width="20" height="12" fill="#FFFFFF" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="72" y="1385" font-size="10" fill="#1F2937">White fill, 2px dashed grey stroke = witness-chain-linkage field</text>
  <text x="32" y="1423" font-size="10" fill="#6B7280">Algorithms: Ed25519 signatures, SHA-256 hashes. Replay cache: 100k entries per path, window = 2x ttl.</text>
  <text x="32" y="1439" font-size="10" fill="#6B7280">No emergency bypass: there is no condition under which an agent may accept an unenveloped or invalid-envelope message.</text>
</svg>
