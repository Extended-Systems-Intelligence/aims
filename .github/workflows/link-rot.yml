name: Link rot audit

on:
  schedule:
    - cron: '0 12 * * 1'   # Mondays at noon UTC
  workflow_dispatch:

jobs:
  link-rot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: --verbose --no-progress './**/*.md'
          fail: false
