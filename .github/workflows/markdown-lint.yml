name: Markdown lint

on:
  pull_request:
    paths:
      - '**/*.md'
  push:
    branches: [main, develop]
    paths:
      - '**/*.md'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !spec/XSI-AIMS-specification.md
