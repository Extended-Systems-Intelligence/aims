          - "§4.8 Formal-Verification Requirement (FULL-conformance formal-model coverage)"
          - "§3.93.3 Source Ecosystem registration MUSTs (Four-Eyes, egalitarian trust class, required record fields)"
          - "§3.42 Four-Eyes (Serious-Quorum N=2) composition conformance"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            ecosystem_id: "string — candidate Source Ecosystem identity (unique registration key); MUST NOT already be registered"
            taxonomy_class: "enum {EXTERNAL_MARKETPLACE, EXTERNAL_COMMUNITY, EXTERNAL_CUSTOMER, LEGACY_NATIVE} per §3.93.3 — Native is NOT registrable via this tool (Native enters via §3.95.4 Skill Authoring, never the Ingress Pipeline)"
            maintainer: "string — declared ecosystem maintainer identity (§3.93.3 required record field)"
            risk_annotations: "list of OperationalRiskAnnotation — documented operational-risk annotations (§3.93.3); each carries ARCHITECT authorship + ENFORCER validation; annotations sharpen validation depth but MUST NOT raise the Ingress Trust Class"
            attestation_mechanisms: "list of string — declared external attestation mechanisms (§3.93.3 required record field)"
            assigned_ingress_trust_class: "enum — trust class proposed by the inference half; MUST equal the uniformly-low external default (SKI-3.2); LEGACY_NATIVE MAY be one tier above the External default per §3.93.3"
            four_eyes:
              sovereign_sig: "§3.21.3 hybrid Ed25519 + ML-DSA-65 over the canonical record by the Sovereign-issued credential (§3.21)"
              operator_sig: "second §3.42 Four-Eyes signature by an Operator holding cross-ecosystem authority (§3.93.3)"
          out:
            registration_record: "object {ecosystem_id, taxonomy_class, maintainer, risk_annotations, attestation_mechanisms, ingress_trust_class (== egalitarian default, or LEGACY_NATIVE +1), signatures: [sovereign_sig, operator_sig], registered_at} — emitted ONLY on admit; success path emits AUTHORITY_CHANGE"
            witness_record_ref: "ref to the §6 Witness chain entry (AUTHORITY_CHANGE on admit, VETO_REJECTION on refuse)"
          invariant: >-
            Single-shot per ecosystem_id: a call either produces exactly one signed registration record
            (admit, Witness AUTHORITY_CHANGE) or exactly one typed deterministic refusal (Witness
            VETO_REJECTION) — emitted XOR refused exactly once (totality), never both (no-bypass per §3.69).
