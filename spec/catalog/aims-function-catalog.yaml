          retry: "Safe to retry on transport failure — idempotent on ecosystem_id; a retry after a committed registration returns ECOSYSTEM_ALREADY_REGISTERED rather than a second record."
          ordering: "The registration record and its AUTHORITY_CHANGE Witness chain entry are emitted atomically; the Witness chain entry orders strictly after the signed-record commit."
          locks: "Registry write under a per-ecosystem_id write-once lock in the SOVEREIGN PERSISTENT_SUBSTRATE registry store to enforce single-shot; the Four-Eyes composition is assembled before lock acquisition; the processed-set is the abstract realization of the lock."
        test_vectors:
