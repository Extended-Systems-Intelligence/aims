        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [entity_id, signer_role, release_attestation, release_condition_class, reason, transition_timestamp]
            properties:
              entity_id:
                type: string
                description: "Identifier of the registered NamesRegistryEntry (§3.66.7.3.1) to be released. Must resolve to an existing entry whose current_state is QUARANTINED; an unresolved id is ENTITY_NOT_FOUND per §3.66.7.6 N1, a non-QUARANTINED entry is NOT_QUARANTINED."
              signer_role:
                type: string
                enum: [SOVEREIGN, OTHER]
                description: "Requesting principal class. SOVEREIGN = Sovereign credential (the only principal authorized to release per §3.18.6 protocol / §3.66.7.3.2). OTHER = any non-Sovereign principal — never authorized; release is NOT an entity-self transition (cf. the §3.32.1 self-transition handled by names.update_entity_state)."
              release_attestation:
                type: string
                description: "The §3.18.6 release-condition-satisfaction proof — the opaque attestation evidencing that the entity's quarantine release-condition (per its release_condition_class) is met. Verified against the entity's recorded §3.18.6 release condition; an absent or failing proof is RELEASE_CONDITION_UNSATISFIED."
              release_condition_class:
                type: string
                enum: [FORENSIC_CLEARANCE, CONFIGURATION_FIX, MODEL_ROLLBACK, SOVEREIGN_DECREE, EXPIRATION_WITH_ATTESTATION, NEVER_RELEASE]
                description: "The §3.18.6 release-condition class the attestation claims to satisfy; recorded as release_condition_ref on the §3.66.7.5 registry.entity.released event. NEVER_RELEASE forecloses any release and yields RELEASE_CONDITION_UNSATISFIED."
              reason:
                type: string
                description: "Reason class recorded on the §3.66.7.4 quarantine-release record (e.g. §3.18.6 forensic clearance obtained, configuration fix applied, model rollback completed)."
              transition_timestamp:
                type: string
                format: date-time
                description: "Timestamp of the release transition, recorded on the §3.66.7.4 quarantine-release record."
          out:
            type: object
            description: "On success: a signed Names Registry quarantine-release record persisted to the Sovereign's canonical registry on PERSISTENT_SUBSTRATE; current_state transitions QUARANTINED -> ACTIVE and is broadcast as a signed registry-delta via §3.20 DCP within the PT1S staleness bound. Key/signature material never crosses the §3.65 boundary in cleartext — only an opaque SIGNED_RECORD handle plus the Witness anchor."
            required: [status, release_record_handle, prior_state, new_state, release_condition_ref, witness_id]
            properties:
              status:
                type: string
                enum: [RELEASED, REFUSED]
              release_record_handle:
                type: string
                description: "Opaque handle to the §3.21.3 HYBRID-signed (Ed25519+ML-DSA-65, Stage 1) quarantine-release record; absent when status=REFUSED."
              prior_state:
                type: string
                enum: [ACTIVE, QUARANTINED, DEACTIVATED, FIRST_INSTANCE_WINDOW]
                description: "The current_state observed before the release (QUARANTINED on success, per the §3.66.7.5 registry.entity.released required fields); absent when status=REFUSED with ENTITY_NOT_FOUND."
              new_state:
                type: string
                enum: [ACTIVE]
                description: "The current_state after a successful release; always ACTIVE per the §3.18.6 QUARANTINED -> ACTIVE transition."
              release_condition_ref:
                type: string
                description: "Reference to the satisfied §3.18.6 release-condition class (the registry.entity.released required field per §3.66.7.5); present only on success."
              refusal_reason:
                type: string
                enum: [ENTITY_NOT_FOUND, NOT_QUARANTINED, RELEASE_CONDITION_UNSATISFIED, NOT_AUTHORIZED]
                description: "Present only when status=REFUSED."
              witness_id:
                type: string
                description: "§6 hash-chain anchor for AUTHORITY_CHANGE (success — registry.entity.released per §3.66.7.5) or VETO_REJECTION (refusal per §3.69)."
          invariant: "A call emits a signed quarantine-release record XOR is refused with exactly one typed reason, never both (no-bypass per §3.69); current_state is mutated (QUARANTINED -> ACTIVE) ONLY when the entity exists, is currently QUARANTINED, the supplied release_attestation satisfies the entity's §3.18.6 release condition, and the requesting principal is the Sovereign (precondition-gate); on any refusal the prior QUARANTINED current_state is preserved; new_state is always ACTIVE on success; signing-key material never appears in output — only an opaque SIGNED_RECORD handle crosses the §3.65 boundary."
        errors:
          - "ENTITY_NOT_FOUND — entity_id not present in the Names Registry. Refuse; emit VETO_REJECTION; no quarantine-release record; registry unchanged (§3.66.7.6 N1). Caller MUST NOT proceed with an unresolved entity."
          - "NOT_QUARANTINED — the entity's current_state is not QUARANTINED (release is the QUARANTINED -> ACTIVE transition only per §3.66.7.3.2 / §3.18.6; an ACTIVE, DEACTIVATED, or FIRST_INSTANCE_WINDOW entry cannot be released). Refuse; emit VETO_REJECTION; current_state preserved."
          - "RELEASE_CONDITION_UNSATISFIED — the supplied release_attestation does not satisfy the entity's §3.18.6 release condition (absent/failing proof, or a NEVER_RELEASE class). Refuse; emit VETO_REJECTION; current_state preserved (the entity stays contained per §3.18.6 state-preserving semantics)."
          - "NOT_AUTHORIZED — the requesting principal is not the Sovereign (release authority rests with the §3.18.6 protocol / §3.66.7.3.2; release is not an entity-self transition). Refuse; emit VETO_REJECTION; current_state preserved; surfaces a SCHISM-relevant attempt for §3.18.1 correlation."
        concurrency:
          idempotency_key: "(entity_id) — a release request against an entity already in ACTIVE (already released) is NOT a release no-op success: it is dispositioned as NOT_QUARANTINED (the entity is no longer in the releasable state), so a duplicate release after commit refuses deterministically rather than emitting a second authoritative delta. The single committed release is the authoritative QUARANTINED -> ACTIVE transition."
          retry: "Safe to retry on transport failure before commit: a retry either resolves to the committed RELEASED outcome (if the release record committed and the entity is now ACTIVE — observable via lookup) or re-evaluates the gate against current state. After a committed release, a re-issued request refuses NOT_QUARANTINED (deterministic). Refusals are deterministic given identical (registry-state, input) and may be retried without state change. On a §3.66.7.6 N4 write-consistency failure (Sovereign substrate unreachable) the write is rejected and the release does not complete — the entity remains QUARANTINED; escalate per §3.5; do not assume partial application."
          ordering: "The signed quarantine-release-record commit on the Sovereign's canonical registry is the linearization point; the §3.20 DCP signed-delta broadcast to cache substrates (PT1S staleness bound) and the §3.18.1 Correlated Shadow Detection correlation observe the committed record and are sequenced after it."
          locks: "Per-entity single-writer lock on the NamesRegistryEntry current_state field (PERSISTENT_SUBSTRATE) for the compare-and-set QUARANTINED -> ACTIVE transition; canonical writes go to the Sovereign substrate per §3.66.7.3.2 write-consistency. The lock serializes release against any concurrent quarantine / state-update on the same entry."
        test_vectors:
          - "CTS-SOV-FN080-01: registered entity e1 (current_state=QUARANTINED), signer=SOVEREIGN, release_attestation satisfies a FORENSIC_CLEARANCE §3.18.6 condition -> status=RELEASED, opaque SIGNED_RECORD handle, AUTHORITY_CHANGE emitted (registry.entity.released prior=QUARANTINED new=ACTIVE, release_condition_ref=FORENSIC_CLEARANCE), e1.current_state transitions to ACTIVE."
          - "CTS-SOV-FN080-02: registered entity e1 (current_state=ACTIVE), signer=SOVEREIGN, valid attestation -> status=REFUSED, refusal_reason=NOT_QUARANTINED (release is QUARANTINED -> ACTIVE only per §3.66.7.3.2 / §3.18.6), VETO_REJECTION emitted, current_state preserved."
          - "CTS-SOV-FN080-03: registered entity e1 (current_state=QUARANTINED), signer=SOVEREIGN, release_attestation absent/fails the §3.18.6 release condition (or NEVER_RELEASE class) -> status=REFUSED, refusal_reason=RELEASE_CONDITION_UNSATISFIED, VETO_REJECTION emitted, e1 stays QUARANTINED."
          - "CTS-SOV-FN080-04: entity_id not in the registry, signer=SOVEREIGN, valid attestation -> status=REFUSED, refusal_reason=ENTITY_NOT_FOUND (§3.66.7.6 N1), VETO_REJECTION emitted, no record."
          - "CTS-SOV-FN080-05: registered entity e1 (current_state=QUARANTINED), signer=OTHER (non-Sovereign), valid attestation -> status=REFUSED, refusal_reason=NOT_AUTHORIZED (release authority rests with the §3.18.6 protocol / Sovereign per §3.66.7.3.2), VETO_REJECTION emitted, current_state preserved."
          - "CTS-SOV-FN080-06: every call dispositioned exactly once (emit XOR refuse) across the full input cross-product — totality / malformed-input safety."
        substrate_interface: "§3.65 cryptographic boundary: the §3.21.3 HYBRID Ed25519+ML-DSA-65 (Stage 1) signing operation over the quarantine-release record executes inside the Sovereign's persistent-substrate enclave (the canonical substrate for the authoritative QUARANTINED -> ACTIVE write); the §3.18.6 release_attestation is verified inside the enclave against the entity's recorded release condition. The signing private key (sovereign_credential) never crosses the boundary; only the opaque SIGNED_RECORD handle and the §6 Witness anchor (AUTHORITY_CHANGE on success via registry.entity.released; VETO_REJECTION on refusal) are returned across the boundary. The canonical NamesRegistryEntry lives on the Sovereign's PERSISTENT_SUBSTRATE; cache substrates apply the signed registry-delta broadcast via §3.20 DCP within the PT1S staleness bound (§3.66.7.3.2). The Names Registry is part of the in-seal identity subsystem (§3.65 boundary residency); per-principal identity material is never federated."
