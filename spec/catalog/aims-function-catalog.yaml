        substrate_interface: "§3.65 cryptographic boundary: session credential validation and the bound-session-record anchoring execute inside the SOVEREIGN persistent-substrate enclave (§13.1.3.1); the principal session credential material and the sovereign_credential / ERM-derived key material never cross the boundary — only an opaque bound-session handle and the §6 Witness anchor (AUTHORITY_CHANGE on success per §13.0.4.1; VETO_REJECTION on refusal per §3.69) are returned. The §13.0 session-state row lives on PERSISTENT_SUBSTRATE under the per-principal single-writer discipline (§13.1.3.1); the bound session is the root the §14 Authority Cascade IAME signature chains terminate at per §13.0.2. Substrate-mismatch rejections emit the §6.3-catalogued reason codes."
