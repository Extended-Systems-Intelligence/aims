          - "sovereign_credential (Sovereign-issued credential per §3.21; the AUTHORITY_TRANSFER message is signed with the §3.21.3 HYBRID Ed25519+ML-DSA-65 primitive (Stage 1) inside the §3.65 boundary on the SOVEREIGN persistent substrate; only an opaque transfer-message handle crosses the boundary)"
