              induction_approval_ref:
                type: string
                description: "Reference to the prior induction approval (pms.induction.approve_persistent_monitor, §13.1.5.1 tool 10) establishing candidate eligibility."
              quorum_attestation:
                type: object
                description: "The §3.42 Serious-Quorum (N=2) attestation approving the certification, SOVEREIGN as one approving principal, per §3.94.3. Produced via quorum.sign_serious_quorum (§13.1.5.1 tool 4). A hard precondition; validated VALID|INSUFFICIENT at the formal layer."
                required: [quorum_id, tier, approving_principals, seal]
                properties:
                  quorum_id: { type: string }
                  tier: { type: string, enum: [SERIOUS] }
                  approving_principals: { type: array, items: { type: string }, description: "MUST include SOVEREIGN; length N=2 at the Serious tier." }
                  seal: { type: string }
