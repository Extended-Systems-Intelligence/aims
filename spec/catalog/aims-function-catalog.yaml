  - id: FN-115
    name: bridge_attestation_verify
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Verify a BridgeAttestationRecord per §3.87.9.2. Mutual attestation
