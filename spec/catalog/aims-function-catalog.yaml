          out:
            type: object
            description: "On success: a signed ACTIVE certification grant record. Key/signature material never crosses the §3.65 boundary in cleartext — only an opaque SIGNED_RECORD handle plus the Witness anchor."
            required: [status, certification_grant_handle, witness_id]
            properties:
              status:
                type: string
                enum: [GRANTED, REFUSED]
              certification_grant_handle:
                type: string
                description: "Opaque handle to the §3.21.3 HYBRID-signed (Ed25519+ML-DSA-65, Stage 1) certification grant record { certification_id (uuid), candidate_entity_id, certification_scope, status=ACTIVE, issued_at } persisted to the SOVEREIGN persistent substrate; absent when status=REFUSED."
              refusal_reason:
                type: string
                enum: [INSUFFICIENT_QUORUM, ALREADY_CERTIFIED, NOT_INDUCTION_APPROVED, INVALID_SOVEREIGN_CREDENTIAL, SCOPE_EXCEEDS_CAPABILITY_ENVELOPE, UNKNOWN_CANDIDATE_ENTITY]
                description: "Present only when status=REFUSED."
              witness_id:
                type: string
                description: "§6 hash-chain anchor for AUTHORITY_CHANGE (success, per §3.99.9) or VETO_REJECTION (refusal, per §3.69)."
          invariant: "A valid §3.42 Serious-Quorum attestation (SOVEREIGN one principal) is a hard precondition — no grant is signed without it (quorum-gate). Single-shot: at most one ACTIVE certification per candidate_entity_id. A call emits a signed ACTIVE grant record XOR is refused with exactly one typed reason, never both (no-bypass per §3.69). A grant is signed ONLY when (a) a valid quorum attestation is present, (b) the candidate is INDUCTION_APPROVED, (c) a valid Sovereign credential is presented, and (d) the requested scope is within the candidate's capability envelope. Signing-key material never appears in output — only an opaque SIGNED_RECORD handle crosses the §3.65 boundary."
        errors:
          - "INSUFFICIENT_QUORUM — no valid §3.42 Serious-Quorum attestation, or quorum below the N=2 Serious tier, or SOVEREIGN absent from the approving principals (§3.94.3). Refuse; emit VETO_REJECTION; no signed grant record; candidate stays uncertified. This is the load-bearing quorum-gate refusal mandated by the §3.94.3 high-stakes routing."
          - "ALREADY_CERTIFIED — candidate already holds an ACTIVE Persistent Monitor certification (single-shot idempotency boundary). Refuse; emit VETO_REJECTION; do NOT emit a second AUTHORITY_CHANGE record. The first grant remains canonical."
          - "NOT_INDUCTION_APPROVED — no valid prior induction approval for the candidate (pms.induction.approve_persistent_monitor precondition unmet). Refuse; emit VETO_REJECTION; no signed record."
          - "INVALID_SOVEREIGN_CREDENTIAL — supplied credential handle does not resolve to a valid §3.21 Sovereign-issued signing credential. Refuse; emit VETO_REJECTION; emit nothing else."
          - "SCOPE_EXCEEDS_CAPABILITY_ENVELOPE — requested certification_scope exceeds the candidate's archetype-derived capability envelope (ENFORCER §3.99.3 scope-validation failure surfaced pre-emission). Refuse; emit VETO_REJECTION; no signed record."
          - "UNKNOWN_CANDIDATE_ENTITY — candidate_entity_id does not resolve in the §3.66.7 Names Registry. Refuse; emit VETO_REJECTION; no grant record and no AUTHORITY_CHANGE entry (a refused call is totally dispositioned into the refusal set; no partial/orphaned grant)."
        concurrency:
          idempotency_key: "candidate_entity_id — at most one ACTIVE certification per candidate; a repeated grant attempt against an already-ACTIVE-certified candidate is refused ALREADY_CERTIFIED, never duplicated."
          retry: "Safe to retry on transient substrate-write failure: a retry either finds no ACTIVE certification (re-attempts the grant, quorum precondition re-checked) or finds the prior grant ACTIVE (refused ALREADY_CERTIFIED) — at-most-once ACTIVE certification is preserved either way. Refusals are deterministic given identical input and may be retried without state change."
          ordering: "Grant emission and its AUTHORITY_CHANGE Witness append are sequenced atomically on the SOVEREIGN-owned persistent substrate; the §6 chain entry is appended before the grant is observable to downstream ENFORCER scope-validation. The §3.42 quorum convening completes before this deterministic emission begins (quorum is a precondition, not a co-emission)."
          locks: "Per-candidate certification single-writer lock on the SOVEREIGN-owned TMS store (CRUD lock-state class per §3.99.4) serializes concurrent grant attempts for the same candidate_entity_id, enforcing single-shot under concurrency; TMS is single-writer per §3.99."
        test_vectors:
          - "CTS-SOV-FN055-01: candidate INDUCTION_APPROVED + valid §3.42 Serious-Quorum attestation (SOVEREIGN one principal) + valid Sovereign credential + in-envelope scope -> status=GRANTED, opaque SIGNED_RECORD handle, AUTHORITY_CHANGE emitted (§3.99.9)."
          - "CTS-SOV-FN055-02: missing/insufficient quorum attestation (no SOVEREIGN principal, or tier < SERIOUS) -> status=REFUSED, refusal_reason=INSUFFICIENT_QUORUM, VETO_REJECTION emitted, no grant record (quorum-gate)."
          - "CTS-SOV-FN055-03: second grant attempt on an already-ACTIVE-certified candidate -> status=REFUSED, refusal_reason=ALREADY_CERTIFIED, VETO_REJECTION emitted, no second AUTHORITY_CHANGE (single-shot)."
          - "CTS-SOV-FN055-04: candidate without prior induction approval -> status=REFUSED, refusal_reason=NOT_INDUCTION_APPROVED, VETO_REJECTION emitted, no record."
          - "CTS-SOV-FN055-05: invalid/absent Sovereign credential handle -> status=REFUSED, refusal_reason=INVALID_SOVEREIGN_CREDENTIAL, VETO_REJECTION emitted, nothing else (no-bypass: never an unsigned grant)."
          - "CTS-SOV-FN055-06: requested scope exceeds candidate capability envelope -> status=REFUSED, refusal_reason=SCOPE_EXCEEDS_CAPABILITY_ENVELOPE, VETO_REJECTION emitted, no record."
          - "CTS-SOV-FN055-07: signing material never appears in observable state — only an opaque SIGNED_RECORD handle is present on the emitted record; every call dispositioned exactly once (emit XOR refuse) — totality / malformed-input safety."
        substrate_interface: "§3.65 cryptographic boundary: the §3.21.3 HYBRID Ed25519+ML-DSA-65 (Stage 1) signing operation over the certification grant record executes inside the SOVEREIGN persistent-substrate enclave; the sovereign_credential private key and ERM-derived key material never cross the boundary. The §3.42 Serious-Quorum attestation is verified as a precondition input; only an opaque SIGNED_RECORD handle and the §6 Witness anchor (AUTHORITY_CHANGE on success per §3.99.9; VETO_REJECTION on refusal per §3.69) are returned across the boundary. ENFORCER scope-validation (§3.99.3) and the persisted grant record anchor to the Witness chain per §3.99.9; the certification state row lives on PERSISTENT_SUBSTRATE under the single-writer TMS discipline (§3.99). Substrate-mismatch rejections emit the §6.3-catalogued reason codes per (integrated at §3.89)."
