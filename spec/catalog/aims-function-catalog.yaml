        provenance: "Synthesized from the SOVEREIGN operational sections — NOT one of the §13.1.5.1/.2/.3 inventory tools. Behavioral grounding: §13.1.9 Phase 6 (Plan Confirmation — the Sovereign integrates the §14 Phase 5 L-Plan return into a single confirmed plan; outcome (a) plan consistent with user intent proceeds to Phase 7) + §13.1.9 Phase 7 (Authority Transfer — the Sovereign emits the AUTHORITY_TRANSFER message to the Orchestrator via PATH-03; the four deterministic verification checks MUST pass before emission) + §14 §3.17.X Authority Cascade Flow (the §14 alias; Phase 5→6→7 of the 10-phase cascade) + §13.0.3 (clarification-dialogue user-confirmed intent — gate 1 referent) + §13.0.4 (session lifecycle — gate 2 referent, ACTIVE required) + §13.1.8.3 (Sovereign Ring 1-2 self-verification posture — gate 3) + §13.1.7 (SCHISM CRITICAL shadow — gate 4). Typed slots verbatim: kind=PROCESS, class=DETERMINISTIC, substrate=PERSISTENT_SUBSTRATE, authority=SOVEREIGN_CREDENTIAL, paths=[PATH-03]. The four-gate ratification structure is the same as the FN-093 (§13.1.5.3.5) / FN-065 (§13.1.5.1.11) deterministic half; this PROCESS differs in that it spans the multi-step Phase 6 confirmation + Phase 7 emission rather than the single FN-065 emission tool, and is DETERMINISTIC (no inference half — the consistency verdict is dispositioned upstream). §3.69 grounding: §3.69.2 (authority-bearing consequence classes — message production, authority-chain operations — are deterministic-only) + §3.69.3 (cryptographic capability confinement: no LLM-class component holds signing authority) + §3.69.4 VETO_REJECTION on rejection. AUTHORITY_TRANSFER is emitted only on PATH-03 (the post-planning authority-transfer exception per §9.5)."
