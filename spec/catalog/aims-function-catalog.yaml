        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [archetype]
            properties:
              archetype:
                type: string
                description: "Archetype identifier to enumerate (the §3.66.7.3.1 archetype_or_tier value for ARCHETYPE-class entries, e.g. EXECUTOR), resolving ALL matching NamesRegistryEntry items (e.g. all Executor instances if multiple are registered per §3.66.7.10.1 SUB_ENTITY addressing). Modeled at the formal layer as a query archetype against the registered (entity, archetype) set."
