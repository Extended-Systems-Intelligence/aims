        # ---- 9 queryable attributes ----
        counterparties:
          - "SOVEREIGN (owner/holder of the canonical Names Registry — and therefore of SUB_ENTITY identity — on its persistent substrate per §3.66.7.10.6 + §3.66.7.3.2; signs the fresh registry snapshots that bound cache staleness at PT1S)"
          - "ORCHESTRATOR (coordinates cross-instance/Environment coherence and resolves SUB_ENTITY addressing per §3.66.7.10.6; the §3.103.21 sub_entity_address.resolve routing decision invokes this §3.66.7.10.5 primitive for the underlying lookup)"
          - "Any-substrate caller (per §3.66.7.3.2 lookup-table semantics, lookups are deterministic substrate operations invocable by any substrate; the requesting substrate reads its local read-only cache or, on staleness, fetches a fresh signed snapshot). Peer-instance callers: SUSTAINER chain-step-5 peer-instance persistence routing (§3.103.9), peer-instance recovery routing (§3.103.35.1), cross-deployment Auxiliary-discovery dedup (§3.103.8)"
          - "RELAY (transmits the §3.20 DCP signed registry-delta / snapshot broadcast; conduit, no store-of-record per §3.66.7.10.6)"
        consensus_role: "NONE — per §3.66.7.3.2 lookups are deterministic substrate operations under Deterministic Shadow Governance, invocable by any substrate; this resolver convenes no §3.42 quorum and contributes no consensus disposition. It is a pure read of the SUB_ENTITY address (or identity hash) to NamesRegistryEntry mapping per §3.66.7.10.5."
        witness_events: []
        shadow_relevance: "NONE-DIRECT (read-only, non-authority-bearing). Per §3.66.7.3.2 lookups are deterministic substrate operations and are NOT Witness-recorded (Witness chain = NO in the operation table); this resolver emits no SCHISM-relevant authority artifact. The SOVEREIGN shadow (SCHISM / directive_consistency_score) is governed by the authority-bearing write-side registry tools (register / update / quarantine / deactivate), not by this read. Integrity of the served entry is backstopped structurally: a stale cache (§3.66.7.6 N2) forces a fresh signed-snapshot fetch before serving; the SUB_ENTITY identity is non-forgeable post-commissioning (§3.66.7.10.2 substrate-attested hash), and routing via this primitive is non-bypassable from the agentic side (§3.66.7.10.5) so a compromised subject instance cannot self-route around the Registry lookup. Cross-instance naming-collision detection (SUB_ENTITY_NAMING_COLLISION) and custodianship-violation detection (NAMES_REGISTRY_CUSTODIANSHIP_VIOLATION) are §3.66.7.10.6 / §3.103.21.1 concerns of the write/custody side, out of this read's scope."
        dismissal_trigger: "NONE — this is a read-only resolver with no signed record and no Witness emission. A lookup miss (§3.66.7.6 N1) is NOT a Witness refusal: it is a normal typed RETURN (status=NOT_FOUND) carrying no entry; the caller MUST NOT proceed with an unresolved SUB_ENTITY per §3.66.7.6 N1. A stale cache (§3.66.7.6 N2) is resolved by a fresh signed-snapshot fetch, not a refusal."
        provenance: "§13.1.5.1 Sovereign deterministic tool inventory item 27 (`names.lookup_by_sub_entity` — N1 2026-06-10; read-only deterministic resolver per §3.66.7.10.5 that resolves a `{ARCHETYPE}.{instance_id}` address or a SUB_ENTITY identity hash to the corresponding NamesRegistryEntry; substrate-resident routing primitive non-bypassable from the agentic side; any substrate may invoke; the canonical registry is Sovereign-owned per §3.66.7.3.2); typed slots verbatim from the FN-081 manifest row (kind=TOOL, class=DETERMINISTIC, substrate=PERSISTENT_SUBSTRATE, authority=STANDING, paths=[]); behavioral grounding §3.66.7.10.5 (Names Registry lookup primitive — addressing-by-SUB_ENTITY + non-bypassability) + §3.66.7.10.6 (Ownership/coherence/witnessing — Sovereign owner, Orchestrator coherence, Relay delta-transmission) + §3.66.7.3.2 (Operational semantics — lookups deterministic substrate operations, Witness=NO; PT1S staleness bound + §3.20 DCP snapshot broadcast) + §3.66.7.3.1 (NamesRegistryEntry data structure incl. the SUB_ENTITY entity_class) + §3.66.7.6 N1/N2/N5 (lookup-miss + stale-cache + federation-scope failure modes)."
        credential_refs: []
        emit_class: NAMES_REGISTRY_ENTRY
        conformance_refs:
          - "§3.66.7.10.5 Names Registry lookup primitive — `names.lookup_by_sub_entity` resolves a `{ARCHETYPE}.{instance_id}` address or a SUB_ENTITY identity hash to the NamesRegistryEntry; substrate-resident routing path, non-bypassable from the agentic side (a compromised subject instance cannot self-route around the Registry lookup)"
          - "§3.66.7.3.2 Names Registry operational semantics — lookups are deterministic-substrate reads (authorization=any substrate; Witness chain=NO) under Deterministic Shadow Governance; PT1S signed-snapshot cache-staleness bound; §3.20 DCP canonical-store snapshot broadcast (CTS family for the Names Registry read path)"
          - "§3.66.7.10.6 Names Registry ownership/coherence/witnessing — Sovereign-owned canonical SUB_ENTITY registry; Orchestrator resolves SUB_ENTITY addressing; under DCP Federation each Environment's Sovereign owns its per-Environment Registry"
          - "§3.66.7.6 Names Registry failure modes — N1 lookup-miss (return not-found; caller MUST NOT proceed with an unresolved entity) + N2 stale-cache (force fresh signed-snapshot fetch before serving) + N5 federation lookup-scope (cross-deployment miss is NOT-FOUND scoped to the local deployment only)"
          - "§3.70 Formal-Verification Requirement (DETERMINISTIC item per §3.70.1 v2.0 rigid-half expansion; required properties §3.70.3 bounded-scope + malformed-input safety + reproducibility; machine-checked model published per §3.70.4)"
          - "§4.8 Formal-Verification Requirement (v2.0 FULL-conformance rigid-half obligation; advertised via the §4.4 Conformance Claim Format `formal_models` field)"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [sub_entity_ref]
            properties:
              sub_entity_ref:
                type: object
                description: "The SUB_ENTITY address to resolve, supplied in exactly one of two forms per §3.66.7.10.5. Modeled at the formal layer as KNOWN (a SUB_ENTITY registered in the canonical registry within the local coherence domain) | UNKNOWN."
                properties:
                  address:
                    type: string
                    description: "Canonical `{ARCHETYPE}.{instance_id}` SUB_ENTITY address per §3.66.7.10.1 (e.g. `ORC.instance-a`, `ENF.instance-1`, `EXE.shared-pool-member-3`)."
                  identity_hash:
                    type: string
                    description: "The SUB_ENTITY cryptographic instance-identity hash per §3.66.7.10.2 (SHA-256 of the §3.65 attestation-chain root + monotonic §13.0.6 commissioning counter); substrate-attested, non-forgeable, non-agentic-supplied."
          out:
            type: object
            description: "On found: the full NamesRegistryEntry (§3.66.7.3.1) for the SUB_ENTITY (entity_class=SUB_ENTITY, with its parent-ARCHETYPE reference per §3.66.7.10.1). On miss: a typed not-found return (NO entry). Read-only — no signed record, no Witness anchor (lookups are deterministic substrate operations per §3.66.7.3.2)."
            required: [status]
            properties:
              status:
                type: string
                enum: [FOUND, NOT_FOUND]
              entry:
                type: object
                description: "The full NamesRegistryEntry per §3.66.7.3.1 for the SUB_ENTITY (entity_id, entity_class=SUB_ENTITY, human_readable_name, parent-ARCHETYPE reference, the bundled declaration references, current_state, endpoint_resolution, lifecycle metadata). Present IFF status=FOUND; absent when status=NOT_FOUND."
              served_from:
                type: string
                enum: [LOCAL_CACHE, CANONICAL_STORE]
                description: "Per §3.66.7.3.2: LOCAL_CACHE when cache freshness is within the PT1S staleness bound; CANONICAL_STORE when a fresh signed snapshot was fetched via §3.20 DCP from the Sovereign-owned canonical store. NOT_FOUND from CANONICAL_STORE is authoritative within the local coherence domain (§3.66.7.6 N5 scoping for federated lookups)."
          invariant: "Returns the entry IFF the SUB_ENTITY address (or identity hash) is present in the Sovereign-owned canonical registry within the local coherence domain (found XOR NOT_FOUND — exactly one outcome per call); a served entry whose backing cache exceeds the PT1S staleness bound MUST be revalidated by a fresh signed-snapshot fetch before serving (§3.66.7.6 N2), so the served entry is never staler than PT1S; routing is non-bypassable from the agentic side (§3.66.7.10.5); read-only — no NamesRegistryEntry field is mutated, no signed record is produced, and no Witness event is emitted (lookups are deterministic substrate operations per §3.66.7.3.2)."
        errors:
          - "NOT_FOUND — the SUB_ENTITY address (or identity hash) has no entry in the canonical registry within the local coherence domain (§3.66.7.6 N1 lookup miss). NOT an exception and NOT a Witness refusal: a normal typed RETURN with no entry. The caller MUST NOT proceed with an unresolved SUB_ENTITY per §3.66.7.6 N1; no state change."
          - "STALE_CACHE (internal, non-caller-facing) — a candidate cache entry exceeds the PT1S staleness bound (§3.66.7.6 N2). The substrate forces a fresh signed-snapshot fetch from the Sovereign canonical store via §3.20 DCP before serving; it does NOT surface a refusal — the resolved outcome is then FOUND or NOT_FOUND. Modeled in TLA+ as the served_from=CANONICAL_STORE path."
          - "FEDERATION_LOOKUP_SCOPE (informational) — for a cross-deployment SUB_ENTITY (e.g. a §3.103.8 cross-deployment Auxiliary-discovery dedup lookup), a failed §3.20 DCP federation lookup returns NOT_FOUND scoped to the local deployment only; the caller MUST NOT assume the SUB_ENTITY is absent globally (§3.66.7.6 N5). Out of this single-deployment read's transactional scope."
        concurrency:
          idempotency_key: "sub_entity_ref (the `{ARCHETYPE}.{instance_id}` address or identity hash) — a pure read; repeated lookups of the same SUB_ENTITY are idempotent and side-effect-free (no registry mutation, no Witness emission). Two concurrent lookups of the same SUB_ENTITY observe the same snapshot-bounded value within the PT1S staleness window."
          retry: "Freely retryable: a read has no side effects. A retry resolves to FOUND (with the then-current snapshot's entry) or NOT_FOUND deterministically given the registry state at read time. On STALE_CACHE the retry path is the same fresh-snapshot fetch; no duplicate side effect is possible (there are none)."
          ordering: "No ordering anchor — the lookup observes the latest signed snapshot within the PT1S staleness bound. A lookup is causally after the most recent §3.20 DCP snapshot broadcast it has applied; it imposes no ordering on subsequent writes (writes go to the Sovereign canonical store, not through this read)."
          locks: "None on the read path. The local read-only cache is consistent-read (snapshot-bounded); no write lock is acquired. The single-writer / canonical-custody discipline lives entirely on the Sovereign canonical store's write-side tools (§3.66.7.10.6), not on this lookup."
        test_vectors:
          - "CTS-SOV-FN081-01: SUB_ENTITY address `ORC.instance-a` present in the registry, cache fresh (within PT1S) -> status=FOUND, entry=NamesRegistryEntry(ORC.instance-a), served_from=LOCAL_CACHE, no Witness event emitted."
          - "CTS-SOV-FN081-02: SUB_ENTITY identity hash present in the registry, cache fresh -> status=FOUND, entry=NamesRegistryEntry(matching SUB_ENTITY), served_from=LOCAL_CACHE, no Witness event (hash-form addressing per §3.66.7.10.2/.10.5)."
          - "CTS-SOV-FN081-03: SUB_ENTITY address `EXE.shared-pool-member-9` NOT present in the registry -> status=NOT_FOUND, no entry, no Witness event (typed return per §3.66.7.6 N1; caller MUST NOT proceed)."
          - "CTS-SOV-FN081-04: SUB_ENTITY address present but backing cache stale (exceeds PT1S) -> fresh signed-snapshot fetch via §3.20 DCP, then status=FOUND, served_from=CANONICAL_STORE, no Witness event (§3.66.7.6 N2)."
          - "CTS-SOV-FN081-05: cross-deployment SUB_ENTITY absent and §3.20 DCP federation lookup fails -> status=NOT_FOUND scoped to local deployment (§3.66.7.6 N5); caller MUST NOT assume global absence; no Witness event."
          - "CTS-SOV-FN081-06: every call dispositioned exactly once (FOUND XOR NOT_FOUND) across the full input set — totality / malformed-input safety; no call both returns an entry and returns not-found; no call emits a Witness event."
        substrate_interface: "PERSISTENT_SUBSTRATE read path. The canonical Names Registry — and therefore SUB_ENTITY identity — is held on the SOVEREIGN's persistent substrate (§3.66.7.10.6 + §3.66.7.3.2 Ownership and consistency); other substrates hold local read-only caches kept within a PT1S staleness bound by Sovereign-signed snapshot broadcast over §3.20 DCP. lookup_by_sub_entity reads the NamesRegistryEntry (§3.66.7.3.1) keyed by the `{ARCHETYPE}.{instance_id}` address or the §3.66.7.10.2 SUB_ENTITY identity hash from the local cache when fresh; on staleness (§3.66.7.6 N2) it fetches a fresh signed snapshot from the Sovereign canonical store before serving. The resolver is the substrate-resident routing path for peer-instance persistence (§3.103.9), peer-instance recovery (§3.103.35.1), and cross-deployment Auxiliary-discovery dedup (§3.103.8); it is non-bypassable from the agentic side (§3.66.7.10.5). As an in-seal identity-subsystem read (§3.66.7.3.2 Boundary residency), the lookup stays within the internal-IAME domain — no per-principal identity material crosses the §3.65 Cryptographic Boundary; the in-seal identity subsystem is never federated. The read is a deterministic substrate operation under Deterministic Shadow Governance and emits no Witness event."
