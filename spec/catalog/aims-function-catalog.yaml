      - id: FN-058
        name: "Serious Quorum Signing"
        tool_ref: "quorum.sign_serious_quorum"
        kind: TOOL
        class: DETERMINISTIC
        substrate: PERSISTENT_SUBSTRATE
        authority: CRITICAL_QUORUM
        paths: []
        status: ACTIVE
        ver: "2.0"
        sec_ref:
          - "§13.1.5.1.4"
          - "§3.42"
          - "§3.94.3"
        # ---- 9 queryable attributes ----
        counterparties:
          - "SOVEREIGN persistent substrate (signing-key custodian per §3.21)"
          - "co-approving principal — the second of the two §3.94.3 Four-Eyes (N=2) approving principals; the SOVEREIGN is one of the two distinct principals"
          - "Orchestrator (convenes the §3.42 quorum session and classifies the quorum class at pre-synthesis per §3.42)"
          - "Witness Layer per §6 (receives the signature-contribution chain entry)"
        consensus_role: >-
          Deterministic signature-contribution emitter for a §3.42 SERIOUS-tier quorum session, NOT
          the outcome decider. The tool emits one principal's signature share against an OPEN
          SERIOUS-tier session — the §3.94.3 Four-Eyes specialization of the §3.42 Serious Quorum
          (N=2, with the SOVEREIGN as one of the two distinct approving principals per §3.94.3 line
          14086 + §3.95.2). The convened SERIOUS ensemble is the 7-agent 3 G + 3 C + 1 I
          composition with a 2-of-3-per-pillar threshold (§3.42 line 8114). A convened SERIOUS quorum
          session is REQUIRED input; an attempt to sign against a non-SERIOUS / misclassified session,
          an ineligible principal, or a principal who already signed yields a typed deterministic
          refusal (§3.69 deterministic-disposes), never a signature. Aggregate quorum disposition
          (whether N distinct eligible shares are present) is decided outside this single-share tool.
        witness_events:
          - AUTHORITY_CHANGE
          - VETO_REJECTION
        shadow_relevance: >-
          SOVEREIGN shadow is SCHISM (metric directive_consistency_score, §3.16 line 3309 / §13.1.7
          ): the failure mode is the Sovereign emitting mutually inconsistent directives.
          Serious-Quorum signing is a SCHISM containment surface — a §3.94.3 Four-Eyes (N=2) gate
          requires two DISTINCT approving principals, so a Sovereign drifting toward self-inconsistency
          cannot self-authorize a high-stakes §3.42 decision unilaterally. The deterministic gate
          refuses three SCHISM-adjacent fractures with a typed reason (each refusal Witnessed as
          VETO_REJECTION): a share contributed to a non-SERIOUS / misclassified session (tier
          downgrade is itself a §3.18.1 signal per §3.42 line 8118); a share from a principal NOT in
          the convened session's eligible set (a forged-authority path; the §3.104.8
          AUTHORITY_CHAIN_LEDGER_MISMATCH detection event is the catalogued shadow signal for an
          authority claim that fails to reconcile against the §6 ledger); and a SECOND share from a
          principal who already signed (double-signing that would collapse the §3.94.3 two-distinct-
          principal requirement so one will counts as two). No schismatic share is ever admitted.
        dismissal_trigger: >-
          A contributed signature share is dispositioned at emission and does not persist as a standing
          obligation; there is no §3.42.1 Structured Dismissal Protocol dismissal contract for the
          share itself. The enclosing §3.42 quorum session is convened, classified, and dissolved by
          the Orchestrator: an open SERIOUS session that does not reach N distinct eligible shares
          within its §3.42 latency window (SECONDS_TO_MINUTES per §3.42 line 8114) lapses unreached.
          Refused calls are terminal — a typed-reason VETO_REJECTION refusal carries no retry
          obligation.
        provenance: >-
          Source behavior from §13.1.5.1 Deterministic Tools tool 4 (: "produces a Serious
          Quorum signature contribution per §V (Four-Eyes specialization)"). The §V placeholder is the
          only occurrence of "§V" in the spec and is an unresolved anchor; it resolves to
          §3.94.3, which states "Four-Eyes Multi-Sig is the Serious-Quorum-with-N=2 specialization"
           — the canonical Four-Eyes specialization anchor. SOVEREIGN-as-one-of-two-
          approving-principals per §3.95.2 and the §13.4.5.6 CSM table (lines 20375-20376).
          §3.42 Quorum Consensus Architecture: SERIOUS class = 7-agent 3 G + 3 C + 1 I, 2-of-3-per-pillar,
          latency SECONDS_TO_MINUTES, Orchestrator classifies at pre-synthesis, misclassification = a
          §3.18.1 signal (lines 8110-8118). Typed slots (kind/class/substrate/authority/paths) verbatim
          from.
        credential_refs:
          - "Sovereign-issued credential per §3.21 (the SOVEREIGN's own share; signed with the §3.21.3 hybrid Ed25519 + ML-DSA-65 primitive, Stage 1; pure ML-DSA-65 post-2031 Stage 3)"
          - "the contributing principal's signing credential issued under the §3.21 Credential Lifecycle"
        emit_class: WITNESS
        conformance_refs:
          - "§3.70 Formal-Verification Requirement (DETERMINISTIC item; formal model required for FULL)"
          - "§3.69 Deterministic Ratification Pattern (deterministic-disposes refusal to VETO_REJECTION)"
          - "§4.4 Conformance Claim Format (formal_models field pins this model)"
          - "§3.42 Serious-Quorum signature conformance (N=2, SOVEREIGN one principal; CTS-MEM-PMS-016..020, CTS-HGOV-ROUTE-031..035)"
          - "§3.94.3 Four-Eyes Serious-Quorum specialization"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            session_id: "string (UUID of an OPEN §3.42 quorum session convened + classified by the Orchestrator)"
            quorum_class: "enum {SERIOUS} — this tool serves the §3.42 SERIOUS tier only (the §3.94.3 Four-Eyes N=2 specialization rides the Serious tier); CRITICAL is served by quorum.sign_critical_quorum (FN-057)"
            principal_id: "string — the contributing principal's identifier (§3.66.7 Names-Registry-anchored); for the SOVEREIGN's own share this is the Sovereign entity_id"
            decision_ref: "string — reference to the decision/record the quorum is approving (e.g. §3.12 Decision Record id, promotion/forget/registration ref)"
            signing_credential_handle: "opaque §3.65 SEALED handle to the principal's signing credential (§3.21; never the raw key)"
          out:
            disposition: "enum {CONTRIBUTED, REFUSED}"
            signature_contribution: "present iff CONTRIBUTED — {session_id, principal_id, signature (§3.21.3 hybrid Ed25519 + ML-DSA-65 over decision_ref), timestamp}; at most one share per principal per session"
            threshold_reached: "boolean — true iff this contribution brought the session to >= N distinct eligible-principal shares (N = §3.94.3 Four-Eyes parameter, default 2); a returned field, NOT a Witness event"
            refusal_reason: "present iff REFUSED — one of {SESSION_NOT_SERIOUS_TIER, PRINCIPAL_NOT_ELIGIBLE, DUPLICATE_CONTRIBUTION, INSUFFICIENT_QUORUM}"
            witness_record_ref: "ref to the §6 Witness chain entry — AUTHORITY_CHANGE on CONTRIBUTED, VETO_REJECTION on REFUSED"
          invariant: >-
            A call is CONTRIBUTED iff the session is SERIOUS-tier AND principal_id is in the session's
            eligible set AND the principal has no prior share on that session; otherwise REFUSED with
            exactly one typed reason. At most one signature share per (session_id, principal_id) — no
            double-signing (preserves the §3.94.3 two-distinct-principal requirement). threshold_reached
            => session is SERIOUS AND >= N distinct eligible principals contributed. Every call is
            CONTRIBUTED XOR REFUSED exactly once (totality). No call both contributes and is refused
            (no-bypass per §3.69). The raw key never crosses the §3.65 boundary — only the SEALED
            handle in, the §3.21.3 signature value out.
        errors:
          - "SESSION_NOT_SERIOUS_TIER — the convened §3.42 class is not SERIOUS (or is misclassified per §3.42 line 8118 downgrade); deterministic refuse, emit VETO_REJECTION; tier misclassification additionally surfaces as a §3.18.1 signal."
          - "PRINCIPAL_NOT_ELIGIBLE — principal_id is not in the convened session's §3.94.3 eligible-principal set (authority-chain-ledger mismatch, §3.104.8); refuse, emit VETO_REJECTION; candidate for §3.3 authority-chain forged-authority detection."
          - "DUPLICATE_CONTRIBUTION — principal_id already holds a recorded share on this session (double-sign attempt against the §3.94.3 two-distinct-principal requirement); refuse (justified-by-construction: prior share exists), emit VETO_REJECTION, no second signature."
          - "INSUFFICIENT_QUORUM — no convened §3.42 SERIOUS session is resolvable for session_id (session closed, dissolved, or never SERIOUS-classified) so there is no valid quorum input to sign against; deterministic refuse, emit VETO_REJECTION (mirrors the FN-057 quorum-input-required discipline)."
          - "CREDENTIAL_SEAL_FAULT — the §3.65 SEALED signing-credential handle is invalid/unsealable; refuse without emitting a contribution; surface to §3.21 credential-lifecycle fault handling."
          - "Handling: all refusals are total deterministic dispositions (§3.69 deterministic-disposes) with a typed reason code, each Witness-recorded as VETO_REJECTION; no partial or unsigned-but-emitted state is reachable."
        concurrency:
          idempotency_key: "(session_id, principal_id) — the natural single-share key; a re-invocation under the same key is refused DUPLICATE_CONTRIBUTION (idempotent at-most-once share semantics, NOT replay-success)."
          retry: "Not safe to blind-retry an apparent failure as a fresh share — a successful-but-unacknowledged contribution makes the retry a DUPLICATE_CONTRIBUTION refusal. A retry must first read back the session's share set for this principal."
          ordering: "Order-independent for safety: disposition of a call depends only on (tier, eligibility, prior-share-presence). threshold_reached is monotone — the contribution that crosses N flips it once; later eligible shares keep it true."
          locks: "Per-session share-set update is atomic (compare-and-set on the (session_id, principal_id) membership) so two concurrent first-attempts by the same principal cannot both contribute; the SOVEREIGN PERSISTENT_SUBSTRATE (§13.0.4) serializes share writes per session."
        test_vectors:
          - "CTS-SOV-FN058-01 — SERIOUS session s1, eligible {p1,p2}, p1 first attempt => CONTRIBUTED, threshold_reached=false (1 of 2), AUTHORITY_CHANGE."
          - "CTS-SOV-FN058-02 — s1 then p2 first attempt => CONTRIBUTED, threshold_reached=true (2 of 2 = §3.94.3 N), AUTHORITY_CHANGE."
          - "CTS-SOV-FN058-03 — s1, p1 SECOND attempt (already signed) => REFUSED DUPLICATE_CONTRIBUTION + VETO_REJECTION."
          - "CTS-SOV-FN058-04 — s1, p3 (not in eligible set) => REFUSED PRINCIPAL_NOT_ELIGIBLE + VETO_REJECTION."
          - "CTS-SOV-FN058-05 — non-SERIOUS session s2, any principal => REFUSED SESSION_NOT_SERIOUS_TIER + VETO_REJECTION (tier checked before eligibility)."
          - "CTS-SOV-FN058-06 — every processed call ends CONTRIBUTED xor REFUSED (totality); no call in both sets (no-bypass per §3.69)."
          - "CTS-SOV-FN058-07 — every recorded share is on a SERIOUS session from an eligible principal; threshold_reached => >= N distinct eligible principals."
        substrate_interface: >-
          §3.65 boundary: the tool executes inside the SOVEREIGN PERSISTENT_SUBSTRATE (INTERNAL_ENCLAVE
          custody of the §3.21 signing key). The signing credential enters as an opaque §3.65 SEALED
          handle and is unsealed only inside the §3.21 credential enclave; the raw key never appears in
          tool state — only the §3.21.3 hybrid signature VALUE crosses back out. The share record is
