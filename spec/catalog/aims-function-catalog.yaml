          - "SOVEREIGN (§13.3.2 / §13.3.9 Phase 5) — the deterministic consumer: the completeness assessment is returned to the SOVEREIGN via PATH-02 (return direction) as part of the REPORT message at §14 Phase 5, where it is the (c) component alongside (a) the structural specification and (b) the PATH-04 CONSISTENCY_CHECK_RESULT. The assessment is informational only; the SOVEREIGN retains the integration decision per §14 Phase 6 and is never an interlocutor of this inference half. The ARCHITECT holds no inherent authority (§13.3.2); its emissions carry an IAME envelope whose signature chain terminates at the SOVEREIGN's session credential — that signing is performed by the persistent substrate (§13.3.3.1 / §13.3.5.1 `plan_envelope.sign_and_return`), not by this inference half."
          - "ARCHITECT decomposition pipeline (§13.3.9 Phase 4 outcomes (b)/(c)) — the downstream disposer: a failing completeness assessment is a PROPOSAL that MAY trigger re-decomposition (re-invoking `dialogue.decompose_directive` within the same workload) or, when no feasible specification covers the directive scope under any reasonable decomposition, ESCALATION to SOVEREIGN via PATH-02 return-direction (ESCALATION MessageType per §13.3.9). The check authors no specification of its own and writes no row; the re-decomposition / escalation decision is a deterministic act of the cascade, not of this proposal surface."
