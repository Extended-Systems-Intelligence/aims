          Deterministic signing half of the §13.1.5.3 Critical-Quorum-convening hybrid (tool 1):
          emits one signature contribution per selected member AFTER verifying the convened
          composition meets the §3.42 CRITICAL quorum cardinality and pillar-diversity requirements
          (11-agent minimum, 5 G + 5 C + 1 I per §3.42). The inference half (quorum.composition,
          §13.1.5.2) selects members; this deterministic tool ratifies the composition and signs.
          A quorum input is REQUIRED; an under-sized or non-diverse composition yields a typed
          deterministic refusal (INSUFFICIENT_QUORUM), never a signature.
        witness_events:
          - AUTHORITY_CHANGE
          - VETO_REJECTION
        shadow_relevance: >-
          SOVEREIGN shadow is SCHISM (metric directive_consistency_score, §3.16 line 3309 / §13.1.7
          ): the failure mode is the Sovereign emitting mutually inconsistent directives.
          Critical Quorum signing is a SCHISM containment surface — high-stakes decisions are gated
          behind a diverse multi-pillar quorum rather than a unilateral Sovereign signature, so a
          Sovereign drifting toward self-inconsistency cannot self-authorize. The deterministic gate
          refuses (emitting VETO_REJECTION) an under-sized or non-diverse composition, or a member
          whose §13.1.8 Ring 2 ephemeral-consensus coherence state is not PASSING. directive_consistency_score
          below 0.3 raising CRITICAL (§13.1.7) is the SCHISM tripwire that escalates around this surface.
        dismissal_trigger: >-
          Per §3.42.1 Structured Dismissal Protocol: a convened member's signing capacity is dismissed
          (its contribution refused / not solicited) when its §13.1.8 Ring 2 ephemeral-consensus
          coherence state is not currently PASSING, when the convening decision class no longer
          justifies its participation, or at quorum dissolution. The §3.42.1 SDP confirmation_required
          co-signature (the confirming_principal per §3.42.1.4 step 5) governs Sovereign-session
          dismissal.
        provenance: >-
          Source behavior verbatim from §13.1.5.1 Deterministic Tools tool 3 (:
          "produces a Critical Quorum signature contribution per §3.42") + §13.1.5.3 Hybrid Tools tool 1
          Critical Quorum convening (: the deterministic half MUST verify the composition
          meets the §3.42 Critical Quorum cardinality and diversity requirements before emitting
          signatures) + §3.42 Quorum Consensus Architecture (CRITICAL class, 11-agent minimum
          5 G + 5 C + 1 I, line 8116). Typed slots verbatim from
          SOVEREIGN items[5].
        credential_refs:
          - "Sovereign-issued credential per §3.21 (signing per §3.21.3 hybrid Ed25519 + ML-DSA-65, Stage 1)"
          - "per-member signing credential issued under the §3.21 Credential Lifecycle"
        emit_class: SIGNED_RECORD
        conformance_refs:
          - "§3.70 Formal-Verification Requirement (DETERMINISTIC item; formal model required for FULL)"
          - "§3.69 Deterministic Ratification Pattern (deterministic half ratifies inference-half composition before emission)"
          - "§4.4 Conformance Claim Format (formal_models field pins this model)"
          - "§3.42 Critical Quorum cardinality + pillar-diversity conformance"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            quorum_id: "string (UUID of the convened Critical Quorum, bound to a quorum.composition decision per §13.1.5.2)"
            decision_class: "string (the §3.42 decision class justifying convening; used to validate member-participation justification)"
            composition: "list of member_ref objects [{member_id: string, pillar: enum(G|C|I per §3.42), coherence_state: enum(PASSING|DIVERGENT|UNKNOWN) per §13.1.8 Ring 2}]"
            member_id: "string (the member for whom this call emits a signature contribution; MUST be an element of composition)"
            payload_hash: "string (SHA-256 of the directive/decision artifact being signed)"
          out:
            signature_contribution: "object {member_id, quorum_id, payload_hash, sig: §3.21.3 hybrid Ed25519 + ML-DSA-65 over (quorum_id || payload_hash || member_id), credential_ref: §3.21} — emitted ONLY on admit; success path emits AUTHORITY_CHANGE"
            witness_record_ref: "ref to the §6 Witness chain entry (AUTHORITY_CHANGE on admit, VETO_REJECTION on refuse)"
          invariant: >-
            Single-shot per (quorum_id, member_id): a member contributes at most one signature per
            quorum. A contribution is emitted ONLY when (a) member_id is in composition, (b) the
            composition meets the §3.42 CRITICAL minimum cardinality (11-agent minimum), (c) the
            composition meets the §3.42 pillar-diversity requirement (5 G + 5 C + 1 I), and (d) the
            member coherence_state is PASSING. Every call is emitted XOR refused exactly once
            (totality). No call both emits and is refused (no-bypass per §3.69).
        errors:
          - "INSUFFICIENT_QUORUM — composition fails the §3.42 CRITICAL cardinality OR pillar-diversity requirement; deterministic refuse, emit VETO_REJECTION, no signature emitted for any member of this quorum."
          - "MEMBER_NOT_IN_COMPOSITION — member_id not an element of the convened composition; refuse, emit VETO_REJECTION, no signature."
          - "MEMBER_COHERENCE_NOT_PASSING — member §13.1.8 Ring 2 ephemeral-consensus coherence state is not PASSING (DIVERGENT/UNKNOWN); refuse, emit VETO_REJECTION."
          - "DUPLICATE_SIGNATURE — (quorum_id, member_id) already contributed; refuse (single-shot violation), emit VETO_REJECTION, no second signature."
          - "Handling: all errors are total deterministic refusals (§3.69 deterministic-disposes) with a typed reason code; the refusal is Witness-recorded as VETO_REJECTION; no partial or unsigned-but-emitted state is reachable."
        concurrency:
          idempotency_key: "(quorum_id, member_id, payload_hash) — replaying the same key returns the prior signature_contribution (or the prior refusal) without producing a second one; enforced by single-shot processed-set semantics."
          retry: "Safe to retry on the same idempotency_key (idempotent). A retry after a coherence-state transition is a NEW disposition only if the prior call refused for MEMBER_COHERENCE_NOT_PASSING and the convening is re-attempted under a new quorum_id."
          ordering: "Per-member contributions are order-independent; the assembled Critical Quorum signature is complete only when contributions from a §3.42-cardinality-and-diversity-satisfying subset are present. The deterministic gate evaluates composition validity independently per call against the same convened composition."
          locks: "Per-(quorum_id, member_id) write-once lock in the Sovereign PERSISTENT_SUBSTRATE quorum store; the processed-set is the abstract realization of this lock guaranteeing single-shot under concurrent solicitation."
        test_vectors:
          - "CTS-SOV-FN057-01 — valid: member in composition, cardinality and pillar-diversity meet §3.42 CRITICAL minimums, coherence=PASSING ⇒ signature_contribution emitted + AUTHORITY_CHANGE."
          - "CTS-SOV-FN057-02 — under-cardinality: composition below §3.42 CRITICAL 11-agent minimum ⇒ INSUFFICIENT_QUORUM refusal + VETO_REJECTION, no signature."
          - "CTS-SOV-FN057-03 — non-diverse: composition fails §3.42 pillar-diversity (not 5 G + 5 C + 1 I) ⇒ INSUFFICIENT_QUORUM refusal + VETO_REJECTION."
          - "CTS-SOV-FN057-04 — incoherent member: member §13.1.8 Ring 2 coherence=DIVERGENT ⇒ MEMBER_COHERENCE_NOT_PASSING refusal + VETO_REJECTION."
          - "CTS-SOV-FN057-05 — outsider: member_id not in composition ⇒ MEMBER_NOT_IN_COMPOSITION refusal + VETO_REJECTION."
          - "CTS-SOV-FN057-06 — replay/single-shot: second call for an already-contributed (quorum_id, member_id) ⇒ DUPLICATE_SIGNATURE refusal + VETO_REJECTION, exactly one signature in state."
        substrate_interface: >-
          §3.65 boundary: the tool executes inside the SOVEREIGN PERSISTENT_SUBSTRATE (INTERNAL_ENCLAVE
          custody of the §3.21 signing key). Private key material never crosses the §3.65 boundary — only
          the opaque signature_contribution (§3.21.3 hybrid signature bytes + credential_ref) is emitted
          across the boundary. Composition validation reads the quorum.composition decision (from the
          §13.1.5.2 inference half) and member coherence_state (§13.1.8 Ring 2) as substrate-resident
          inputs; the gate is non-bypassable from the agentic/inference side per §3.69 Deterministic
          Ratification. Emission and refusal both write a §6 Witness chain entry via the substrate
          witness primitive (AUTHORITY_CHANGE / VETO_REJECTION).
