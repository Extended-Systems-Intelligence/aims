  # ---------------------------------------------------------------------------
  # K7 trust-gradient primitives (FN-092..FN-095)
  # ---------------------------------------------------------------------------

  - id: FN-092
    name: k7_beta_prior_update
    archetype: CROSS_CUTTING
    class: rigid
    layer: CROSS_LAYER
    mode: CROSS_MODE
    description: |
      Bayesian update of Beta(alpha, beta) trust distribution per verdict outcome.
      Update rule: PASS -> alpha += 1; FAIL -> beta += 1; ESCALATE -> no update;
      QUARANTINE -> beta += 5.
    inputs: [current_beta_state, verdict_class]
    outputs: [updated_beta_state]
    witness_emission:
      - K7_BETA_UPDATED
    spec_section: §3.7.Y
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      Latency bound: PT0.05S per §3.7.Y.

  - id: FN-093
    name: k7_credible_interval_lower_bound
    archetype: CROSS_CUTTING
    class: rigid
    layer: CROSS_LAYER
    mode: CROSS_MODE
    description: |
      Compute the 95% credible interval lower bound from the current Beta(alpha, beta)
      distribution. Used by trust-class transition logic.
    inputs: [beta_state, ci_level]
    outputs: [lower_bound]
    witness_emission: []
    spec_section: §3.7.Y
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      ci_level default 0.95; lower_bound in range 0..1. Implementation MAY use
      closed-form approximation or numerical integration; both MUST produce
      identical results to spec test vectors.

  - id: FN-094
    name: k7_trust_class_transition
    archetype: CROSS_CUTTING
    class: rigid
    layer: CROSS_LAYER
    mode: CROSS_MODE
    description: |
      Map 95% CI lower bound to trust class: >0.95 HIGH; 0.80-0.95 NORMAL;
      0.60-0.80 DEGRADED; <0.60 CRITICAL. Emit TRUST_CLASS_TRANSITION Witness
      event on class change.
    inputs: [lower_bound, current_class]
    outputs: [new_class, transition_event]
    witness_emission:
      - TRUST_CLASS_TRANSITION
    spec_section: §3.7.Y
    formal_verification: required
    adversarial_fuzzing: not_applicable

  - id: FN-095
    name: k7_aggregate_for_federation
    archetype: CROSS_CUTTING
    class: rigid
    layer: CROSS_LAYER
    mode: CROSS_MODE
    description: |
      Aggregate K7 trust scores for federation summary (internal_only metric per
      §3.X.TEL emission_domain). Produces a cluster-level summary; per-agent values
      never cross the Cryptographic Boundary.
    inputs: [per_agent_beta_states]
    outputs: [cluster_summary_struct]
    witness_emission:
      - K7_FEDERATION_AGGREGATE
    spec_section: §3.7.Y, §3.X.TEL
    formal_verification: required
    adversarial_fuzzing: not_applicable

