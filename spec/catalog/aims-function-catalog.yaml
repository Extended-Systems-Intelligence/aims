    spec_section: §3.87.8.4, §3.87.10
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-119
    name: workload_offload_verify
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Verify a sealed workload payload at the destination framework's
      L-Form Ingress Gate per §3.87.10. Validates seal signature against
      source bridge attestation key; verifies integrity hash; admits
      payload only if both checks pass. Per §3.87.10.2: if verification
      fails, offload ABORTS, source retains workload, destination
      instantiation is discarded.
    inputs: [sealed_payload, source_bridge_attestation_pubkey, expected_integrity_hash]
    outputs: [verification_verdict, admit_payload_or_abort]
    witness_emission:
      - WORKLOAD_PAYLOAD_VERIFIED
      - WORKLOAD_OFFLOAD_ABORTED
    spec_section: §3.87.10, §3.87.10.2
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-120
    name: external_identity_rekey
    archetype: PROVIDER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Re-key external identities (signed certificates, API tokens,
      webhook registrations, signed bearer credentials) from source to
      destination framework during workload offload per §3.87.10.5.
      Destination generates fresh key in own Class 1 store; registers with
      external service/CA; source invalidates old identity as part of
      decommission. Witness-recorded; offload blocker if any identity
      cannot be re-keyed without explicit principal waiver.
