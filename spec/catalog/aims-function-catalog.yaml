          - "CTS-SOV-FN056-05: granted certification c2, authority_chain=VALID, signer=NON_SOVEREIGN -> status=REFUSED, refusal_reason=NOT_SOVEREIGN, VETO_REJECTION emitted, no signed record."
          - "CTS-SOV-FN056-06: every call dispositioned exactly once (emit XOR refuse) across the full input cross-product — totality / malformed-input safety."
        substrate_interface: "§3.65 cryptographic boundary: the §3.21.3 HYBRID Ed25519+ML-DSA-65 (Stage 1) signing operation over the revocation record executes inside the SOVEREIGN persistent-substrate enclave; the sovereign_credential private key and ERM-derived key material never cross the boundary. Only the opaque SIGNED_RECORD handle and the §6 Witness anchor (MEM_TMS_REVOCATION_DECLARED / AUTHORITY_CHANGE on success; VETO_REJECTION on refusal) are returned across the boundary. Authority-chain validation (ENFORCER) and the persisted revocation record both anchor to the Witness chain per §3.99.9; the certification state row lives on PERSISTENT_SUBSTRATE under the single-writer TMS discipline (§3.99)."
