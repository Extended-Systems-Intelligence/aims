          - "LOW_CONFIDENCE — the decomposition confidence is below the deployment proposal-confidence floor; the workload returns the specification flagged low-confidence and routes it through `specification.completeness_check` (§13.3.5.2.6) / §13.3.9 Phase 4 re-decomposition or escalation. No falsely-confident emission."
        concurrency: >-
          Idempotency key (directive snapshot, session_context) — a judgment over the inbound directive, mutating no authority state and writing no Witness; re-invocation over the identical input view yields the same structural specification up to inference non-determinism. Freely re-invocable within the directive's L-Plan window (no side effects on this half): a retry produces a fresh decomposition proposal. No ordering anchor and no lock on this tool — the §14 Phase 4 PATH-04 CONSISTENCY_CHECK (synchronized VISIONARY arrival), the §14 Phase 5 deterministic plan-envelope signing, and the §14 Phase 6 SOVEREIGN confirmation are the downstream linearization points. The ephemeral workload is directive-bounded (§13.3.3.2), dismissed at §14 Phase 7 (Authority Transfer) per §3.42.1 SDP.
