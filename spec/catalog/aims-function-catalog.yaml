# restructure). One group per §3.16 archetype + an infrastructure section.
# CLASS uses the typed vocabulary DETERMINISTIC/INFERENCE/HYBRID, equivalent to
# the §3.X.FUNC rigid/judgment framework (rigid ≡ DETERMINISTIC, judgment ≡ INFERENCE).
# Group headers (mode/layer/orientation/shadow/metric) are §3.16-canonical.
#
# Typed per-item slots (kind/substrate/authority/paths) + the queryable attributes
# + the 5 buildability fields are authored per-item at the section-authoring step;
# the validator treats them as OPTIONAL until then.
#
# FN-ID discipline (§3.X.FUNC.6): assigned once; never reused/renumbered. New items
# (typed-registry expansion) assign from the next free id after the current ceiling.
