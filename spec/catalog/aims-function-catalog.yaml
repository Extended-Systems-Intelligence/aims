        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [incident_state, pre_declared_procedures, deployment_scope]
            properties:
              incident_state:
                type: object
                description: "The current incident state the recovery decision is conditioned on (the §13.1.5.2 item-3 'current incident state'): the detected failure/anomaly signature, affected scope, severity, and any relevant coherence/shadow context the SOVEREIGN persistent substrate makes available as proposal input. The inference workload sees only this input view — never credential/key material (§3.65)."
              pre_declared_procedures:
                type: array
                description: "The catalog of pre-declared P9 recovery procedures available for selection (declared at §13.0.6 commissioning per P9). The proposal MUST select from this set; selecting outside it is what the §13.1.5.3.4 deterministic half rejects (procedure-not-declared-at-commissioning). Each entry carries its procedure ID and the conditions it covers."
              deployment_scope:
                type: object
                description: "The deployment / coherence-domain scope context (trust class and shadow state relevant to recovery selection) the judgment weighs alongside the incident state."
          out:
            type: object
            description: "A §3.12 Decision Record PROPOSAL — the recovery-procedure selection the deterministic half will ratify (or a typed abstention). NOT a signed activation envelope and NOT a §6.3 Witness emission; the §13.1.5.3.4 deterministic half emits the activation. No credential/key material appears in OUT (§3.65)."
            required: [outcome, confidence]
            properties:
              outcome:
                type: string
                enum: [PROCEDURE_PROPOSED, LOW_CONFIDENCE, ABSTAIN, INSUFFICIENT_CONTEXT]
                description: "PROCEDURE_PROPOSED = a procedure was selected; the typed inference outcomes LOW_CONFIDENCE / ABSTAIN / INSUFFICIENT_CONTEXT carry no selection and route the decision back to the deterministic half / SOVEREIGN for disposition (no autonomous remediation)."
              proposed_procedure_id:
                type: string
                description: "The ID of the selected pre-declared P9 recovery procedure (a member of pre_declared_procedures). Present IFF outcome=PROCEDURE_PROPOSED. The §13.1.5.3.4 deterministic half MUST verify this ID was declared at commissioning per P9 before signing the activation envelope."
              reasoning:
                type: object
                description: "The §3.12 Decision Record reasoning trace explaining why this procedure fits the current incident state (the explainability artifact; not reproducible-by-replay per P13 inference-path semantics — cites an attestation-binding identifier)."
              confidence:
                type: number
                description: "Calibrated confidence in the proposed selection, [0,1]. Below the deployment's proposal-confidence floor the outcome is LOW_CONFIDENCE (no selection asserted)."
          invariant: "This tool PROPOSES; it never disposes and never emits. Exactly one typed outcome per invocation (PROCEDURE_PROPOSED XOR LOW_CONFIDENCE XOR ABSTAIN XOR INSUFFICIENT_CONTEXT); a proposed_procedure_id is present IFF outcome=PROCEDURE_PROPOSED and is a member of the pre-declared P9 procedure set; no §6.3 Witness event is emitted by this half (§3.69.2/§3.69.3 — Witness writes, envelope production, and authority-chain operations are disposed by the §13.1.5.3.4 deterministic half); no credential/key material crosses into the inference workload's input view or out of its result (§3.65)."
        errors:
          - "LOW_CONFIDENCE — a candidate procedure exists but calibrated confidence is below the deployment's proposal-confidence floor. Typed inference outcome (NOT an exception, NOT a §6.3 Witness refusal): returns outcome=LOW_CONFIDENCE with no proposed_procedure_id; the deterministic half / SOVEREIGN dispositions (no autonomous activation)."
          - "ABSTAIN — the judgment declines to select among the pre-declared procedures (e.g. the incident state matches no procedure's covered conditions, or two procedures are indistinguishably appropriate and the call should escalate). Typed inference outcome; returns outcome=ABSTAIN with no selection; routed to the deterministic half / SOVEREIGN."
          - "INSUFFICIENT_CONTEXT — the supplied incident_state / deployment_scope is too sparse to ground a defensible selection. Typed inference outcome; returns outcome=INSUFFICIENT_CONTEXT with no selection; the SOVEREIGN MUST NOT proceed to activation on this proposal. No state change in all three cases — this half mutates no state and emits no Witness event."
        concurrency:
          idempotency_key: "(incident_state snapshot, pre_declared_procedures, deployment_scope) — the proposal is a pure judgment over its inputs and mutates no state; re-invocation over the identical input view yields the same typed outcome up to inference non-determinism (the proposal is replayable with no side effects, per §3.69 the inference proposal carries no authority-bearing consequence until ratified). Distinct incident contexts dispatch as independent ephemeral inference workloads."
          retry: "Freely re-invocable — this half has no side effects (no state mutation, no Witness emission, no envelope production). A retry produces a fresh proposal; the §13.1.5.3.4 deterministic half is the linearization/authority point and applies its own idempotency to the activation. Failure to produce a proposal (LOW_CONFIDENCE / ABSTAIN / INSUFFICIENT_CONTEXT) is a typed outcome, not a transport error."
          ordering: "No ordering anchor on this half — the proposal imposes no ordering and holds no lock; the recovery-activation ordering anchor is the §13.1.5.3.4 deterministic half's signed-activation-envelope emission, which observes this proposal as a precondition input and sequences after it. The proposal is causally before the ratification it feeds."
          locks: "None on the proposal path — the ephemeral inference workload acquires no lock and is single-use (dismissed at operating-context completion per §3.32 / §3.42.1). The single-writer / authority discipline lives entirely on the §13.1.5.3.4 deterministic ratification half, not on this judgment."
        test_vectors:
          - "CTS-SOV-FN086-01: incident_state matches exactly one pre-declared P9 procedure's covered conditions, high confidence -> outcome=PROCEDURE_PROPOSED, proposed_procedure_id = that procedure (a member of pre_declared_procedures), reasoning trace present, no Witness event (proposal only; the §13.1.5.3.4 deterministic half ratifies + emits the activation)."
          - "CTS-SOV-FN086-02: a candidate procedure exists but calibrated confidence is below the deployment proposal-confidence floor -> outcome=LOW_CONFIDENCE, no proposed_procedure_id, no selection asserted, no Witness event, no state change."
          - "CTS-SOV-FN086-03: incident_state matches no pre-declared procedure's covered conditions (or two are indistinguishably appropriate) -> outcome=ABSTAIN, no selection, routed to deterministic half / SOVEREIGN, no Witness event."
          - "CTS-SOV-FN086-04: incident_state / deployment_scope too sparse to ground a defensible selection -> outcome=INSUFFICIENT_CONTEXT, no selection, SOVEREIGN MUST NOT proceed to activation, no Witness event, no state change."
          - "CTS-SOV-FN086-05: proposal selects a procedure NOT in pre_declared_procedures -> non-conformant at the proposal contract; even if surfaced, the §13.1.5.3.4 deterministic half rejects it (procedure not declared at commissioning per P9) -> activation VETO_REJECTION on the deterministic half, never a silent activation (this half never activates anything)."
          - "CTS-SOV-FN086-06: every invocation returns exactly one typed outcome (PROCEDURE_PROPOSED XOR LOW_CONFIDENCE XOR ABSTAIN XOR INSUFFICIENT_CONTEXT), emits no §6.3 Witness event, mutates no state, and exposes no credential/key material -> totality / no-emission / no-state-change / §3.65 isolation invariant for the inference half."
        substrate_interface: "EPHEMERAL_INFERENCE per the Universal Node Architecture. The SOVEREIGN persistent substrate dispatches this ephemeral inference workload to perform the recovery-procedure-selection judgment over the supplied incident state and the pre-declared P9 procedure catalog. Per §3.65 the inference workload sees ONLY its inputs (the incident_state view, the pre-declared procedure catalog, the deployment scope) — it never receives credential or key material: the §3.21 sovereign_credential the eventual signed activation envelope is signed with is held by the SOVEREIGN persistent substrate and never crosses the §3.65 cryptographic boundary into the inference workload (§3.69.3 cryptographic capability confinement — no LLM-class component holds signing authority). The workload produces a §3.12 Decision Record proposal and is dismissed at operating-context completion (§3.32 / §3.42.1 SDP). The authority-bearing emission (the signed activation envelope + its §6 Witness anchor) is performed by the §13.1.5.3.4 deterministic ratification half, not here."
      - id: FN-087
        name: "Critical Quorum Composition"
        tool_ref: "quorum.composition"
        kind: TOOL
        class: INFERENCE
        substrate: EPHEMERAL_INFERENCE
        authority: SOVEREIGN_CREDENTIAL
        paths: []
        status: ACTIVE
        ver: "2.0"
        sec_ref: ["§13.1.5.2", "§3.42"]
        # — 9 attributes —
        counterparties: "SOVEREIGN ephemeral inference workload (the proposing surface) — selects from the §3.42-eligible agent population to form a candidate Critical Quorum composition. The proposed composition is consumed by the paired deterministic half quorum.sign_critical_quorum (FN-057, §13.1.5.3.1), which is the SOVEREIGN PERSISTENT_SUBSTRATE signing custodian. Candidate members are the §3.42 CRITICAL pillar agents (Enforcers, Articulator, cross-foundation attestor per §13.1.10). No direct topology-path counterparty — this is an internal L-Intent inference surface, not a message emitter."
        consensus_role: "PROPOSE half of the §3.69 Deterministic-Ratification pairing for Critical Quorum convening (§13.1.5.3 hybrid tool 1). This is an M-Generative JUDGMENT/PROPOSAL surface: the LLM-driven decision of WHICH agents compose a convened Critical Quorum (§13.1.5.2 inference tool 4). It proposes a composition; it does NOT ratify or sign. Per the §3.69 pairing, the deterministic half quorum.sign_critical_quorum (FN-057, §13.1.5.3.1) verifies §3.42 CRITICAL cardinality (11-agent minimum) and pillar-diversity (5 G + 5 C + 1 I) before emitting any signature contribution; an under-sized or non-diverse proposed composition is deterministically refused (INSUFFICIENT_QUORUM), never self-emitted. 'LLM proposes, deterministic disposes' per §3.69.1."
        witness_events: []
        shadow_relevance: "SCHISM (§13.1.7) — the SOVEREIGN behavioral shadow. A drifting composition proposal (e.g., systematically excluding the cross-foundation attestor, or proposing a non-diverse roster) is a candidate signal surfaced for §3.18 correlation; the §3.69 deterministic ratification half is the structural backstop that refuses to sign a non-conformant proposed composition regardless of inference-side drift. Per §13.1.10 recusal refinement, when convening is triggered by suspected SOVEREIGN coherence loss, the proposing SOVEREIGN MUST recuse and the composition is rooted at the cross-foundation attestor instead."
        dismissal_trigger: "The ephemeral inference workload is dismissed at proposal completion — the EPHEMERAL_INFERENCE workload activates per convening request, emits the proposed composition to the deterministic ratification half, and completes; it holds no persistent state across convening events (§3.32 ephemeral inference-workload lifecycle, governed per §13.1.3 Operational Class; the persistent substrate that runs the deterministic half is always-on and is NOT dismissed). Member-level dismissal of an actually convened quorum (non-PASSING §13.1.8 Ring 2 coherence or quorum dissolution) is handled by the deterministic half under §3.42.1 Structured Dismissal Protocol, not by this proposal surface."
        provenance: "§13.1.5.2 (Inference Tools — tool 4 quorum.composition) / §3.42 Quorum Consensus Architecture / §13.1.10 Critical Quorum Convening / §3.69 Deterministic Ratification (PROPOSE half)"
        credential_refs: []
        emit_class: PROPOSAL
        conformance_refs: ["§4.9", "§3.69"]
        # — 5 buildability —
        io_contract: "IN { convening_trigger ∈ (§13.1.10 triggers: cross-channel correlation §10.6 | suspected foundation-instance compromise | Supervision Perimeter abort §19 | ERM master-key rotation §3.21 | SOVEREIGN coherence-loss per §13.1.10 Coherence-Authority-Coupling trigger), decision_class(§3.42 CRITICAL), eligible_agent_population: [{agent_id, pillar∈(G|C|I), trust_class, cross_foundation: bool}], shadow_context(§13.1.7), recusal_required: bool(§13.1.10) } → OUT { proposed_composition: [{agent_id, pillar∈(G|C|I)}], rationale, confidence∈[0,1] }. The OUT is a PROPOSAL only — it carries no signature, no credential, no Witness record. Ratification + emission belong to FN-057 quorum.sign_critical_quorum (§13.1.5.3.1), which independently re-verifies §3.42 cardinality + pillar-diversity before signing."
        errors: "LOW_CONFIDENCE (proposal returned but confidence below the deployment threshold — flagged for the deterministic half / operator; never self-emitting per §3.69) · ABSTAIN (the inference workload declines to propose a composition, e.g., no §3.42-diverse roster is constructible from the eligible population) · INSUFFICIENT_CONTEXT (convening_trigger or eligible_agent_population inadequate to reason over). All are typed inference outcomes returned to the §3.69 deterministic ratification half; none mutate state, none sign, none emit a Witness event. A LOW_CONFIDENCE or non-§3.42-conformant proposal that is nonetheless passed downstream is deterministically vetoed (INSUFFICIENT_QUORUM) by FN-057, never admitted."
        concurrency: "Stateless per convening request — each proposal is computed fresh over the supplied eligible_agent_population + trigger context; the EPHEMERAL_INFERENCE workload retains no state across requests. Not idempotent in the deterministic sense (an inference proposal MAY vary run-to-run); the binding linearization point is the deterministic half (FN-057), which is single-shot per (quorum_id, member_id) and is the sole authority that converts a proposed composition into signature contributions. Re-proposing under a new quorum_id after a refused/dissolved convening is a fresh, independent inference. No write-lock here — this surface holds no PERSISTENT_SUBSTRATE state."
        test_vectors: "CTS-SOV-FN087-01 {valid trigger, eligible population admits a 5 G + 5 C + 1 I roster} → proposed_composition satisfying §3.42 CRITICAL diversity, confidence high, no Witness, no signature. CTS-SOV-FN087-02 {eligible population cannot form 11-agent / 5+5+1 roster} → ABSTAIN (no conformant proposal), deterministic half later refuses any partial roster. CTS-SOV-FN087-03 {convening_trigger present but eligible_agent_population empty/malformed} → INSUFFICIENT_CONTEXT. CTS-SOV-FN087-04 {SOVEREIGN coherence-loss trigger, recusal_required=true per §13.1.10} → proposed_composition excludes the SOVEREIGN and roots at the cross-foundation attestor. CTS-SOV-FN087-05 {proposal confidence below threshold} → LOW_CONFIDENCE flag returned to FN-057; no autonomous emission. CTS-SOV-FN087-06 {any proposed composition} → carries NO signature/credential/Witness; ratification + emission occur only at FN-057 (§13.1.5.3.1) — propose/dispose separation per §3.69."
        substrate_interface: "Executes in EPHEMERAL_INFERENCE (the SOVEREIGN's session-bounded inference workload per §13.1.3 Universal Node Architecture), physically isolated from the §3.65 INTERNAL_ENCLAVE where the §3.21 signing keys and ERM-derived key material reside. The inference workload sees ONLY its inputs — the convening trigger, the eligible-agent metadata, member coherence/trust context, and shadow context — and NEVER credential or key material; key custody and the §3.21.3 hybrid signing operation live entirely behind the §3.65 boundary in the paired deterministic half (FN-057). The proposed composition crosses from EPHEMERAL_INFERENCE to the PERSISTENT_SUBSTRATE deterministic half as plain (unsigned) metadata; the gate that verifies §3.42 cardinality + pillar-diversity + §13.1.8 Ring 2 coherence and produces signatures is non-bypassable from the agentic/inference side per §3.69. No Witness write originates here (§6.3) — emission/refusal Witnessing is the deterministic half's (AUTHORITY_CHANGE on emit, VETO_REJECTION on refuse)."
