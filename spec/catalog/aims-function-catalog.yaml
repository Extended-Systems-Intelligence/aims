          invariant: "A valid §13.0.2 principal session credential is a hard precondition — no session is bound without one (credential-validity gate). Single-shot per principal: at most one ESTABLISHED bound session per principal_id at a time, per the §13.0.4.1 concurrent-session-per-user limit. Only the SOVEREIGN substrate binds (signer_role=SOVEREIGN). A call emits a bound-session record XOR is refused with exactly one typed reason, never both (no-bypass per §3.69). A session is bound ONLY when (a) the presented credential validates, (b) no session is already bound for the principal and the deployment is establishable per §13.0.4.1, and (c) the signer is the SOVEREIGN. Credential material never appears in output — only an opaque bound-session handle crosses the §3.65 boundary."
