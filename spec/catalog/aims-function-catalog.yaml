          - "CTS-SOV-FN402-05: every call dispositioned exactly once (authorize XOR refuse); no dispatch side effect emitted (§3.72.2 separation) — totality + narrow-role safety."
        substrate_interface: "§3.65 cryptographic boundary: the §3.21.3 HYBRID signing over the authorization record executes inside the SOVEREIGN persistent-substrate enclave; the sovereign_credential private key never crosses the boundary. The §3.68 Verification-A verdict is verified as a precondition input; only an opaque authorization handle and the §6 Witness anchor (AUTHORITY_CHANGE on success; VETO_REJECTION on refusal per §3.69) are returned. Substrate-mismatch rejections emit the §6.3-catalogued reason codes per (§3.89)."
