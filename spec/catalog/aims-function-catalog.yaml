    layer: L-Form
    mode: M-Constraining
    description: |
      Validate the six-file Auxiliary artifact set at Registration Gate per §3.17.9.3.
      Checks: agent_class_consistency, model_origin_attestation_present,
      binding_supervisor_is_tier3_orchestrator, task_scope_forbidden_disjoint,
      output_schema_well_formed, tier_attestation_match,
      capability_demonstration_present_per_domain, constitutional_floor_compliance,
      composite_registration_consistency (Composite only).
    inputs: [identity_md, binding_md, provenance_md, memory_md, capabilities_md, skills_glob]
    outputs: [validation_verdict, failed_checks_enum]
    witness_emission:
