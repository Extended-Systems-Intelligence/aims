    spec_section: §3.87.7.1, §3.87.5
    formal_verification: required
    adversarial_fuzzing: not_applicable

  - id: FN-113
    name: isolation_class_check
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Check whether a requested item belongs to Isolation Class A, B, or C
      per §3.87.3. Class A items categorically refused at egress (Hard
      Rule 2); Class B items refused outside ORCHESTRATED mode; Class C
      items permitted subject to per-operation policy. Inherits Industry
      Profile / regulated-subvertical / tenant additions per the
      composition rule §3.87.3.5.
    inputs: [requested_item, isolation_lattice_resolved, requesting_mode]
    outputs: [class_verdict, refusal_reason_or_null]
    witness_emission:
      - ISOLATION_CLASS_REFUSAL
      - ISOLATION_CLASS_PERMITTED
    spec_section: §3.87.3
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-114
    name: federation_envelope_establish
    archetype: ARCHITECT
    class: hybrid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Establish a Federation Envelope between two XSI-AIMS-conformant
      supervised contexts per §3.87.9.1. Performs Bridge Attestation
      (§3.87.9.2); generates `FederationEnvelope` artifact with scope,
      purpose, authorized_modes, coexistence_class; emits bridge-
