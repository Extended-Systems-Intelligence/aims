  # ====================================================================

  - id: FN-108
    name: egress_gate_validate
    archetype: EXECUTOR
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Validate an egress request at the L-Form Egress Gate per §3.87.1.1.
      Enforces Hard Rules 1-3: minimal projection (allowlist-based);
      categorical exclusion of Isolation Class A items per §3.87.3.1;
      Signed Boundary-Crossing Decision Record per §3.87.2 required.
      Archetypal manifestation per D8.1: EXECUTOR for Auxiliary-direction,
      SOVEREIGN for user-direction.
    inputs: [egress_request, projection_allowlist, perimeter_scope, perimeter_posture, isolation_lattice]
    outputs: [validation_verdict, boundary_crossing_record_or_null]
    witness_emission:
      - BOUNDARY_CROSSING_RECORD_EMITTED
      - EGRESS_POLICY_VIOLATION
    spec_section: §3.87.1, §3.87.1.1
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-109
    name: ingress_gate_sanitize
    archetype: EXECUTOR
    class: hybrid
    layer: L-Form
    mode: M-Constraining
    description: |
      Sanitize and tag data entering the Supervision Perimeter at the
      L-Form Ingress Gate per §3.87.1.2. Schema-validate against declared
      response shape; size-bound; provenance-tag with non-AIMS-actor
      identity; content-classify as `untrusted-external`; strip recognized
      prompt-injection signatures (rigid signature-match); apply Hard Rule
      4 immutable tagging. Hybrid because signature catalog applies rigid
      pattern-match but judgment on novel patterns escalates to Trigger 2.
    inputs: [ingress_data, expected_schema, actor_provenance, signature_catalog]
    outputs: [sanitized_data, tag_attached, escalation_signal_opt]
    witness_emission:
      - INGRESS_DATA_TAGGED
      - INGRESS_SANITIZATION_REJECTED
    spec_section: §3.87.1.2
    formal_verification: partial
    adversarial_fuzzing: required

  - id: FN-110
    name: boundary_crossing_record_emit
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Emit a Signed Boundary-Crossing Decision Record per §3.87.2 (§3.12
      DecisionRecord subtype, decision_type BOUNDARY_CROSSING per D8.2).
      Populates all 23 boundary-crossing-extension fields plus base §3.12
      fields. Signed with hybrid Ed25519 + ML-DSA-65 per §3.21.3.
    inputs: [crossing_event, perimeter_scope, supervising_agent, m_mode, l_layer, counterparty, operation]
    outputs: [signed_boundary_crossing_record]
    witness_emission:
      - BOUNDARY_CROSSING_RECORD_EMITTED
    spec_section: §3.87.2, §3.12
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-111
    name: boundary_crossing_record_validate
    archetype: ENFORCER
    class: hybrid
    layer: L-Form
    mode: M-Constraining
    description: |
      Validate a Signed Boundary-Crossing Decision Record through five
      tiers per §3.87.2.1. Tier 1-3 deterministic (schema, policy
      re-resolution, signal-to-decision coherence); Tier 4-5 LLM-based
      (signal plausibility, adversarial probe). Outcome in {APPROVED,
      DOWNGRADE, ESCALATE, ABORT}. No UPGRADE path.
    inputs: [boundary_crossing_record, policy_bundle, validator_credentials]
    outputs: [validation_outcome, validation_findings]
    witness_emission:
      - BOUNDARY_CROSSING_APPROVED
      - BOUNDARY_CROSSING_DOWNGRADED
      - BOUNDARY_CROSSING_ESCALATED
      - BOUNDARY_CROSSING_ABORTED
    spec_section: §3.87.2.1
    formal_verification: partial
    adversarial_fuzzing: required

  - id: FN-112
    name: perimeter_posture_compose
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Compose perimeter postures across nested scopes (P_f / P_e / P_fs)
      per §3.87.7.1. Most-restrictive-wins. Effective posture is the most
      restrictive declared value along the crossing path; evaluation order
      P_f → P_e → P_fs for egress and reversed for ingress; first refusal
      terminates the crossing.
    inputs: [p_f_posture, p_e_posture, p_fs_posture, direction]
    outputs: [effective_posture, refusal_scope_or_null]
    witness_emission:
