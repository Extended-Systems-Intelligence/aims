          - "ORCHESTRATOR (PATH-03 downward counterparty per §13.1.5.5 / §13.1.6; receives the signed AUTHORITY_TRANSFER envelope and its per-user inference workload becomes active per §14 Phase 7, holding operational authority for the confirmed plan)"
          - "SOVEREIGN persistent substrate (dispatches the inference consistency-confirmation workload, custodies the §13.1.8 Ring 1-2 coherence state and the §13.1.7 SCHISM shadow state the deterministic gate reads, and holds the §3.21 sovereign_credential the AUTHORITY_TRANSFER is signed with — key material never crosses the §3.65 boundary into the inference workload)"
          - "Witness Layer (§6 hash-chain anchor for the transfer record: AUTHORITY_CHANGE on a signed AUTHORITY_TRANSFER, VETO_REJECTION on the deterministic half's refusal per §3.69)"
        consensus_role: "§3.69 Deterministic Ratification (P4) propose/dispose across both halves. INFERENCE half PROPOSES: the plan_conformance_check consistency confirmation performs the judgment of WHETHER the §14 Phase 5 integrated plan matches the §13.0.3 user-confirmed intent and returns a consistency verdict proposal — non-authority-bearing, no signature, no Witness emission (§3.69.2). DETERMINISTIC half RATIFIES + EMITS: authority.transfer_to_orchestrator (FN-065, §13.1.5.1.11) applies the §13.1.5.3.5 ratification gate — before signing, it MUST verify (1) the §14 Phase 5 integrated plan is structurally consistent with the §13.0.3 user-confirmed intent, (2) the §13.0.4 user session credential is ACTIVE, (3) the Sovereign's §13.1.8 Ring 1-2 coherence is currently passing, and (4) no CRITICAL §13.1.7 SCHISM shadow is current — then emits the signed AUTHORITY_TRANSFER via PATH-03. NOT a §3.42 quorum operation: per §13.1.5.3.5 the deterministic half ratifies the single inference consistency verdict plus the three further substrate-read preconditions and signs unilaterally under the §3.21 sovereign_credential; it convenes no quorum. Any gate failure is a §3.69 deterministic-disposes rejection: AUTHORITY_TRANSFER is NOT emitted and the directive returns to §14 Phase 6 (Plan Confirmation) with the specific check-failure recorded (a typed non-abort). The authority-bearing emission and the Witness write live solely on this deterministic half (§3.69.3 cryptographic capability confinement)."
        witness_events:
          - AUTHORITY_CHANGE
          - VETO_REJECTION
        shadow_relevance: "SCHISM (SOVEREIGN shadow; metric directive_consistency_score per §3.16 / §13.1.7). The failure mode this hybrid structurally bounds is directive inconsistency in authority delegation — delegating enacted authority to the Orchestrator against a plan that does not match the user-confirmed intent (§13.0.3), under a session credential that is no longer ACTIVE (§13.0.4), while the Sovereign itself is incoherent (§13.1.8 Ring 1-2 not passing), or while a CRITICAL shadow is current (§13.1.7) — any of which would splinter enacted authority into a state contradicting the principal directive and erode directive_consistency_score. The §13.1.5.3.5 four-gate emit-only-when-all-pass precondition plus the at-most-once-per-(user, plan) single-shot gate are the backstop: the inference consistency verdict is never self-emitting, and the deterministic half refuses to sign on any unmet gate (PLAN_INTENT_INCONSISTENT, SESSION_CREDENTIAL_INACTIVE, SOVEREIGN_COHERENCE_FAILING, CRITICAL_SHADOW_PRESENT), dispositioning the attempt as a §3.69 deterministic-disposes rejection (VETO_REJECTION) routed back to §14 Phase 6 and surfaced for §3.18.1 Correlated Shadow Detection, rather than emitting a non-conforming AUTHORITY_TRANSFER. Inference-side drift cannot produce a transfer: the authority-bearing surface is the deterministic half, which signs only a ratified, all-four-gate-passing transfer."
        dismissal_trigger: "Refusal on the deterministic-ratification half (typed reason, no AUTHORITY_TRANSFER emitted, the directive returned to §14 Phase 6 with the specific check-failure recorded per §13.1.5.3.5 — a typed non-abort), emitting VETO_REJECTION per §3.69 on any unmet gate: the §14 Phase 5 integrated plan is not structurally consistent with the §13.0.3 user-confirmed intent (PLAN_INTENT_INCONSISTENT); the §13.0.4 user session credential is not ACTIVE (SESSION_CREDENTIAL_INACTIVE — incl. mid-flight expiry caught by the pre-emission re-check); the Sovereign's §13.1.8 Ring 1-2 coherence is not passing (SOVEREIGN_COHERENCE_FAILING); a CRITICAL §13.1.7 SCHISM shadow is current (CRITICAL_SHADOW_PRESENT); or an AUTHORITY_TRANSFER has already been emitted for the (user, plan) pairing (ALREADY_TRANSFERRED). Fail-closed: the §3.21 signing operation is never reached on a refusal path, no AUTHORITY_TRANSFER is emitted, no partial transfer occurs, the pre-transfer authority state is preserved, and no autonomous remediation is performed. The inference consistency-confirmation workload itself is separately dismissed at operating-context completion (§3.32 / §3.42.1 SDP) once its verdict is handed to this deterministic half; that ephemeral-workload dismissal is upstream of, and distinct from, this deterministic-half gate refusal."
        provenance: "§13.1.5.3.5 Hybrid Tools item 5 ('Authority Transfer to Orchestrator' = (inference: confirm the L-Plan integrated plan matches the user-confirmed intent per §13.0.3) + (deterministic: authority.transfer_to_orchestrator emits the signed AUTHORITY_TRANSFER message via PATH-03); the deterministic half MUST verify, before signing, the four checks — integrated plan structurally consistent with the §13.0.3 user-confirmed intent, §13.0.4 user session credential still ACTIVE, §13.1.8 Ring 1-2 Sovereign coherence currently passing, and no CRITICAL §13.1.7 shadow current — and on any failure AUTHORITY_TRANSFER MUST NOT be emitted, the directive returning to §14 Phase 6 with the specific check-failure recorded); typed slots verbatim from the FN-093 manifest row (kind=PROCESS, class=HYBRID, substrate=HYBRID, authority=SOVEREIGN_CREDENTIAL, paths=[PATH-03]); §3.69 decomposition — inference half = confirm the L-Plan integrated plan matches the §13.0.3 user-confirmed intent (the consistency verdict half, grounded in §13.1.5.2.1 user-intent codification), deterministic half = authority.transfer_to_orchestrator (FN-065, §13.1.5.1.11) emits the signed AUTHORITY_TRANSFER via PATH-03 after the four-gate ratification. Behavioral grounding: §3.69.1 (LLM proposes / deterministic disposes) + §3.69.2 (authority-bearing consequence classes — message production, authority-chain operations — disposed by the deterministic half) + §3.69.3 (cryptographic capability confinement: no LLM-class component holds signing authority) + §14 Phase 5->6->7 (Authority Cascade: confirmed integrated plan returns to the Sovereign at Phase 5, is confirmed at Phase 6, and AUTHORITY_TRANSFER is emitted on PATH-03 at Phase 7) + §13.0.3 (clarification-dialogue user-confirmed intent) + §13.0.4 (session lifecycle) + §13.1.8 (Ring 1-2 self-verification) + §13.1.7 (SCHISM CRITICAL shadow) + §3.21 (the sovereign_credential signing primitive) + §3.65 (Cryptographic Boundary)."
