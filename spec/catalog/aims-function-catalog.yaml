        errors:
          - "NOT_DEPRECATED — the prompt proposed for retirement is in ACTIVE (or REGISTERED) state, not DEPRECATED. Retiring directly from ACTIVE would skip the §3.56.1.3.1 deprecation grace period. The deterministic-ratification gate refuses BEFORE signing; emit VETO_REJECTION; no retirement record, prompt stays in its current state. This is the gate the §13.1.5.3.6 deterministic half MUST pass per §3.56.1.3.1 (cf. FN-069 CTS-SOV-FN069-04)."
          - "NO_ACTIVE_SUCCESSOR — no ACTIVE successor prompt exists for the entity_id (§3.66.7). Retiring would orphan the entity_id's dispatchable surface. The deterministic half refuses; emit VETO_REJECTION; the DEPRECATED prompt is preserved. This is the second gate the §13.1.5.3.6 deterministic half MUST pass before signing (cf. FN-069 CTS-SOV-FN069-06)."
          - "INSUFFICIENT_QUORUM — for SOVEREIGN/ORCHESTRATOR canonical-prompt retirement, no valid §3.42 Critical Quorum attestation is present, or it is below CRITICAL tier (§3.56.1.3.1). The deterministic half refuses; emit VETO_REJECTION; the prompt stays DEPRECATED; the load-bearing quorum-gate refusal is mandated by §3.56.1.3.1 (umbrella token covering absent, malformed, and below-tier quorum); surfaces a SCHISM-relevant attempt for §3.18.1 Correlated Shadow Detection (cf. FN-069 CTS-SOV-FN069-07)."
          - "VETO_REJECTION mapping — each of the three typed refusals above is a §3.69 deterministic-disposes rejection and anchors a VETO_REJECTION Witness record (§3.69.4 / §6.3). Each refusal is fail-closed (no partial retirement, signing never reached) and carries exactly one typed reason; a successful ratified retirement instead anchors AUTHORITY_CHANGE."
        concurrency:
          idempotency_key: "prompt_id — the single signed DEPRECATED→RETIRED retirement-record commit on the SOVEREIGN persistent substrate is the authoritative retirement; a re-ratification attempt against an already-RETIRED prompt resolves to the committed retirement (no second AUTHORITY_CHANGE) rather than a duplicate record. The retention_assessment inference proposal itself carries no idempotency and no side effect; the binding linearization point is here, at the deterministic record emission."
          retry: "The retention_assessment inference half is freely re-invocable (no side effects); a retry yields a fresh proposal. The deterministic-ratification half is the authority point: gate refusals (NOT_DEPRECATED / NO_ACTIVE_SUCCESSOR / INSUFFICIENT_QUORUM) are deterministic under identical (proposal, cipr_registry_state, quorum_attestation, signer) and may be retried without state change once the precondition is remedied (the prompt deprecated, an ACTIVE successor registered, or a CRITICAL quorum convened). After a committed retirement, a re-issued ratification resolves to the committed record (single-shot). A §3.65 / substrate write failure rejects the emission — no record commits, the prompt is not retired; escalate, do not assume partial retirement."
          ordering: "The deterministic half observes the retention_assessment inference proposal AND the §3.42 Critical Quorum attestation as precondition inputs and sequences after them (both are causally before the ratification they feed; the quorum convening completes before this deterministic emission begins). The signed retirement-record commit is the linearization point; the downstream RELAY registry-projection update (§3.56.1.3.3) and the §6 Witness anchor observe the committed record and are sequenced after it."
          locks: "No lock on the retention_assessment inference half (the ephemeral workload acquires none and is single-use). Per-prompt single-writer lock on the CIPR Registry entry on the SOVEREIGN persistent substrate for the compare-and-set DEPRECATED→RETIRED transition, serializing ratification against any concurrent register/deprecate/retire on the same entity_id."
