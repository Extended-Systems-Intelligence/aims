    outputs: [load_verdict, environment_policy_bundle_or_null]
    witness_emission:
      - POLICY_BUNDLE_LOADED
      - POLICY_BUNDLE_LOAD_REFUSED
    spec_section: §3.89.1, §3.89.6, §3.54
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-122
    name: policy_bundle_substrate_check
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Check substrate-tag compatibility at bundle-load time per §3.89.5
      and §3.89.6. Compare deployment's declared substrate against the
      bundle's `declared_substrates` list. Resolve ABSTRACT action
      classes (per §3.89.3) to substrate-specific CONCRETE variants via
      `resolves_to` map. Refuse load if `refuse_load_if_unknown` is true
      and no substrate match found. Substrate identifiers follow the
      structured grammar `SubstrateFamily:SubstrateTier(:SubstrateProperty)*`.
    inputs: [deployment_substrate, bundle_declared_substrates, abstract_action_classes]
    outputs: [substrate_match_verdict, resolved_concrete_action_class_map]
    witness_emission:
      - SUBSTRATE_TAG_MATCHED
      - SUBSTRATE_TAG_MISMATCH
    spec_section: §3.89.5, §3.89.6, §3.89.7
    formal_verification: required
    adversarial_fuzzing: required

