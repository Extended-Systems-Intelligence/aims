            approval_record: "object (emitted only on success) — { candidate_id, granted_role: 'PERSISTENT_MONITOR', tenure_attested: integer, quorum_attestation: object, sovereign_signature: hybrid Ed25519 + ML-DSA-65 (§3.21.3), pms7_ref, witness_anchor }; the signed AUTHORITY_CHANGE authority grant. No credential/key material crosses the §3.65 boundary — only the opaque signed record."
