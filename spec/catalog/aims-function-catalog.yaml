          - "INSUFFICIENT_CONTEXT — the candidate reformulations or the ARCHITECT structural spec are incomplete (one L-Plan side has not finished processing); no defensible assessment is groundable. No verdict proposed; no emission (the deterministic half's precondition (a) 'both sides complete' is unmet → BOTH_SIDES_INCOMPLETE at the deterministic half). No Witness emission from this tool."
          - "LOW_CONFIDENCE — the assessment confidence is below the deployment proposal-confidence floor; the workload returns the assessment flagged low-confidence and re-engages rather than handing a falsely-confident verdict to the deterministic half. No emission."
        concurrency: >-
          One assessment per (inbound directive, PATH-04 round) within the directive-bounded ARCHITECT inference workload (optimal_concurrency=1; the workload is directive-bounded per Universal Node Architecture §1.2). The assessment is part of the §14 Phase 4 stateful exchange with the VISIONARY; concurrent assessments for the same directive round are not permitted, and the emission must be simultaneous with the VISIONARY's parallel emission per PATH-04 invariant 4 (a synchronization the deterministic half FN-137 / §13.3.5.1.1 enforces, not this inference half).
          No idempotency key and no linearization point at this inference tool — it produces a PROPOSAL with no committed side effect; the linearization point is downstream at the deterministic CONSISTENCY_CHECK_RESULT emission (§13.3.5.1.1). A DIVERGENT outcome re-engages a fresh assessment over the same directive round within the N=3 retry budget (§13.3.9). The proposal is replayable (no side effects) until ratified.
        test_vectors:
          - "CTS-ARC-FN140-01 {reformulations semantically compatible with the ARCHITECT spec, both sides complete, confidence ≥ floor} → assessment=CONSISTENT, proposed_outcome=ASSESSMENT_PROPOSED, no Witness emission from this tool (the deterministic half FN-137 / §13.3.5.1.1 signs + emits CONSISTENCY_CHECK_RESULT), no signature"
          - "CTS-ARC-FN140-02 {reformulations conflict with a constraint in the ARCHITECT spec} → assessment=DIVERGENT + divergence_detail, directive held at L-Plan for re-engagement (N=3 retries then ESCALATION to SOVEREIGN per §13.3.9), no autonomous emission"
          - "CTS-ARC-FN140-03 {assessment confidence below floor} → LOW_CONFIDENCE, re-engages, no falsely-confident verdict handed to deterministic half"
          - "CTS-ARC-FN140-04 {one L-Plan side incomplete} → INSUFFICIENT_CONTEXT, no verdict, deterministic half precondition (a) unmet (BOTH_SIDES_INCOMPLETE), no emission, no Witness from this tool"
          - "CTS-ARC-FN140-05 {workload returns no verdict} → ABSTAIN, ARCHITECT returns to §14 Phase 3, no emission, no Witness from this tool"
          - "CTS-ARC-FN140-06 {directive completes / §14 Phase 7} → enclosing directive-bounded ephemeral inference workload dismissed via §3.42.1 SDP per the ARCHITECT DismissalManifest; directive-scoped reasoning state WIPED; this tool never emitted a CONSISTENCY_CHECK_RESULT (deterministic half owns the emission)"
        substrate_interface: >-
          Runs as an EPHEMERAL_INFERENCE workload (endpoint_class EPHEMERAL_INFERENCE_WORKLOAD) within the ARCHITECT's directive-bounded inference workload during §14 Phase 4 (§13.3.3.2). The workload sees ONLY the inputs (the VISIONARY's candidate reformulations, the ARCHITECT's structural specification, the inbound directive IAME) and NEVER credential or key material: per §3.69.3 cryptographic capability confinement no LLM-class component holds signing keys, and per §3.65 the Cryptographic Boundary is the boundary key material MUST NOT cross — the ARCHITECT's delegated credential (§3.21) is held by the persistent substrate and used by the deterministic emission half (FN-137, §13.3.5.1.1) to sign the CONSISTENCY_CHECK_RESULT outside this workload (§3.66 enclave isolation; the inferential workload cannot reach the internal_enclave per §3.66).
          Output is a PROPOSAL (the CONSISTENT/DIVERGENT assessment) handed to the deterministic emission half (§13.3.5.1.1), which ratifies it (well-formedness + the four PATH-04 invariants) and signs + emits the CONSISTENCY_CHECK_RESULT over PATH-04; this workload performs no Witness write (witness_events=[]) and no authority-chain mutation. The §13.3.7 OBSCURITY detection metrics (complexity_to_insight_ratio / path04_consistency_divergence_rate) are computed by the substrate on the deterministic CONSISTENCY_CHECK emission, also deterministic (§3.18 Deterministic Shadow Governance). The assessment's reasoning context is disposed with the enclosing directive-bounded workload at §14 Phase 7 per §3.42.1 SDP, no residue.
