        witness_events: []
        shadow_relevance: >-
          SCHISM (the SOVEREIGN's behavioral shadow per §13.1.7). Per §13.0.3.2 (ambiguity surfacing), SCHISM is the failure mode that emerges when the dialogue does not surface ambiguity and instead codifies an interpretation autonomously, leading to multiple incompatible directives emitted downward.
          The dialogue MUST surface multi-interpretation ambiguity to the user rather than choosing autonomously; a sustained pattern of low-confidence or revised codifications is a §3.18.1 Correlated-Shadow signal. Shadow detection operates on the deterministic substrate events of the dismissal lifecycle, not on the probabilistic inference workload itself (Deterministic Shadow Governance).
        dismissal_trigger: >-
          Operating-context completion — the EPHEMERAL_INFERENCE workload backing this dialogue is dismissed when its bounded operating context completes (a single clarification-dialogue codification reaching CONFIRMED / REVISED / CANCELED per §13.0.3), via the §3.42.1 Structured Dismissal Protocol operating-context-completion trigger (per Universal Node Architecture; §3.32 deferred-pattern / ephemeral-lifecycle context). A REVISED outcome re-codifies and re-engages a fresh dialogue turn; dismissal disposes of the reasoning context per SDP. No persistent state survives the workload's dismissal.
        provenance: "§13.1.5.2.1 (Inference Tools — dialogue.codify_user_intent) / §13.0.3 Clarification dialogue protocol / §13.0.3.1 Intent codification / §3.72.1 Function-1 / FN-027 (§13.1.5 / §3.X.FUNC.1)"
        credential_refs: ["<user_session_credential_per_§13.0.4 — read-as-context only; the inference workload never holds or signs with credential/key material per §3.69.3 / §3.65>"]
        emit_class: PROPOSAL
        conformance_refs: ["§13.1.5.2", "§13.0.3", "§3.69", "§3.72.1", "§3.X.FUNC.1"]
        # --- 5 buildability ---
        io_contract: >-
          IN { principal_intent: natural-language user request (northbound, principal-supplied per §13.0.3.1), session_context_ref: handle(§13.0.4 ACTIVE session credential, read-as-context only), prior_dialogue_turns?: handle(§13.0.3 dialogue history for REVISED re-codification), trust_context?: session-scope/authorization bounds per §13.0.3.3, shadow_state?: §13.1.7 SCHISM advisory }
