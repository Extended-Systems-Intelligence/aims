          - "PROCEDURE_NOT_DECLARED — the inference half's proposed_procedure_id is not a member of the §13.0.6 pre-declared P9 recovery-procedure catalog (the procedure was not declared at commissioning per P9). The deterministic-ratification gate refuses BEFORE signing; emit VETO_REJECTION; no activation envelope, no procedure activated. This is the gate the §13.1.5.3.4 deterministic half MUST pass — a procedure absent from the commissioning declaration is never activated (cf. FN-086 CTS-SOV-FN086-05)."
          - "LOW_CONFIDENCE_PROPOSAL — the inference half returned no confident selection to ratify: outcome ∈ {LOW_CONFIDENCE, ABSTAIN, INSUFFICIENT_CONTEXT} (no PROCEDURE_PROPOSED, hence no proposed_procedure_id). The deterministic half has nothing to ratify; refuse; emit VETO_REJECTION; no activation envelope. The proposal routes back to the SOVEREIGN for disposition (no autonomous remediation)."
          - "VETO_REJECTION mapping — both typed refusals above are §3.69 deterministic-disposes rejections and anchor a VETO_REJECTION Witness record (§3.69.4 / §6.3). Each refusal is fail-closed (no partial activation, signing never reached) and emits exactly one typed reason; a successful ratified activation instead anchors AUTHORITY_CHANGE."
        concurrency:
          idempotency_key: "(incident_id, activated_procedure_id) — the single signed recovery-activation envelope commit on the SOVEREIGN persistent substrate is the authoritative activation; a re-ratification attempt against an incident whose recovery has already been activated resolves to the committed activation (no second AUTHORITY_CHANGE) rather than a duplicate envelope. The inference proposal (FN-086) itself carries no idempotency and no side effect; the binding linearization point is here, at the deterministic envelope emission."
          retry: "The inference-proposal half is freely re-invocable (no side effects); a retry yields a fresh proposal. The deterministic-ratification half is the authority point: gate refusals (PROCEDURE_NOT_DECLARED / LOW_CONFIDENCE_PROPOSAL) are deterministic under identical (proposal, pre_declared_procedures, signer) and may be retried without state change once the precondition is remedied (e.g. a re-run inference proposal that selects a declared procedure with confidence). After a committed activation, a re-issued ratification resolves to the committed envelope. A §3.65 / substrate write failure rejects the emission — no envelope commits, the recovery is not activated; escalate, do not assume partial activation."
          ordering: "The deterministic half observes the FN-086 inference proposal as a precondition input and sequences after it (the proposal is causally before the ratification it feeds). The signed-activation-envelope commit is the linearization point; the §6 Witness anchor and any §3.18.1 Correlated Shadow Detection correlation observe the committed record and are sequenced after it."
          locks: "No lock on the inference-proposal half (the FN-086 ephemeral workload acquires none and is single-use). Per-incident single-writer lock on the recovery-activation state on the SOVEREIGN persistent substrate for the compare-and-set NOT_ACTIVATED -> ACTIVATED transition, serializing ratification against any concurrent activation attempt for the same incident."
        test_vectors:
          - "CTS-SOV-FN092-01: inference proposal outcome=PROCEDURE_PROPOSED with proposed_procedure_id = p that IS a member of the §13.0.6 pre-declared P9 catalog, signer=SOVEREIGN -> status=ACTIVATED, opaque SIGNED_ENVELOPE handle carrying activated_procedure_id=p, AUTHORITY_CHANGE emitted; the chosen procedure ID is written into the signed activation envelope."
          - "CTS-SOV-FN092-02: inference proposal outcome=PROCEDURE_PROPOSED with proposed_procedure_id = p NOT in the §13.0.6 pre-declared P9 catalog -> status=REFUSED, refusal_reason=PROCEDURE_NOT_DECLARED, VETO_REJECTION emitted, no envelope, no procedure activated (the deterministic half MUST verify commissioning declaration per P9 before signing)."
          - "CTS-SOV-FN092-03: inference proposal outcome=LOW_CONFIDENCE (no proposed_procedure_id) -> status=REFUSED, refusal_reason=LOW_CONFIDENCE_PROPOSAL, VETO_REJECTION emitted, no envelope; nothing confident to ratify."
          - "CTS-SOV-FN092-04: inference proposal outcome=ABSTAIN (no selection) -> status=REFUSED, refusal_reason=LOW_CONFIDENCE_PROPOSAL, VETO_REJECTION emitted, no envelope (a non-PROCEDURE_PROPOSED outcome is no confident selection)."
          - "CTS-SOV-FN092-05: inference proposal outcome=INSUFFICIENT_CONTEXT -> status=REFUSED, refusal_reason=LOW_CONFIDENCE_PROPOSAL, VETO_REJECTION emitted, the SOVEREIGN MUST NOT proceed to activation."
          - "CTS-SOV-FN092-06: every call dispositioned exactly once (emit XOR refuse) with exactly one typed reason on refusal, across the full input cross-product (confident-vs-non-confident proposal × declared-vs-undeclared procedure); a signed envelope is emitted IFF (PROCEDURE_PROPOSED AND declared-at-commissioning); signing-key material never appears in output -> totality / no-bypass / malformed-input safety / §3.65 isolation."
        substrate_interface: "HYBRID substrate (the §13.1.5.3 hybrid-tool convention): the INFERENCE half (FN-086, recovery.procedure_activation) runs as an EPHEMERAL_INFERENCE workload physically isolated from the §3.65 INTERNAL_ENCLAVE — it sees only the incident state and the pre-declared procedure catalog, never credential/key material, and produces an unsigned §3.12 Decision Record proposal. The DETERMINISTIC ratification + emission half runs on the SOVEREIGN PERSISTENT_SUBSTRATE behind the §3.65 cryptographic boundary: it verifies the proposed procedure against the §13.0.6-commissioning pre-declared P9 catalog (the catalog is substrate-resident, non-bypassable from the agentic side) and the proposal's confidence, then performs the §3.21.3 HYBRID Ed25519+ML-DSA-65 (Stage 1) signing over the recovery-activation envelope inside the enclave. The sovereign_credential private key and ERM-derived key material never cross the §3.65 boundary; only the opaque SIGNED_ENVELOPE handle (carrying the chosen procedure ID) and the §6 Witness anchor (AUTHORITY_CHANGE on success; VETO_REJECTION on refusal) are returned across the boundary (§3.69.3 cryptographic capability confinement — no LLM-class component holds signing or Witness-write authority)."
