          - "names.register_entity FN-071 (§13.1.5.1.17 — the downstream PERSISTENT_SUBSTRATE write tool that emits the actual REGISTRATION record; this gate is a pure precondition validator that ADMITs into FN-071's input or REJECTs before it — the gate never writes the canonical entry)"
          - "Witness Layer (§6 / §6.3 hash-chain anchor for the REGISTRATION_REJECTED emitted on REJECT; ADMIT is a silent pass and anchors no event here — FN-071 anchors the REGISTRATION on the subsequent committed write)"
        consensus_role: "NONE — per §13.1.5.6.7 the registration gate is a deterministic substrate operation under Deterministic Shadow Governance (§13.1.3.1): it convenes no §3.42 quorum and contributes no consensus disposition. The §3.2 Full Disclosure Registration is dispositioned unilaterally against the fixed precondition gate (pairing well-formed + metadata complete/well-formed + derivation fields unmutated), not by a convened quorum. The ADMIT XOR REJECT outcome is structurally determined by the submitted declaration against the §3.2 schema; there is no judgment surface."
        witness_events:
          - REGISTRATION_REJECTED
        shadow_relevance: "SCHISM (SOVEREIGN shadow): the failure mode is directive inconsistency at the registration boundary — admitting an entity whose §3.2 pairing is malformed (no valid supervision binding / escalation target per §3.2 Part 5), whose declaration set is incomplete or ill-formed (§3.2 Parts 1-5), or whose immutable derivation-provenance fields were mutated at registration would splinter the authority topology by seating an entity that is not fully disclosed, eroding directive_consistency_score. The deterministic ADMIT-XOR-REJECT gate structurally bounds this: an entity that fails any precondition is dispositioned as a §3.69 deterministic-disposes rejection (REGISTRATION_REJECTED) rather than silently admitted; a non-SOVEREIGN-credentialed submission likewise fails closed. ADMIT is a silent pass — the gate produces no canonical state (FN-071 does), so a spurious ADMIT cannot by itself seat an entity."
        dismissal_trigger: "REJECT (typed reason, no admission, no canonical write) on any unmet precondition, emitting REGISTRATION_REJECTED per §3.69: the §3.2 supervision-binding/pairing is absent or malformed (PAIRING_VIOLATION), the §3.2 declaration set is incomplete or ill-formed (INVALID_METADATA), or an immutable derivation-provenance field was altered relative to its sealed origin at registration (DERIVATION_FIELD_MUTATION). No autonomous remediation; the gate performs no state change on either outcome — ADMIT is a silent pass-through into FN-071, REJECT preserves the unregistered state and surfaces a SCHISM-relevant attempt for §3.18 correlation."
        provenance: "§13.1.5.6.7 SOVEREIGN gate inventory — synthesized GATE; typed slots verbatim (kind=GATE, class=DETERMINISTIC, substrate=PERSISTENT_SUBSTRATE, authority=SOVEREIGN_CREDENTIAL, paths=[]); behavioral grounding §3.2 (Full Disclosure Registration — the five-part declaration {IDENTITY, CAPABILITIES, RISK DECLARATION, CONTEXT REQUIREMENTS, SUPERVISION BINDING} that MUST be complete before any agent can be activated; the supervision-binding part carries the pairing — supervisorId/escalationTarget/interventionMethod/interventionTrigger) + §3.69 (Deterministic Ratification — a REJECT is a §3.69 deterministic-disposes REGISTRATION_REJECTED). This gate validates a §3.2 registration submission's pairing + metadata at registration and ADMITs (pass-through; the actual record is written by names.register_entity FN-071, NOT here) XOR REJECTs. NOTE (reconciled 2026-06-16): REGISTRATION_REJECTED — the §3.2/§3.17 Registration-Gate reject Witness — is now enumerated in the §6.3 WitnessEventType Catalog; REJECT emits REGISTRATION_REJECTED carrying the failed_checks reason (the §3.2/§3.17 registration-gate typed form of the §3.69.4 Veto-on-Rejection). NOT present in the §13.1.5.1 deterministic-tool list nor §13.1.5.2/.3 — synthesized from the SOVEREIGN operational sections (§3.2 + §13.1.5.6.7)."
        credential_refs:
          - "sovereign_credential (the SOVEREIGN_CREDENTIAL per §3.21 under whose authority the registration gate runs; the gate is a deterministic validation — it verifies the submission against the §3.2 schema and the credentialed-submitter precondition, but performs no signing and produces no signed record — only an opaque submission handle is read, no key material crosses the §3.65 boundary)"
        emit_class: REGISTRATION_REJECTED
        conformance_refs:
          - "§3.2 Full Disclosure Registration conformance — the five-part declaration MUST be complete before activation; this gate is the deterministic completeness + pairing + derivation-integrity validator on the registration submission"
          - "§3.69 Deterministic Ratification — REJECT emits REGISTRATION_REJECTED (§3.69.4 Veto-on-Rejection); sustained reject rate above baseline is a §3.18.1 signal"
          - "§3.70 Formal-Verification Requirement (DETERMINISTIC item per §3.70.1 v2.0 rigid-half expansion; machine-checked model per §3.70.4)"
          - "§4.8 conformance claim format"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [registration_submission_ref, pairing, metadata, derivation_fields, signer_role]
            properties:
              registration_submission_ref:
                type: string
                format: uuid
                description: "Opaque handle to the §3.2 FullDisclosureRegistration submission under validation; the gate reads it, never mutates it. No key material is carried — only the declaration content + provenance fields."
              pairing:
                type: string
                enum: [WELL_FORMED, MALFORMED]
                description: "Whether the §3.2 Part-5 supervision binding / one-to-one pairing (supervisorId, escalationTarget, interventionMethod, interventionTrigger) resolves to a valid pairing. MALFORMED -> PAIRING_VIOLATION."
              metadata:
                type: string
                enum: [COMPLETE, INCOMPLETE]
                description: "Whether the §3.2 five-part declaration set (IDENTITY + CAPABILITIES + RISK DECLARATION + CONTEXT REQUIREMENTS + SUPERVISION BINDING) is complete and well-formed. INCOMPLETE -> INVALID_METADATA."
              derivation_fields:
                type: string
                enum: [INTACT, MUTATED]
                description: "Whether the submission's immutable derivation-provenance fields match their sealed origin (unaltered at registration). MUTATED -> DERIVATION_FIELD_MUTATION."
              signer_role:
                type: string
                enum: [SOVEREIGN]
                description: "Must be SOVEREIGN — the registration gate runs under the SOVEREIGN_CREDENTIAL authority; a non-SOVEREIGN submission fails closed (precondition not met)."
          out:
            type: object
            description: "ADMIT is a silent pass-through (the submission is cleared to proceed to names.register_entity FN-071, which performs the actual canonical write and emits REGISTRATION) — the gate emits NO Witness event on ADMIT. REJECT performs no admission and emits REGISTRATION_REJECTED. The gate never writes the canonical registry entry and never signs."
            required: [decision]
            properties:
              decision:
                type: string
                enum: [ADMIT, REJECT]
              refusal_reason:
                type: string
                enum: [PAIRING_VIOLATION, INVALID_METADATA, DERIVATION_FIELD_MUTATION]
                description: "Present only when decision=REJECT."
              witness_id:
                type: string
                description: "§6 hash-chain anchor for REGISTRATION_REJECTED, present ONLY when decision=REJECT (§3.69.4). Absent on ADMIT — ADMIT is a silent pass."
          invariant: "ADMIT XOR REJECT — every submission is dispositioned exactly once into exactly one outcome (totality, no-bypass per §3.69); ADMIT clears the submission into FN-071 and emits NO Witness event (silent pass), REJECT performs no admission and emits exactly one REGISTRATION_REJECTED carrying exactly one typed reason; the gate ADMITs ONLY when pairing is WELL_FORMED AND metadata is COMPLETE AND derivation_fields are INTACT AND signer is SOVEREIGN (precondition-gate — a single failed condition forces REJECT); the gate writes no canonical state on either outcome (pure validator — FN-071 owns the write); no signing-key material crosses the §3.65 boundary (the gate reads only the opaque submission handle + declaration content)."
        errors:
          - "PAIRING_VIOLATION — the §3.2 Part-5 supervision binding / one-to-one pairing is absent or malformed. REJECT; emit REGISTRATION_REJECTED; no admission, no canonical write; the entity stays unregistered."
          - "INVALID_METADATA — the §3.2 five-part declaration set is incomplete or ill-formed (a required IDENTITY / CAPABILITIES / RISK DECLARATION / CONTEXT REQUIREMENTS / SUPERVISION BINDING element is absent or malformed). REJECT; emit REGISTRATION_REJECTED; no admission."
          - "DERIVATION_FIELD_MUTATION — an immutable derivation-provenance field in the submission was altered relative to its sealed origin at registration. REJECT; emit REGISTRATION_REJECTED; no admission; surfaces a SCHISM-relevant integrity attempt for §3.18 correlation."
        concurrency:
          idempotency_key: "registration_submission_ref — the gate is a pure read-only validator with no state change on either outcome, so it is naturally idempotent: re-validating the same submission yields the same ADMIT-XOR-REJECT disposition (deterministic given identical submission + gate inputs). The single-shot-per-entity discipline is enforced downstream at FN-071 (names.register_entity, idempotency_key=entity_id), not here — this gate may be re-evaluated freely."
          retry: "Safe to retry unconditionally: the gate performs no write and emits a Witness event only on REJECT; a retried REJECT is deterministic under identical input. ADMIT carries no side effect at the gate (FN-071 owns the durable write and its own ALREADY_REGISTERED single-shot guard), so an at-most-once ADMIT-then-write is enforced at FN-071, and a duplicated ADMIT cannot produce a duplicate canonical entry."
          ordering: "The gate is a strict predecessor of FN-071: a submission MUST pass this gate (ADMIT) before names.register_entity is invoked. The gate disposition is the validation point; the canonical write + REGISTRATION emission are sequenced after it at FN-071. No ordering coupling between concurrent validations of distinct submissions (each is independent, read-only)."
          locks: "None required at the gate — read-only validation, no state row touched. The per-entity_id single-writer compare-and-set lock lives at FN-071 on the canonical registry (PERSISTENT_SUBSTRATE single-canonical-writer discipline §3.66.7.3.2)."
        test_vectors:
          - "CTS-SOV-FN101-01: pairing=WELL_FORMED, metadata=COMPLETE, derivation_fields=INTACT, signer=SOVEREIGN -> decision=ADMIT, NO Witness event emitted (silent pass), no canonical write (FN-071 performs the write downstream)."
          - "CTS-SOV-FN101-02: pairing=MALFORMED, metadata=COMPLETE, derivation_fields=INTACT, signer=SOVEREIGN -> decision=REJECT, refusal_reason=PAIRING_VIOLATION, REGISTRATION_REJECTED emitted, no admission."
          - "CTS-SOV-FN101-03: pairing=WELL_FORMED, metadata=INCOMPLETE, derivation_fields=INTACT, signer=SOVEREIGN -> decision=REJECT, refusal_reason=INVALID_METADATA, REGISTRATION_REJECTED emitted, no admission."
          - "CTS-SOV-FN101-04: pairing=WELL_FORMED, metadata=COMPLETE, derivation_fields=MUTATED, signer=SOVEREIGN -> decision=REJECT, refusal_reason=DERIVATION_FIELD_MUTATION, REGISTRATION_REJECTED emitted, no admission."
          - "CTS-SOV-FN101-05: every submission dispositioned exactly once (ADMIT XOR REJECT) across the full input cross-product, ADMIT emits no Witness event while REJECT emits exactly one REGISTRATION_REJECTED carrying exactly one typed reason in priority order (pairing > metadata > derivation) — totality / malformed-input safety + no-bypass + no-witness-on-admit."
        substrate_interface: "§3.65 cryptographic boundary: the registration gate is a deterministic validation operation of the SOVEREIGN persistent substrate per §13.1.3.1 / §13.1.5.6.7. It runs under the SOVEREIGN_CREDENTIAL authority but performs NO signing and produces NO signed record — it reads only the opaque §3.2 FullDisclosureRegistration submission handle + its declaration content + derivation-provenance fields, and computes the ADMIT-XOR-REJECT disposition. No sovereign_credential private key or ERM-derived key material crosses the §3.65 boundary (the gate does not sign). On ADMIT the cleared submission proceeds to names.register_entity FN-071, which executes the §3.21.3 HYBRID signing + canonical write inside the SOVEREIGN persistent-substrate enclave (that signing is FN-071's substrate_interface, not this gate's). The §6 Witness anchor (REGISTRATION_REJECTED on REJECT only; ADMIT is silent) is the gate's sole audit artifact crossing the boundary."
