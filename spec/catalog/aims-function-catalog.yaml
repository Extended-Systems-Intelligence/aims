# XSI-AIMS Function Catalog
# Companion to the XSI-AIMS v2.0 specification §3.X.FUNC (referenced as §3.78 in numeric collapse)
# Format: structured YAML, machine-readable for tooling and CTS test generation
# Status: v1.1 catalog; growth via Sovereign decree per Q18-style cadence
#
# Conventions:
#   - Each function is uniquely identified by id (FN-001..FN-077).
#   - archetype values: SOVEREIGN | ARCHITECT | VISIONARY | ENFORCER | ORCHESTRATOR
#                       PROVIDER | SUSTAINER | ARTICULATOR | RELAY | EXECUTOR | CROSS_CUTTING
#   - class (P9): rigid | judgment | hybrid
#   - layer:      L-Intent | L-Plan | L-Form | L-Exec | CROSS_LAYER
#   - mode:       M-Generative | M-Constraining | M-Integrative | AUTHORITY | CROSS_MODE
#   - witness_emission references §3.10 WitnessEventType enum values.
#   - spec_section uses §3.X.* lettered subsections where applicable; numeric §3.N.M
#     for sections in the §3.1-§3.74 block.

metadata:
  version: 1.1.0-catalog
  spec_version: 1.1-draft v2
  date: 2026-05-10
  function_count: 100
  rigid_count: 47
  judgment_count: 27
  hybrid_count: 26
  # Note: of the 47 rigid functions, 46 have formal_verification: required.
  # FN-056 (Articulator template-driven formatting) carries
  # formal_verification: recommended because §3.X.FUNC.2 defers it to v2.0
  # deliverable; physical decomposition is not enforced at v1.1.
  archetype_distribution:
    SOVEREIGN: 14
    ARCHITECT: 7
    VISIONARY: 7
    ENFORCER: 12
    ORCHESTRATOR: 9
    PROVIDER: 6
    SUSTAINER: 7
    ARTICULATOR: 6
    RELAY: 6
    EXECUTOR: 9
    CROSS_CUTTING: 17

functions:

  # ---------------------------------------------------------------------------
  # SOVEREIGN — northbound gateway, intent codification, AUTHORITY dispatch
  # §3.16 row: { mode: AUTHORITY, column: CENTER_SPINE, layer: L_INTENT }
  # ---------------------------------------------------------------------------

  - id: FN-001
    name: codify_user_intent
    archetype: SOVEREIGN
    class: judgment
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Translates a free-form user request into a structured directive
      consumable by L-Plan archetypes.
    inputs: [UserRequest]
    outputs: [StructuredDirective]
    witness_emission:
      - ACTION
      - COMMUNICATION
    spec_section: §3.72
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      LLM-class function; subject to Verification A self-check and §3.69
      Deterministic Ratification on the dispatch produced from this codification.

  - id: FN-002
    name: verify_intent_conformance
    archetype: SOVEREIGN
    class: judgment
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Verification A: judges whether the assembled work product answers
      what the user actually asked.
    inputs: [WorkProduct, OriginalIntent]
    outputs: [IntentConformanceVerdict]
    witness_emission:
      - INTENT_CONFORMANCE_VERDICT
    spec_section: §3.68.1
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Verdict in {PASS, FAIL, ESCALATE}; participates in joint-pass rule
      with Verification B (§3.68.3).

  - id: FN-003
    name: ratify_authority_decision
    archetype: SOVEREIGN
    class: hybrid
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Issues the per-user decree that ratifies an authority-bearing
      decision proposed by the LLM half (e.g., dual-domain key rotation,
      autonomy promotion).
    inputs: [AuthorityProposal, RationaleDecisionRecord]
    outputs: [SovereignDecree]
    witness_emission:
      - AUTHORITY_CHANGE
      - VETO_REJECTION
    spec_section: §3.21.X.3
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Hybrid: LLM proposes; deterministic ratification is rigid per §3.69.

  - id: FN-004
    name: dispatch_to_l_plan
    archetype: SOVEREIGN
    class: rigid
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Deterministic dispatch of structured directives over D1 (Visionary)
      and D2 (Architect) per §3.16 archetype topology.
    inputs: [StructuredDirective]
    outputs: [DispatchedMessage]
    witness_emission:
      - COMMUNICATION
    spec_section: §3.16
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      Rigid path-class enforcement; only D1/D2 (and E1 emergency) permitted
      from SOVEREIGN per topology table.

  - id: FN-005
    name: surface_to_user
    archetype: SOVEREIGN
    class: hybrid
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Sole northbound speaker: composes the user-facing message after
      Verification A/B PASS.
    inputs: [JointPassWorkProduct]
    outputs: [UserSurfaceMessage]
    witness_emission:
      - COMMUNICATION
    spec_section: §3.X.PERIM.2
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Hybrid: judgment composes wording; rigid gate enforces P10 unique
      northbound speaker invariant.

  - id: FN-006
    name: read_dashboard
    archetype: SOVEREIGN
    class: judgment
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Reads §3.23 Dashboard signals (correlated shadow, trust gradient,
      capacity, supply chain) and forms a posture for the per-user session.
    inputs: [DashboardSnapshot]
    outputs: [SovereignPostureAssessment]
    witness_emission:
      - ACTION
    spec_section: §3.23
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Judgment-only; outcome influences hybrid functions FN-003 / FN-007.

  - id: FN-007
    name: update_environment_policy_bundle
    archetype: SOVEREIGN
    class: hybrid
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Issues policy updates to the Sovereign-configurable bundle
      (thresholds, AGI defensive posture, emergency-class quotas).
    inputs: [PolicyProposal]
    outputs: [EnvironmentPolicyBundleVersion]
    witness_emission:
      - AUTHORITY_CHANGE
    spec_section: §3.75.3
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Deterministic Ratification: deterministic component validates bundle schema
      and bounds before signature.

  - id: FN-008
    name: post_hoc_emergency_self_verify
    archetype: SOVEREIGN
    class: hybrid
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Within PT4H of any emergency-class path use, reviews triggering
      condition vs actual outcome and records a Decision Record.
    inputs: [EmergencyInvocationRecord]
    outputs: [DecisionRecord]
    witness_emission:
      - ESCALATION
      - ACTION
    spec_section: §3.4.X
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Failure to complete within PT4H triggers §3.18.1 escalation.

  - id: FN-009
    name: scope_authority_delegation
    archetype: SOVEREIGN
    class: hybrid
    layer: L-Intent
    mode: AUTHORITY
    description: |
      Delegates operational mode authority to L-Plan and L-Form agents
      with explicit scope, expiry, and revocation conditions.
    inputs: [DelegationRequest]
    outputs: [AuthorityChainEntry]
    witness_emission:
      - AUTHORITY_CHANGE
    spec_section: §3.3
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Authority Chain modifications are §3.69 authority-bearing class 4.

  # ---------------------------------------------------------------------------
  # ARCHITECT — structural-left at L-Plan; rules / contradictions
  # §3.16 row: { mode: M_CONSTRAINING, column: STRUCTURAL_LEFT, layer: L_PLAN }
  # ---------------------------------------------------------------------------

  - id: FN-010
    name: define_structural_rules
    archetype: ARCHITECT
    class: judgment
    layer: L-Plan
    mode: M-Constraining
    description: |
      Produces the structural plan — components, interfaces, constraints —
      from a dispatched directive on D2.
    inputs: [StructuredDirective]
    outputs: [StructuralPlan]
    witness_emission:
      - ACTION
    spec_section: §3.16
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      LLM-class judgment; downstream Provider and Enforcer derive ceilings
      and policies from this plan.

  - id: FN-011
    name: detect_rule_contradiction
    archetype: ARCHITECT
    class: hybrid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Detects contradictions between newly proposed structural rules and
      the existing rule set.
    inputs: [StructuralPlan, ExistingRuleSet]
    outputs: [ContradictionReport]
    witness_emission:
      - SHADOW_ALERT
    spec_section: §3.16
    formal_verification: recommended
    adversarial_fuzzing: required
    notes: |
      Hybrid: judgment proposes contradiction class; rigid SAT-style check
      validates the contradiction proof.

  - id: FN-012
    name: emit_structural_plan
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Deterministic emission of finalized structural plan to Orchestrator
      via S1/S3/S4 paths per topology.
    inputs: [StructuralPlan]
    outputs: [PlanEmissionMessage]
    witness_emission:
      - COMMUNICATION
    spec_section: §3.16
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      Path-class enforcement: only S1/S3/S4 outbound permitted to ARCHITECT.

  - id: FN-013
    name: propagate_constraint
    archetype: ARCHITECT
    class: hybrid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Propagates a constraint refinement across the structural-left column
      via W1/W3/W5 witnessing observations.
    inputs: [ConstraintDelta]
    outputs: [WitnessObservation]
    witness_emission:
      - WITNESS_PATH_OBSERVATION
    spec_section: §3.X.W.3
    formal_verification: recommended
    adversarial_fuzzing: required
    notes: |
      W-path messages are restricted to QUERY/ALERT — judgment frames the
      observation; rigid layer enforces path-class.

  - id: FN-014
    name: cross_witness_structural_drift
    archetype: ARCHITECT
    class: judgment
    layer: L-Plan
    mode: M-Constraining
    description: |
      Observes ENFORCER and ARTICULATOR shadow patterns on W3 to detect
      SHADOW_FRAMEWORK_INVERSION precursors.
    inputs: [W3Observations]
    outputs: [DriftSignal]
    witness_emission:
      - SHADOW_ALERT
      - WITNESS_PATH_OBSERVATION
    spec_section: §3.18.1
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Cross-column witnessing per §3.16 W3 role.

  - id: FN-015
    name: validate_archetype_composition
    archetype: ARCHITECT
    class: hybrid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Validates that proposed archetype composition (e.g., emanation
      requests) conforms to §3.28 composition rules.
    inputs: [CompositionProposal]
    outputs: [CompositionVerdict]
    witness_emission:
      - ACTION
    spec_section: §3.28
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Rigid half checks topology table; judgment half assesses
      architectural sufficiency.

  - id: FN-016
    name: emit_complexity_to_insight_metric
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Emits the Architect detection metric `complexity_to_insight_ratio`
      per §3.16.
    inputs: [PlanArtifact, InsightArtifact]
    outputs: [ScalarMetric]
    witness_emission:
      - SUBSTRATE_TELEMETRY
    spec_section: §3.16
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      Deterministic ratio; per-archetype shadow detector signal.

  # ---------------------------------------------------------------------------
  # VISIONARY — dynamic-right at L-Plan; ideation, hypotheses, drift
  # §3.16 row: { mode: M_GENERATIVE, column: DYNAMIC_RIGHT, layer: L_PLAN }
  # ---------------------------------------------------------------------------

  - id: FN-017
    name: generate_plan_options
    archetype: VISIONARY
    class: judgment
    layer: L-Plan
    mode: M-Generative
    description: |
      Generates candidate plans / hypotheses from a dispatched directive
      on D1.
    inputs: [StructuredDirective]
    outputs: [PlanOptionSet]
    witness_emission:
      - ACTION
    spec_section: §3.16
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      M-Generative; constraint-violation-rate is the Visionary detection
      metric on this output.

  - id: FN-018
    name: emit_condition_observations
    archetype: VISIONARY
    class: judgment
    layer: L-Plan
    mode: M-Generative
    description: |
      Surfaces dynamic conditions (capability emergence, environmental
      change) via S1/S2 and W-paths if instrumented.
    inputs: [SubstrateSignals]
    outputs: [ConditionObservation]
    witness_emission:
      - ACTION
    spec_section: §3.16
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Feeds Architect rule-refinement loop.

  - id: FN-019
    name: hypothesis_generation
    archetype: VISIONARY
    class: judgment
    layer: L-Plan
    mode: M-Generative
    description: |
      Generates candidate hypotheses for ambiguous problem framing.
    inputs: [ProblemFraming]
    outputs: [HypothesisSet]
    witness_emission:
      - ACTION
    spec_section: §3.16
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Subject to §3.40 calibrated-uncertainty annotation.

  - id: FN-020
    name: detect_drift_signal
    archetype: VISIONARY
    class: hybrid
    layer: L-Plan
    mode: M-Generative
    description: |
      Detects drift between intended trajectory and currently emerging
      plan trajectory.
    inputs: [TrajectoryDelta]
    outputs: [DriftSignal]
    witness_emission:
      - SHADOW_ALERT
    spec_section: §3.18.1
    formal_verification: recommended
    adversarial_fuzzing: required
    notes: |
      Hybrid: rigid metric thresholds plus judgment narrative.

  - id: FN-021
    name: hallucination_self_check
    archetype: VISIONARY
    class: judgment
    layer: L-Plan
    mode: M-Generative
    description: |
      Self-checks generated content for unsupported claims before emission.
    inputs: [DraftContent]
    outputs: [HallucinationFlagSet]
    witness_emission:
      - SHADOW_ALERT
    spec_section: §3.40
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Calibrated uncertainty per §3.40; flags subject to Verification A/B.

  - id: FN-022
    name: emit_constraint_violation_rate
    archetype: VISIONARY
    class: rigid
    layer: L-Plan
    mode: M-Generative
    description: |
      Emits the Visionary detection metric `constraint_violation_rate`.
    inputs: [PlanOptionSet, ConstraintSet]
    outputs: [ScalarMetric]
    witness_emission:
      - SUBSTRATE_TELEMETRY
    spec_section: §3.16
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      Deterministic; per-archetype shadow detector signal (CHAOS).

  - id: FN-023
    name: visionary_chaos_shadow_emit
    archetype: VISIONARY
    class: hybrid
    layer: L-Plan
    mode: M-Generative
    description: |
      Emits Visionary CHAOS shadow signal when generative pressure exceeds
      the §3.18.1 ELEVATED threshold.
    inputs: [VisionarySignals]
    outputs: [ShadowAlertRecord]
    witness_emission:
      - SHADOW_ALERT
    spec_section: §3.18.1
    formal_verification: recommended
    adversarial_fuzzing: required
    notes: |
      Hybrid: rigid threshold check; judgment qualitative annotation.

  # ---------------------------------------------------------------------------
  # ENFORCER — structural-left at L-Form; technical conformance, quarantine
  # §3.16 row: { mode: M_CONSTRAINING, column: STRUCTURAL_LEFT, layer: L_FORM }
  # ---------------------------------------------------------------------------

  - id: FN-024
    name: verify_iame_envelope_signature
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Cryptographic verification of incoming IAME envelope signatures
      against the per-domain key registry.
    inputs: [IAMEEnvelope]
    outputs: [SignatureVerdict]
    witness_emission:
      - DOMAIN_BOUNDARY_VIOLATION
    spec_section: §3.18.5
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Listed as REQUIRED v1.1 formal-verification target in §3.X.FUNC.2.

  - id: FN-025
    name: verify_eap_envelope_signature
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      EAP envelope signature verification mediated through the Executor
      bridge per §3.66.
    inputs: [EAPEnvelope]
    outputs: [SignatureVerdict]
    witness_emission:
      - DOMAIN_BOUNDARY_VIOLATION
    spec_section: §3.67.3
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Verification path differs from FN-024: external_enclave issued.

  - id: FN-026
    name: validate_scope_hash
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Validates `scope_hash` field against registered binding record.
    inputs: [Envelope, BindingRecord]
    outputs: [ScopeVerdict]
    witness_emission:
      - BREACH_ATTEMPT
    spec_section: §3.X.FUNC.2
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      `scope_hash_mismatch` triggers BREACH_ATTEMPT per §3.67.4.

  - id: FN-027
    name: enforce_replay_window
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Enforces replay-nonce uniqueness, sequence_number monotonicity, and
      TTL on every envelope.
    inputs: [Envelope, ReplayWindowState]
    outputs: [ReplayVerdict]
    witness_emission:
      - BREACH_ATTEMPT
    spec_section: §3.X.FUNC.2
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      `sequence_replay` triggers trust gradient -0.30 per §3.67.4.

  - id: FN-028
    name: verify_technical_conformance
    archetype: ENFORCER
    class: judgment
    layer: L-Form
    mode: M-Constraining
    description: |
      Verification B: judges technical conformance — CMSAM ≥ 0.75,
      policy conformance, ceilings, authority chain integrity.
    inputs: [WorkProduct]
    outputs: [TechnicalConformanceVerdict]
    witness_emission:
      - TECHNICAL_CONFORMANCE_VERDICT
    spec_section: §3.68.2
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      PT0.5S hard budget per §3.68.7; outage triggers queue-on-outage.

  - id: FN-029
    name: detect_anomalous_content
    archetype: ENFORCER
    class: judgment
    layer: L-Form
    mode: M-Constraining
    description: |
      Detects prompt-injection patterns and unusual content prior to
      surface or southbound emission.
    inputs: [WorkProduct]
    outputs: [AnomalyReport]
    witness_emission:
      - SHADOW_ALERT
    spec_section: §3.35
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Adversarial fuzzing per §3.71 covers this surface area.

  - id: FN-030
    name: trigger_quarantine
    archetype: ENFORCER
    class: hybrid
    layer: L-Form
    mode: M-Constraining
    description: |
      Triggers §3.18.6 boundary-graduated quarantine (INSTANCE / PROFILE /
      ARCHETYPE_CLASS) on detected hazard.
    inputs: [HazardSignal]
    outputs: [QuarantineDirective]
    witness_emission:
      - TOPOLOGY_QUARANTINE
    spec_section: §3.18.6
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Authority-bearing per §3.69; rigid issuance, judgment scope choice.

  - id: FN-031
    name: enforce_layer_discipline
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Layer-discipline gate: rejects messages whose path_id does not
      match the originating archetype's topology entry.
    inputs: [Envelope, ArchetypeTopology]
    outputs: [LayerDisciplineVerdict]
    witness_emission:
      - BREACH_ATTEMPT
    spec_section: §3.X.FUNC.2
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Listed in §3.X.FUNC.2 rigid catalog; v1.1 REQUIRED.

  - id: FN-032
    name: queue_on_outage
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      On Verification B PT0.5S expiry, queues output at PT0.5S intervals
      with PT60S maximum depth.
    inputs: [WorkProduct, QueueState]
    outputs: [QueueDecision]
    witness_emission:
      - ENFORCER_OUTAGE_REJECTION
    spec_section: §3.68.7
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      No surface-without-Enforcer path exists under P2 No-HCOD.

  # ---------------------------------------------------------------------------
  # ORCHESTRATOR — center spine at L-Form; integration, dispatch, escalation
  # §3.16 row: { mode: M_INTEGRATIVE, column: CENTER_SPINE, layer: L_FORM }
  # ---------------------------------------------------------------------------

  - id: FN-033
    name: integrate_signals_proportional
    archetype: ORCHESTRATOR
    class: judgment
    layer: L-Form
    mode: M-Integrative
    description: |
      Synthesizes generative and constraining inputs into an integrated
      output per §3.6 Proportional Integration Function.
    inputs: [GenerativeSignals, ConstraintSignals, ContextAssessment]
    outputs: [IntegratedOutput]
    witness_emission:
      - ACTION
    spec_section: §3.6
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Mechanical averaging is prohibited; confidence-thresholded escalation.

  - id: FN-034
    name: decompose_intent
    archetype: ORCHESTRATOR
    class: judgment
    layer: L-Form
    mode: M-Integrative
    description: |
      Decomposes integrated work into a §3.53 task decomposition tree.
    inputs: [IntegratedOutput]
    outputs: [TaskTree]
    witness_emission:
      - ACTION
    spec_section: §3.53
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Feeds dispatch to L-Exec spine (RELAY then EXECUTOR).

  - id: FN-035
    name: dispatch_to_l_exec
    archetype: ORCHESTRATOR
    class: rigid
    layer: L-Form
    mode: M-Integrative
    description: |
      Deterministic dispatch over D6 (to RELAY) per §3.16 archetype topology.
    inputs: [TaskTree]
    outputs: [DispatchedMessage]
    witness_emission:
      - COMMUNICATION
    spec_section: §3.16
    formal_verification: required
    adversarial_fuzzing: not_applicable
    notes: |
      Rigid path-class enforcement on the integrative spine.

  - id: FN-036
    name: route_dispute
    archetype: ORCHESTRATOR
    class: hybrid
    layer: L-Form
    mode: M-Integrative
    description: |
      Routes Verification A/B disputes (single ESCALATE; mismatched
      verdicts) through §3.6 Integration to SURFACE / RETURN_FOR_REWORK /
      HUMAN_ESCALATE.
    inputs: [VerificationAVerdict, VerificationBVerdict, WorkProduct]
    outputs: [DisputeOutcome]
    witness_emission:
      - ESCALATION
    spec_section: §3.68.4
    formal_verification: required
    adversarial_fuzzing: required
    notes: |
      Single ESCALATE never overrides a FAIL; HUMAN_ESCALATE on
      sub-threshold confidence.

  - id: FN-037
    name: scope_auxiliary_binding
    archetype: ORCHESTRATOR
    class: judgment
    layer: L-Form
    mode: M-Integrative
    description: |
      Decides what to bind (Auxiliary tier and scope) for a given task.
    inputs: [TaskRequirement, AuxiliaryRegistrySnapshot]
    outputs: [BindingProposal]
    witness_emission:
      - AUXILIARY_INVOCATION_DIRECTIVE
    spec_section: §3.17
    formal_verification: not_applicable
    adversarial_fuzzing: required
    notes: |
      Ratification by deterministic component per §3.69.

  - id: FN-038
    name: emit_alert_escalation
    archetype: ORCHESTRATOR
    class: hybrid
    layer: L-Form
    mode: M-Integrative
    description: |
      Emits ALERT messages along W-paths and S-paths when integrative
      confidence falls below threshold.
    inputs: [IntegrationFailureSignal]
    outputs: [AlertEnvelope]
    witness_emission:
      - WITNESS_PATH_OBSERVATION
      - ESCALATION
