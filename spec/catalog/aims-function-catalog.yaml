    class: hybrid
    layer: L-Form
    mode: M-Integrative
    description: |
      Construct the seven-section task prompt stack per §3.17.10.1 at invocation
      time. Sections 1-7 in deterministic order. Rigid component: section ordering
      and structural invariants. Judgment component: task-content (section 4)
      inline selection and elision when context-window budget is exceeded.
      Per-section hashes emitted to Witness per §3.17.10.3.
    inputs: [auxiliary_id, task_brief, constitution_snapshot, delegation_designation_opt, witness_topology_scope]
    outputs: [seven_section_prompt, section_hash_record, context_elision_record_opt]
    witness_emission:
