    inputs: [current_listing, requested_transition, requesting_credential]
    outputs: [new_listing_state, transition_witness_id]
    witness_emission:
      - MARKETPLACE_LISTING_EVENT
      - MARKETPLACE_LISTING_TRANSITION_REJECTED
    spec_section: §3.17.11.6
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-106
    name: cross_sovereign_cost_record_sign
    archetype: PROVIDER
    class: rigid
    layer: L-Form
    mode: M-Generative
    description: |
      Sign a Cross-Sovereign Cost Record per §3.25.X. Source Environment's
      publisher (or marketplace operator on publisher's behalf) signs the
      complete record with hybrid Ed25519 + ML-DSA-65 per §3.21.3.
