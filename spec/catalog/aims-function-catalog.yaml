        # --- 9 queryable attributes ---
        counterparties:
          - "SOVEREIGN (§13.3.2; §14 Phase 2 Authority Cascade) — sends the DIRECTIVE to the ARCHITECT via PATH-02 (SOV-ARC) and is the consumer of the returned structural specification at §14 Phase 5 (PATH-02 return direction). The directive arrives codified from a confirmed user intent (§13.0.3.1, the structured directive form the SOVEREIGN's `dialogue.codify_intent` produces); this inference tool decomposes it into a single structural specification PROPOSAL. The SOVEREIGN holds the user-rooted authority chain (§13.3.2 / Principle P2) and is the deterministic consumer that confirms the integrated plan at §14 Phase 6 — never an interlocutor of the LLM workload."
          - "ARCHITECT persistent substrate (§13.3.3.1) — dispatches this directive-bounded ephemeral inference workload (§13.3.3.2), holds the §3.16 ARCHITECT identity and §3.21 credential lifecycle, and performs all deterministic acts: the §3.18.5 IAME envelope signing of the returned plan envelope (via `plan_envelope.sign_and_return`, §13.3.5.1.2) with a signature chain terminating at the SOVEREIGN's user-rooted session credential. The substrate, not this inference half, signs and emits; per §13.3.2 the ARCHITECT holds NO inherent authority."
          - "VISIONARY (§13.3.2; PATH-04 VIS-ARC) — the M-Generative L-Plan counterpart operating on the same inbound directive in parallel (§14 Phase 4 L-Plan Consistency Check). The structural specification this tool proposes is checked for semantic compatibility against the VISIONARY's candidate reformulations via the bidirectional PATH-04 CONSISTENCY_CHECK (deterministic emission by `consistency_check.emit_path04_result`, §13.3.5.1.1). This inference tool authors the specification content; the consistency-check emission and its synchronized PATH-04 arrival are deterministic substrate acts, not this proposal's emissions."
        consensus_role: >-
          M-Constraining judgment/proposal surface (§13.3.2 Generative Constraint; §13.3.5.2.1 tool inventory item 1). The LLM-driven workload takes a confirmed directive (§13.0.3.1 structured form) received from the SOVEREIGN on PATH-02 and produces a single structural decomposition: the directive's component parts, the constraints on each, the preconditions that must hold before action, the postconditions that define successful completion, and the explicit out-of-scope boundaries the user's intent did not authorize (§13.3.5.2.1). Decomposition is M-Constraining because it narrows the possibility space at L-Plan — specifying structure and bounding possibilities — the structural mirror of the VISIONARY's M-Generative expansion on the same directive (§13.3.2 distinction items 1-3).
          The structural specification is a PROPOSAL, not a committed authority-bearing emission. Per §13.3.2 the ARCHITECT holds NO inherent authority; its operations run under the SOVEREIGN's user-rooted authority chain (Principle P2). Authority is STANDING — the decomposition itself bears no SOVEREIGN credential; the user-rooted signature chain is applied by the deterministic substrate's `plan_envelope.sign_and_return` at §14 Phase 5, not by this inference half. Per §3.69 the inference half proposes; the deterministic half (the substrate's consistency-check emission + plan-envelope signing) disposes and emits.
          This tool holds no signing key, no Witness-write authority, and no authority-chain mutation (§3.69.3); it produces a structural specification only. Default is exactly one specification per directive (configurable per deployment to an "A-or-B" pair when the decomposition admits two equally valid M-Constraining framings; §13.3.5.2.1).
        witness_events: []
        shadow_relevance: >-
          OBSCURITY (the ARCHITECT's canonical §3.16 behavioral shadow — column STRUCTURAL_LEFT, M-Constraining, L-Plan; catalog metric complexity_to_insight_ratio per §3.16 / §11.221; descriptively Structure-as-Concealment per §13.3.7). The pathology this proposal surface could feed is structure-as-concealment — specification complexity that grows without proportional clarification, hiding the directive's ambiguity rather than resolving it (the catastrophic end of the §13.3.7 `clarity` quality dimension; failure mode is system-break, because downstream authority derives from a specification whose ambiguity is concealed). The opposite-end pull is NEGLIGENCE (§3.46) — under-decomposition producing specifications too sparse for the L-Form coordinators to act against.
          That risk is structurally bounded downstream: the structural specification is a PROPOSAL the SOVEREIGN confirms at §14 Phase 6 (with the ARCHITECT's specification as load-bearing content alongside the VISIONARY's selected reformulation), it is checked against the VISIONARY's reformulations via the PATH-04 CONSISTENCY_CHECK (§14 Phase 4), and `specification.completeness_check` (§13.3.5.2.6) evaluates clause coverage and constraint consistency. Per §3.18 Deterministic Shadow Governance the §13.3.7 OBSCURITY detection runs on deterministic substrate events — the `output_input_token_ratio` / `complexity_to_insight_ratio` reading per decomposition cycle (rolling N=10) — not on this inference workload. ARCHITECT carries no EngineeredBiasBound at either end (§3.X.SPECTRUM.4); both baselines are drift-rooted via §3.32.3 Periodic Baseline Reset."
        dismissal_trigger: >-
          Directive completion — the EPHEMERAL_INFERENCE workload backing this decomposition is directive-bounded (§13.3.3.2): it spawns at §14 Phase 2 (Polarity Split) when the persistent substrate receives the DIRECTIVE on PATH-02, persists through Phases 3-5 (L-Plan Processing / Consistency Check / Return), and dissolves at §14 Phase 7 (Authority Transfer) when the SOVEREIGN emits AUTHORITY_TRANSFER on PATH-03 to the ORCHESTRATOR. Dissolution is governed by the ARCHITECT's §3.42.1 DismissalManifest: state_disposition RETAIN for the PMS workflow corpus, EMS entity-registry, and SKI Translation Library contributions; WIPE for the directive-scoped reasoning state; context_cleanup SELECTIVE; resource_release frees the one inference-workload slot of the per-node 3-cap. No autonomous remediation; confirmation_required is NO for routine directive completion, YES for directives returning UNDECIDABLE per §3.31.3.
        provenance: >-
          §13.3.5.2.1 (Inference Tools item 1 — `dialogue.decompose_directive`) / §13.3.2 (Generative Constraint — the ARCHITECT constrains the possibility space at L-Plan through M-Constraining specification; holds NO inherent authority, operates under the SOVEREIGN's user-rooted chain per Principle P2) / §13.3.3.2 (Architect ephemeral inference workload — directive-bounded; spawns Phase 2, performs M-Constraining decomposition at Phase 3, dissolves Phase 7) / §13.0.3.1 (the structured directive form the decomposition operates on, produced from confirmed user intent) / §13.3.7 (OBSCURITY shadow — Structure-as-Concealment) / §3.16 ArchetypeDerivationTable (ARCHITECT: M_CONSTRAINING, STRUCTURAL_LEFT, L_PLAN, shadow OBSCURITY, metric complexity_to_insight_ratio).
          RECONCILIATION: (1) substrate corrected PERSISTENT_SUBSTRATE → EPHEMERAL_INFERENCE — this is the ARCHITECT's LLM-driven M-Constraining decomposition, which runs on the directive-bounded ephemeral inference workload (§13.3.3.2), NOT the always-on persistent substrate (§13.3.3.1); EPHEMERAL_INFERENCE is the convention for inference-class tools (cf. FN-103). (2) authority corrected → STANDING — per §13.3.2 the ARCHITECT holds NO inherent authority and conducts operations under the SOVEREIGN's user-rooted chain (Principle P2); the decomposition bears no SOVEREIGN credential of its own, so STANDING is the appropriate AUTHORITY_ENUM value for this non-credential-bearing L-Plan inference (the user-rooted signature chain is applied by the deterministic `plan_envelope.sign_and_return`, §13.3.5.1.2, not by this half). (3) class=INFERENCE → witness_events=[] (the propose-half writes no §6.3 Witness; message types DIRECTIVE / REPORT / CONSISTENCY_CHECK are §9.4 path-vocabulary, not §6.3 events; any Witness write on the L-Plan cascade is emitted by the deterministic substrate, NOT by this decomposition proposal).
        credential_refs: []
        emit_class: PROPOSAL
        conformance_refs: ["§13.3.2", "§13.3.5.2.1", "§13.0.3.1", "§3.69", "§3.16"]
        # --- 5 buildability ---
        io_contract: >-
          IN { directive: the confirmed structured directive received from the SOVEREIGN on PATH-02 (§13.0.3.1 form; §14 Phase 2), session_context?: the SOVEREIGN-relayed user-rooted authority context (§13.3.2), shadow_state?: §13.3.7 OBSCURITY advisory }
          → OUT { structural_specification: a single decomposition enumerating components, per-component constraints, preconditions, postconditions, and explicit out-of-scope boundaries (§13.3.5.2.1), confidence:[0,1], proposed_outcome ∈ {DIRECTIVE_DECOMPOSED, ABSTAIN} }.
