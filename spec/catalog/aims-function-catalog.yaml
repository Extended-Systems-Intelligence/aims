          invariant: "Returns EXACTLY the set of NamesRegistryEntry items whose §3.66.7.3.1 archetype_or_tier equals the requested archetype (result-set XOR empty — exactly one disposition per call: FOUND with a non-empty set IFF at least one entry matches, else NOT_FOUND with the empty set; never both, never neither). No matched entry is fabricated and no matching entry is omitted (set-soundness + set-completeness). A served entry whose backing cache exceeds the PT1S staleness bound MUST be revalidated by a fresh signed-snapshot fetch before serving (§3.66.7.6 N2), so served entries are never staler than PT1S. Read-only — no NamesRegistryEntry field is mutated, no signed record is produced, and no Witness event is emitted (lookups are deterministic substrate operations per §3.66.7.3.2)."
        errors:
          - "NOT_FOUND (empty result-set) — no NamesRegistryEntry has an archetype_or_tier matching the requested archetype within the local coherence domain (§3.66.7.6 N1 lookup miss, set form). NOT an exception and NOT a Witness refusal: a normal typed RETURN carrying entries=[]. The caller MUST NOT proceed with an unresolved archetype enumeration per §3.66.7.6 N1; no state change."
