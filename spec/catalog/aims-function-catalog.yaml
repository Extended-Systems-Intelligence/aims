s COMMUNICATION, and the refusal Witnesses `ESSA_ENVELOPE_MISSING_DETECTED` / `EMS_CROSS_SESSION_EXTRACTION_DETECTED` are the §3.69.4 VETO_REJECTION disposition (both Tier-2 Correction)."
