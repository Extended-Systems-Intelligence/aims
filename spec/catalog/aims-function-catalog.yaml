        dismissal_trigger: "Operating-context completion — the ephemeral inference workload is dismissed at proposal completion per §3.32 ephemeral lifecycle (the §3.42.1 Structured Dismissal Protocol operating-context-completion trigger for ephemeral inference workloads per the Universal Node Architecture): once the recovery-procedure proposal (the §3.12 Decision Record with selected procedure + confidence) is returned to the deterministic half, the workload's bounded operating context is complete and the workload exits — disposing of accumulated reasoning state and releasing its inference slot. A LOW_CONFIDENCE / ABSTAIN / INSUFFICIENT_CONTEXT typed inference outcome (see errors) likewise completes the operating context and dismisses the workload, returning the typed outcome to the deterministic half rather than a procedure selection. No autonomous remediation: this tool never activates a procedure — dismissal here is workload exit, not an authority disposition."
        provenance: "§13.1.5.2 Sovereign Inference Tools item 3 (`recovery.procedure_activation` — 'LLM-driven decision of which pre-declared P9 recovery procedure to activate given current incident state'); typed slots verbatim from the FN-086 manifest row (kind=TOOL, class=INFERENCE, substrate=EPHEMERAL_INFERENCE, authority=SOVEREIGN_CREDENTIAL, paths=[]); behavioral grounding §13.1.5.3 tool 4 'Recovery activation' (the hybrid this is the inference half of: inference decides which procedure + deterministic half emits the signed activation envelope, MUST verify the procedure was declared at commissioning per P9 before signing) + §3.69.1 (LLM proposes / deterministic disposes; §3.69.2 consequence classes; §3.69.3 cryptographic capability confinement — no LLM holds signing authority) + §3.12 Explainability Protocol (the proposal is a Decision Record) + §3.32 / §3.42.1 (ephemeral inference workload lifecycle: dismissed at operating-context completion). P9 = Function-Level Rigid/Judgment Decomposition (this is the judgment half); pre-staged recovery-procedure declaration per P9 occurs at §13.0.6 commissioning."
        credential_refs: []
        emit_class: "RECOVERY_PROCEDURE_ACTIVATION_PROPOSAL (a §3.12 Decision Record, decision_type ESCALATION/CORRECTION-class): the proposed selection of one pre-declared P9 recovery procedure for the current incident state, plus the reasoning trace and a confidence value. NOT a §6.3 Witness emission and NOT a signed activation envelope — the §13.1.5.3.4 deterministic half ratifies this proposal and is the party that emits the signed activation envelope (with the chosen procedure ID) and its §6 Witness anchor. This inference half is non-authority-bearing in the emission sense (§3.69.3)."
