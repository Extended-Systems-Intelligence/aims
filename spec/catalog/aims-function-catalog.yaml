    outputs: [signed_cross_sovereign_cost_record]
    witness_emission:
      - CROSS_SOVEREIGN_COST_RECORD_SIGNED
    spec_section: §3.25.X
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-107
    name: cross_sovereign_feedback_classify
    archetype: ARCHITECT
    class: judgment
    layer: L-Plan
    mode: M-Constraining
    description: |
      Classify an UNMOORING pattern detected by a destination Environment B
      and propagated via DCP to source Architect A per §3.17.11.8. Outputs
      LOCAL-to-B (pattern specific to B's constitution or binding overlay,
      no source-side template change) or UNIVERSAL (model exhibits pattern
      on any Environment, source template tightening required and
      DCP re-propagation of tightened template). Judgment-class because
      the LOCAL-vs-UNIVERSAL distinction requires architectural reasoning
      across the operational-history corpus of all federated Environments.
    inputs: [unmooring_signal, source_template, destination_overlay_history, cross_environment_operational_corpus]
    outputs: [classification_verdict, recommended_source_action]
    witness_emission:
      - CROSS_SOVEREIGN_FEEDBACK_CLASSIFIED
    spec_section: §3.17.11.8
    formal_verification: not_applicable  # judgment-class
    adversarial_fuzzing: required


  # ====================================================================
  # FN-108..FN-122 — D8 Supervision Perimeter, Connectivity Modes, Policy Bundle (v1.2)
  # Egress/Ingress gate operations, Signed Boundary-Crossing Decision Record,
  # Perimeter Posture composition, Isolation Lattice checks, Federation Envelope,
