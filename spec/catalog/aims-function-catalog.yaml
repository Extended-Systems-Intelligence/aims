          invariant: "An APPROVED induction is emitted iff (accumulated_pms_tenure >= PMS-7 floor) AND (quorum.signers >= 2 AND quorum.sovereign_present) AND (candidate not already inducted). At most one APPROVED record per candidate (single-shot). A candidate is inducted iff a corresponding APPROVED record exists. No call is both APPROVED and REFUSED."
        errors:
          - "INSUFFICIENT_TENURE — accumulated_pms_tenure < PMS-7 floor; checked FIRST per the §13.1.5.3 'before signing' verification order; no emission, typed refusal, VETO_REJECTION witness (§3.69)."
          - "INSUFFICIENT_QUORUM — quorum.signers < 2 OR SOVEREIGN absent (§3.42 Serious-Quorum / §3.94.3 violation); no emission; typed refusal, VETO_REJECTION witness; bypass of the quorum gate is non-conformant per CTS-MEM-PMS-016..020."
