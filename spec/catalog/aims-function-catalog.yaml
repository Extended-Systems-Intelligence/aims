          INVARIANT — the output is a PROPOSAL only; it carries no signature and effects no Witness write or authority-chain change (§3.69 / §3.69.3). The directive becomes operative only after the §13.0.3 user-CONFIRMED termination and the §14 Authority Cascade deterministic ratification (§13.1.5.3.5 / FN-065). No autonomous interpretation where ambiguity exists (§13.0.3.2).
        errors:
          - "LOW_CONFIDENCE — the codification confidence is below the SOVEREIGN-configurable threshold (§3.72.1 Function-1 'confirm with user when ambiguity exceeds threshold'); the dialogue surfaces the uncertainty to the user and re-engages rather than proposing a low-confidence directive autonomously"
          - "INSUFFICIENT_CONTEXT — the principal_intent or session context is too sparse to codify a decomposable directive; the dialogue requests clarification from the user (no directive proposed)"
          - "AMBIGUITY_UNRESOLVED — multiple valid interpretations remain after the clarification turn; per §13.0.3.2 the ambiguity MUST be surfaced to the user (a routed REVISE, never an autonomous choice — autonomous choice is the §13.1.7 SCHISM failure mode)"
          - "ABSTAIN — the inference workload returns no proposed directive (typed inference non-outcome); the dialogue does not advance to Phase 2 of the §14 Authority Cascade. No error emits a Witness event from this tool (witness_events=[]); the SCHISM-relevant pattern is observed via the deterministic dismissal-lifecycle events under §3.18.1 / Deterministic Shadow Governance."
        concurrency: >-
          One SOVEREIGN inference workload per session (optimal_concurrency=1; the SOVEREIGN is session-bounded per Universal Node Architecture §1.2 and §13.1.5.4). The clarification dialogue is a stateful turn sequence on a single session credential; concurrent codification turns for the same session are not permitted.
          No idempotency key and no linearization point at this tool — it produces a PROPOSAL with no committed side effect; the linearization point is downstream at the deterministic ratification/emission (§13.1.5.3.5 / FN-065). Re-invocation under a REVISED outcome opens a fresh dialogue turn over updated dialogue history. The proposal is replayable (no side effects) until ratified.
        test_vectors:
          - "CTS-SOV-FN084-01 {clear unambiguous intent, ACTIVE session, confidence ≥ threshold} → proposed_directive + scope_summary, proposed_outcome=CONFIRMED-candidate, no Witness emission from this tool, no signature"
