  - id: FN-117
    name: workload_offload_initiate
    archetype: ARCHITECT
    class: hybrid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Initiate a workload offload between XSI-AIMS-conformant frameworks
      per §3.87.10. Requires principal authorization via Trigger 4 of
      §3.87.6; phases 1-10 sequenced (authorization → envelope
      establishment → drain/snapshot → seal → transfer → instantiate-
      destination → fresh-config-import → external-identity-rotation →
      verification → source decommission). Atomic per §3.87.10.2.
    inputs: [source_framework_descriptor, destination_framework_descriptor, offload_purpose, principal_authorization]
    outputs: [offload_lifecycle_handle, establishment_decision_record]
    witness_emission:
      - WORKLOAD_OFFLOAD_INITIATED
      - WORKLOAD_OFFLOAD_REFUSED
    spec_section: §3.87.10, §3.87.10.1
    formal_verification: partial
    adversarial_fuzzing: required

  - id: FN-118
    name: workload_offload_seal
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Seal a Class 4 Offloadable Workload payload per §3.87.8.4. Bundles
      Class 2 records and Class 3 state at moment of offload; signs with
      source framework's sealing key (Isolation Class A — the key does
      NOT move; only signed output crosses); integrity-hashed for
      verification at destination per §3.87.10.2 atomicity.
