  - id: FN-121
    name: policy_bundle_load
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Load a §3.89 Policy Bundle into a deployment's policy stack. Verify
      bundle signature (hybrid Ed25519 + ML-DSA-65 per §3.21.3) against
      issuer trust root; check bundle compatibility against AIMS spec
      version; check substrate compatibility per §3.89.6 against
      deployment's declared substrate; reject load if any check fails or
      if Industry Profile additions contradict Isolation Class A items.
