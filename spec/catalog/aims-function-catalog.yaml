        substrate_interface: "PERSISTENT_SUBSTRATE read path. The canonical registry is held on the SOVEREIGN's persistent substrate; other substrates hold local read-only caches kept within a PT1S staleness bound by Sovereign-signed snapshot broadcast over §3.20 DCP (§3.66.7.3.2 Ownership and consistency). lookup_by_archetype filters the NamesRegistryEntry set (§3.66.7.3.1) by the archetype_or_tier identifier from the local cache when fresh; on staleness (§3.66.7.6 N2) it fetches a fresh signed snapshot from the Sovereign canonical store before serving. As an in-seal identity-subsystem read (§3.66.7.3.2 Boundary residency), the lookup stays within the internal-IAME domain — the returned entries are structured NamesRegistryEntry value copies, never key material; no per-principal identity material crosses the §3.65 Cryptographic Boundary; the in-seal identity subsystem is never federated. The read is a deterministic substrate operation under Deterministic Shadow Governance and emits no Witness event."
