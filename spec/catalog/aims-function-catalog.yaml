          - "CTS-SOV-FN084-03 {confidence below SOVEREIGN-configurable threshold} → LOW_CONFIDENCE, dialogue re-engages user, no low-confidence directive proposed"
          - "CTS-SOV-FN084-04 {sparse/under-specified intent} → INSUFFICIENT_CONTEXT, clarification requested, no directive proposed"
          - "CTS-SOV-FN084-05 {workload returns no verdict} → ABSTAIN, no advance to Phase 2, no Witness emission from this tool"
          - "CTS-SOV-FN084-06 {operating context completes (CONFIRMED/REVISED/CANCELED)} → ephemeral inference workload dismissed via §3.42.1 SDP operating-context-completion trigger; reasoning context disposed; no persistent state survives"
        substrate_interface: >-
          Runs as an EPHEMERAL_INFERENCE workload (endpoint_class EPHEMERAL_INFERENCE_WORKLOAD) bounded to the operating context of one clarification-dialogue codification. The inference workload sees ONLY the inputs (the principal's natural-language intent, the dialogue history, and the read-as-context session scope) and NEVER credential or key material: per §3.69.3 cryptographic capability confinement no LLM-class component holds signing keys, and per §3.65 the Cryptographic Boundary is the boundary that key material MUST NOT cross — the session credential is consulted as authorization context only, not signed-with by this workload (§3.65 / §3.66 enclave isolation discipline; the inferential workload cannot reach the internal_enclave per §3.66 isolation).
          Output is a PROPOSAL handed to the deterministic ratification path (§3.69; §13.1.5.3.5 hybrid Authority Transfer deterministic half / FN-065 authority.transfer_to_orchestrator); the workload itself performs no Witness write (witness_events=[]) and no authority-chain mutation. The workload is dismissed at operating-context completion per §3.42.1 SDP (per Universal Node Architecture; §3.32 ephemeral-lifecycle context), disposing of the reasoning context with no residue.
