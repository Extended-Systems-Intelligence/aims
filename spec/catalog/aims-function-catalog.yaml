      - PROMPT_CATEGORY_ERROR
    spec_section: §3.17.10, §3.17.10.1, §3.17.10.3
    formal_verification: partial  # rigid sections only
    adversarial_fuzzing: required

  - id: FN-103
    name: cross_sovereign_acceptance_evaluate
    archetype: ARCHITECT
    class: rigid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Evaluate federation-mode-driven acceptance of an incoming binding template
      per §3.17.11.1 / §3.20.X. Four-way switch on federation mode (PEER,
      HIERARCHICAL parent, HIERARCHICAL child, INDEPENDENT). Output is acceptance
      decision plus required action (accept-by-attestation, auto-accept,
      proposal-then-supersede, full-re-attestation-or-reject).
    inputs: [incoming_template, source_environment_id, federation_mode]
    outputs: [acceptance_decision, required_action]
    witness_emission:
      - CROSS_SOVEREIGN_TEMPLATE_ACCEPTED
      - CROSS_SOVEREIGN_TEMPLATE_REJECTED
      - CROSS_SOVEREIGN_TEMPLATE_PROPOSAL
    spec_section: §3.17.11.1, §3.20.X
    formal_verification: required
    adversarial_fuzzing: required

  - id: FN-104
    name: marketplace_listing_publish
    archetype: ARCHITECT
    class: hybrid
    layer: L-Plan
    mode: M-Constraining
    description: |
      Publish a Marketplace Listing Object per §3.17.11.6. Rigid: schema
      validation, dual-signature requirement (publisher + listing operator,
      distinct §3.21 credentials), state-machine initial state PUBLISHED.
      Judgment: jurisdiction_declaration content and regulatory_compliance_claims
