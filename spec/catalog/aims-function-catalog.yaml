          invariant: "Single-shot per certification (a certification is revoked at most once); a call emits a signed revocation record XOR is refused with exactly one typed reason, never both (no-bypass per §3.69); a revocation record is signed ONLY when the certification exists, is not already revoked, the authority chain is VALID, and the signer is SOVEREIGN (precondition-gate); signing-key material never appears in output — only an opaque SIGNED_RECORD handle crosses the §3.65 boundary."
        errors:
          - "UNKNOWN_CERTIFICATION — certification_id not present in the granted set. Refuse; emit VETO_REJECTION; no signed record; certification state graph unchanged. Caller must supply a certification_id that exists."
          - "ALREADY_REVOKED — certification already revoked (idempotency boundary). Refuse; emit VETO_REJECTION; do NOT emit a second AUTHORITY_CHANGE record. The first declaration's record remains canonical; preserves single-shot."
          - "AUTHORITY_CHAIN_INVALID — ENFORCER validation (tms.revocation.validate_authority_chain §3.99.3) rejects the authority chain. Refuse; emit VETO_REJECTION; certification stays active; surfaces a SCHISM-relevant attempt for §3.18 correlation."
          - "NOT_SOVEREIGN — signer is not the SOVEREIGN. Refuse; revocation is an authority action reserved to the SOVEREIGN per §3.99.3; emit VETO_REJECTION; no signed record."
        concurrency:
