      - id: FN-403
        name: "Sovereign Harness dispatch"
        tool_ref: "harness.dispatch"
        kind: TOOL
        class: DETERMINISTIC
        substrate: PERSISTENT_SUBSTRATE
        authority: STANDING
        paths: ["PATH-03"]
        status: ACTIVE
        ver: "2.0"
        sec_ref:
          - "§3.X.SOVHARNESS.2"
          - "§3.117.2"
          - "§13.6"
          - "§3.72.1"
          - "§3.89"
        # ---- 9 queryable attributes ----
        counterparties:
          - "SOVEREIGN (authority origin; the dispatch consumes the harness.authorize FN-402 authorization transferred on PATH-03 AUTHORITY_TRANSFER)"
          - "PROVIDER (the dispatch triggers `emanation_provisioning`; the PROVIDER provisions the instance — the harness does not re-seat the §3.X.CORE.2 emanation/provisioning step)"
          - "Witness Layer (§6 hash-chain anchor)"
        consensus_role: "NONE — the ORCHESTRATOR dispatches under SOVEREIGN authority transferred on PATH-03 (the unique authority-message class); the dispatch consumes a valid FN-402 authorization + §3.89 harness_envelope admission as hard preconditions and is not itself a delegation event (§3.3.1.4)."
        witness_events:
          - SOVHARNESS_DISPATCH
          - VETO_REJECTION
        shadow_relevance: "PARALYSIS (ORCHESTRATOR shadow): the failure mode is dispatching a bring-up without a valid transferred authorization or outside the active harness_envelope. The structural guards are the PATH-03 authorization precondition (no dispatch without a valid FN-402 authorization) and the §3.89 harness_envelope admission check; a bypass is a §3.69 VETO_REJECTION, never a silently-dispatched bring-up."
        dismissal_trigger: "Refusal (typed reason) on any unmet precondition, emitting VETO_REJECTION per §3.69: absent/invalid PATH-03 authorization (AUTHORIZATION_INVALID), or harness identity/class not admitted by the §3.89 harness_envelope (HARNESS_NOT_ADMITTED). No autonomous remediation; no bring-up dispatched."
        provenance: "§13.6 ORCHESTRATOR Tools (Deterministic) — `harness.dispatch` (X.SOVHARNESS D8); engages the bring-up under transferred authority (PATH-03) and triggers PROVIDER provisioning."
        credential_refs:
          - "path03_authority_transfer (the §13.1.5.3.5 AUTHORITY_TRANSFER attestation establishing the ORCHESTRATOR's transferred authority for this dispatch)"
        emit_class: SOVHARNESS_DISPATCH
        conformance_refs:
          - "§3.X.SOVHARNESS.8 conformance (CTS-SOVHARNESS-006..010 deterministic dispatch trigger)"
          - "§3.70 Formal-Verification Requirement (DETERMINISTIC item; machine-checked model)"
          - "§4.8 conformance claim format"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [authorization_handle, path03_attestation, harness_envelope_ref]
            properties:
              authorization_handle: { type: string, description: "Handle to the FN-402 harness.authorize signed authorization." }
              path03_attestation: { type: object, description: "The PATH-03 AUTHORITY_TRANSFER attestation establishing transferred authority.", required: [valid], properties: { valid: { type: boolean } } }
              harness_envelope_ref: { type: string, description: "Reference to the active §3.89 harness_envelope (the swap allow-set + the active harness identity/class)." }
          out:
            type: object
            description: "On success: a dispatch record triggering PROVIDER `emanation_provisioning`. The harness performs no inference."
            required: [status, witness_id]
            properties:
              status: { type: string, enum: [DISPATCHED, REFUSED] }
              provisioning_trigger_handle: { type: string, description: "Opaque handle to the PROVIDER provisioning trigger; absent when status=REFUSED." }
              refusal_reason: { type: string, enum: [AUTHORIZATION_INVALID, HARNESS_NOT_ADMITTED], description: "Present only when status=REFUSED." }
              witness_id: { type: string, description: "§6 anchor: SOVHARNESS_DISPATCH on success, VETO_REJECTION on refusal." }
          invariant: "A bring-up is dispatched ONLY when (a) a valid FN-402 authorization is transferred on PATH-03 and (b) the active §3.89 harness_envelope admits the harness. A call dispatches XOR is refused with exactly one typed reason (no-bypass per §3.69). The harness triggers provisioning but performs no inference (§3.117.1)."
        errors:
          - "AUTHORIZATION_INVALID — the PATH-03 attestation is absent/invalid or does not reference a valid FN-402 authorization. Refuse; emit VETO_REJECTION; no dispatch."
          - "HARNESS_NOT_ADMITTED — the active harness identity/class is not in the §3.89 harness_envelope allow-set. Refuse; emit VETO_REJECTION; no dispatch."
        concurrency:
          idempotency_key: "authorization_handle — at most one DISPATCHED record per authorization; a repeated dispatch against an already-dispatched authorization is idempotent (no second provisioning trigger)."
          retry: "Safe to retry on transient failure; refusals are deterministic given identical input."
          ordering: "The PATH-03 AUTHORITY_TRANSFER completes before dispatch; the §6 SOVHARNESS_DISPATCH entry is appended before the PROVIDER provisioning trigger is observable."
          locks: "Per-authorization single-writer lock serializes concurrent dispatch attempts for the same authorization_handle."
        test_vectors:
          - "CTS-ORC-FN403-01: valid PATH-03 authorization + harness admitted by envelope -> status=DISPATCHED, provisioning trigger, SOVHARNESS_DISPATCH emitted."
          - "CTS-ORC-FN403-02: absent/invalid PATH-03 authorization -> status=REFUSED, refusal_reason=AUTHORIZATION_INVALID, VETO_REJECTION."
          - "CTS-ORC-FN403-03: harness identity/class not admitted by §3.89 harness_envelope -> status=REFUSED, refusal_reason=HARNESS_NOT_ADMITTED, VETO_REJECTION."
          - "CTS-ORC-FN403-04: every call dispositioned exactly once (dispatch XOR refuse); no inference performed by the harness — totality + Tool-Stratum safety."
        substrate_interface: "The dispatch executes on the ORCHESTRATOR persistent substrate; it consumes the FN-402 authorization (transferred on PATH-03) and the §3.89 harness_envelope as preconditions and emits a PROVIDER provisioning trigger (`emanation_provisioning`) plus the §6 Witness anchor (SOVHARNESS_DISPATCH on success; VETO_REJECTION on refusal). The harness triggers the Inference Stratum but performs no inference itself (§3.117.1)."
        formal_verification: "VERIFIED v2.0"
        formal_model_ref: ""
