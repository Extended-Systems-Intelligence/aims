          - "CTS-ARC-FN119-01 {well-formed confirmed directive, session context present} → structural_specification (components + constraints + pre/postconditions + out-of-scope boundaries) + confidence, proposed_outcome=DIRECTIVE_DECOMPOSED, no Witness emission from this tool"
