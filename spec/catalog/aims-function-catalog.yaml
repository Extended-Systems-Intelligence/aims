      - id: FN-060
        name: "Sovereign Credential Signing (deterministic — signs Sovereign-issued credentials per §3.21 credential lifecycle)"
        tool_ref: "credentials.sovereign_credential.sign"
        kind: TOOL
        class: DETERMINISTIC
        substrate: PERSISTENT_SUBSTRATE
        authority: SOVEREIGN_CREDENTIAL
        paths: []
        status: ACTIVE
        ver: "2.0"
        sec_ref:
          - "§13.1.5.1"
          - "§3.21"
        # ---- 9 queryable attributes ----
        counterparties:
          - "SOVEREIGN persistent substrate (signer)"
          - "credential subject (the archetype/Auxiliary/session principal whose Sovereign-issued credential is being signed per §3.21)"
          - "Substrate Telemetry Authority §3.62.6 (external commissioning-window attestor per §13.0.6)"
          - "Operator + Sovereign Quorum per §3.21 / §13.1.3.4 (post-commissioning certification authority)"
          - "Witness Layer §6 / §3.21.6 (key-proof anchor)"
        consensus_role: "Deterministic signing actuator of the §3.21 credential lifecycle. During the §13.0.6 bounded commissioning window the SOVEREIGN self-certifies (no quorum; STA-attested per §3.62.6). Outside the window, Sovereign certification requires the Operator + Sovereign Quorum per §3.21 / §13.1.3.4 plus a passing §13.1.8 Ring 1-4 coherence posture; this tool emits the signature only after that authority precondition holds — it does not itself form the quorum. The quorum verdict is an input precondition, not a thing this deterministic tool convenes."
        witness_events:
          - "KEY_LIFECYCLE"
          - "VETO_REJECTION"
        shadow_relevance: "SCHISM (directive_consistency_score) manifests at the signing surface as authority that splinters into incompatible certification grants: signing under an authority mode that contradicts the deployment window (self-certification outside commissioning, or quorum-rooted signing claimed during the bounded window), signing without the Operator + Sovereign Quorum precondition outside the window, or signing against a root credential already invalidated by the §13.0.7 REVOKE cascade, would mint credentials whose downstream authority chains fork. The precondition gate (window-vs-auth-mode consistency + quorum-present-when-required + coherence-pass + non-CRITICAL shadow + VALID root) is the deterministic anti-SCHISM guard that keeps every emitted credential consistent with one coherent authority line; every refusal is a §3.69 deterministic-disposes rejection emitting VETO_REJECTION."
        dismissal_trigger: "Not session-dismissable as an agent. The signing capability is bounded by credential lifecycle, not by §3.42.1 Structured Dismissal: the §13.0.6 commissioning self-certification carve-out terminates irreversibly at first principal user authentication; an emitted Sovereign credential is invalidated through the §3.21 rotation/revocation path and the §13.0.7 REVOKE cascade (root-credential invalidation renders signatures structurally null per §13.0.7.1)."
        provenance: "§13.1.5.1 Deterministic Tools item 6 (`credentials.sovereign_credential.sign` — signs Sovereign-issued credentials per §3.21); §13.0.6 self-certification scope explicitly enumerates 'initial Sovereign credential signing per §3.21' as a commissioning-window operation; §13.1.3.4 (outside the window, certification requires Operator + Sovereign Quorum per §3.21 with §13.1.8 Ring 1-4 coherence); §3.21 Credential Lifecycle; §3.21.3 hybrid Ed25519 + ML-DSA-65 Stage-1 signing / §3.21.X.5 internal IAME ML-DSA-family-mandatory (SLH-DSA prohibited internal); §3.21.6 Witness-anchored key proofs; §13.0.7 REVOKE cascade. Witness events resolved to the §6.3 WitnessEventType Catalog: success emits KEY_LIFECYCLE (§3.21 credential-lifecycle event class); refusal emits VETO_REJECTION (§3.69 deterministic-disposes rejection)."
        credential_refs:
          - "sovereign_issued_credential §3.21 (signing key, held inside the §3.65 boundary; only an opaque SEALED signature handle crosses out)"
          - "ERM-derived per-domain signing key §3.21.X / FN-051 ERM master-key root"
          - "STA commissioning attestation §3.62.6 (external attestation that makes bounded self-certification admissible)"
          - "Operator + Sovereign Quorum certification §3.21 / §13.1.3.4 (post-commissioning authority precondition)"
        emit_class: KEY_LIFECYCLE
        conformance_refs:
          - "§3.70 / §4.8 formal-verification (DETERMINISTIC item carries a machine-checked model per §3.70.1 v2.0 all-rigid-halves scope)"
          - "§3.21.9 FIPS 140-3 L3 floor"
          - "§3.21.3 Stage-1 PQC (hybrid Ed25519 + ML-DSA-65 internal)"
          - "§3.21.6 Witness-anchored key proof"
          - "§4.4 ConformanceManifest formal_models pin"
        # ---- 5 buildability fields ----
        io_contract:
          in: "SovereignCredentialSignRequest { deployment_id: string; subject_ref: string (entity/credential subject per §3.66.7 / §3.21); credential_payload_hash: bytes (pre-image hash of the credential to be signed; the key material is never an input); window_context: enum{COMMISSIONING, OPERATIONAL} (derived from §13.0.6 deployment state, not caller-asserted); auth_mode: enum{BOUNDED_SELF_CERT, QUORUM} (BOUNDED_SELF_CERT valid only in COMMISSIONING per §13.0.6; QUORUM = Operator + Sovereign Quorum per §3.21 / §13.1.3.4 in OPERATIONAL); quorum_attestation_ref: handle | null (the §3.21 / §13.1.3.4 Operator + Sovereign Quorum certification reference; MUST be present and valid when auth_mode=QUORUM); coherence_state: enum{PASS, FAIL} (§13.1.8 Ring 1-4); shadow_state: enum{OK, CRITICAL} (§13.1.7 directive_consistency_score band); root_credential_state: enum{VALID, REVOKED} (§13.0.7) }"
          out: "On admit: SignedCredentialRecord { subject_ref; signature_suite: 'ed25519+ml-dsa-65' (§3.21.3 Stage 1 / §3.21.X.5 internal IAME, ML-DSA family mandatory, SLH-DSA prohibited internal); sealed_signature_handle (opaque; private key never leaves the §3.65 boundary); witness_anchor_ref (§3.21.6 key-proof anchor); status: SIGNED } and a KEY_LIFECYCLE Witness event (§6.3). On refuse: SignRefusal { subject_ref; reason_code (typed); no signature emitted } and a VETO_REJECTION Witness event (§6.3, §3.69 deterministic-disposes)."
          invariant: "Single-shot per (deployment_id, subject_ref): at most one SIGNED record per credential subject within a lifecycle epoch (re-signing requires the §3.21 rotation path, a distinct subject epoch). Authority/window consistency: a signature is emitted ONLY when (window=COMMISSIONING and auth_mode=BOUNDED_SELF_CERT) OR (window=OPERATIONAL and auth_mode=QUORUM with a valid quorum_attestation_ref present). No-bypass: coherence_state=PASS AND shadow_state!=CRITICAL AND root_credential_state=VALID are all required; any failure yields a typed refusal (VETO_REJECTION) and NO partial signature. Every request is dispositioned exactly once (SIGNED xor REFUSED). Private key material never appears in any output (only the SEALED handle)."
        errors:
          - "E_AUTH_MODE_WINDOW_MISMATCH — auth_mode inconsistent with the deployment window (e.g. BOUNDED_SELF_CERT outside commissioning, or QUORUM claimed during the bounded window); refuse, no emit, VETO_REJECTION; raise SCHISM-adjacent directive_consistency review"
          - "E_INSUFFICIENT_QUORUM — auth_mode=QUORUM in OPERATIONAL but the Operator + Sovereign Quorum certification per §3.21 / §13.1.3.4 is absent or invalid (quorum_attestation_ref null/unverifiable); refuse, no emit, VETO_REJECTION"
          - "E_NOT_COMMISSIONING_SELF_CERT — bounded self-certification attempted after the §13.0.6 window closed irreversibly (first principal user authentication); refuse, no emit, VETO_REJECTION"
          - "E_COHERENCE_FAIL — §13.1.8 Ring 1-4 self-verification not passing; certification not recognized per §13.0.6 / §13.1.3.4; refuse, no emit, VETO_REJECTION"
          - "E_SHADOW_CRITICAL — §13.1.7 directive_consistency_score in CRITICAL band; signing blocked; refuse, no emit, VETO_REJECTION"
          - "E_ROOT_REVOKED — root/session credential invalidated by §13.0.7 REVOKE cascade; signature would be structurally null per §13.0.7.1; refuse, no emit, VETO_REJECTION"
          - "E_ALREADY_SIGNED — subject already holds a SIGNED Sovereign credential for this epoch (single-shot); route to §3.21 rotation instead; refuse, no emit, VETO_REJECTION"
        concurrency:
          idempotency_key: "(deployment_id, subject_ref, credential_payload_hash) — replay of an identical request returns the existing SIGNED record without minting a second signature (single-shot enforced by the processed/signed sets)."
          retry: "Refusals are non-retryable by re-submission alone; the caller must remediate the gated condition (close/open the correct window, supply a valid Operator + Sovereign Quorum certification, restore coherence, clear CRITICAL shadow, or open a fresh root credential) and submit a new lifecycle request. SIGNED is terminal for the epoch."
          ordering: "Strictly serialized per credential subject within the SOVEREIGN persistent substrate; the precondition snapshot (window/auth_mode/quorum/coherence/shadow/root) is evaluated atomically with emission so no interleaving can admit a signature against a state that was true only momentarily."
          locks: "Per-(deployment_id, subject_ref) exclusive lock for the read-precondition-then-sign critical section; the §3.65-boundary signing key is held in the isolated internal IAME key store per §3.21.X.1 and accessed only inside the lock."
        test_vectors:
          - "CTS-SOV-SIGN-01: COMMISSIONING + BOUNDED_SELF_CERT + coherence PASS + shadow OK + root VALID, fresh subject -> SIGNED, SEALED handle + §3.21.6 witness anchor emitted, KEY_LIFECYCLE"
          - "CTS-SOV-SIGN-02: OPERATIONAL + QUORUM (valid Operator + Sovereign Quorum cert) + PASS + OK + VALID, fresh subject -> SIGNED (post-commissioning path), KEY_LIFECYCLE"
          - "CTS-SOV-SIGN-03: OPERATIONAL + BOUNDED_SELF_CERT (self-cert after window close) -> REFUSED E_AUTH_MODE_WINDOW_MISMATCH / E_NOT_COMMISSIONING_SELF_CERT, no emit, VETO_REJECTION"
          - "CTS-SOV-SIGN-04: COMMISSIONING + QUORUM (quorum claimed during bounded window) -> REFUSED E_AUTH_MODE_WINDOW_MISMATCH, no emit, VETO_REJECTION"
          - "CTS-SOV-SIGN-05: OPERATIONAL + QUORUM but quorum_attestation_ref absent/invalid -> REFUSED E_INSUFFICIENT_QUORUM, no emit, VETO_REJECTION"
          - "CTS-SOV-SIGN-06: any window, coherence FAIL -> REFUSED E_COHERENCE_FAIL, VETO_REJECTION"
          - "CTS-SOV-SIGN-07: any window, shadow CRITICAL -> REFUSED E_SHADOW_CRITICAL, VETO_REJECTION"
          - "CTS-SOV-SIGN-08: root REVOKED -> REFUSED E_ROOT_REVOKED (signature structurally null per §13.0.7.1), VETO_REJECTION"
          - "CTS-SOV-SIGN-09: re-sign of an already-SIGNED subject epoch -> REFUSED E_ALREADY_SIGNED (single-shot), VETO_REJECTION"
          - "CTS-SOV-SIGN-10: replay of an identical SIGNED request (same idempotency key) -> same SIGNED record, no second signature minted"
        substrate_interface: "Realizes the §3.65 Cryptographic Boundary: the Sovereign-issued private signing key lives in the structurally-isolated internal IAME key store (§3.21.X.1, FIPS 140-3 L3 floor §3.21.9) inside the seal; the tool consumes a credential pre-image hash and returns only an opaque SEALED signature handle + a §3.21.6 Witness-anchored key proof — the private key never crosses the boundary (modeled as the abstract sigHandles status). Hybrid Ed25519 + ML-DSA-65 internal signing per §3.21.3 Stage 1 / §3.21.X.5 (ML-DSA-family mandatory internal; SLH-DSA prohibited internal). Commissioning-window operation is co-attested by the Substrate Telemetry Authority §3.62.6; outside the window the §13.1.8 Ring 1-4 coherence posture and the Operator + Sovereign Quorum authority per §3.21 / §13.1.3.4 gate the emission. Success emits a KEY_LIFECYCLE Witness record and refusal emits a VETO_REJECTION Witness record to the §6 chain."
        formal_verification: "VERIFIED v2.0"
