          - MEM_PMS_INDUCTION_CANDIDATE
          - VETO_REJECTION
        shadow_relevance: "SOVEREIGN shadow is SCHISM (directive_consistency_score, §13.1.7). SCHISM manifests in induction as inconsistent promotion authorization — conferring a Persistent-Monitor authority whose scope diverges from the standing directive baseline, or ratifying inductions under contradictory tenure/quorum interpretations across candidates. The deterministic ratification gate (a uniform PMS-7 tenure floor + a uniform §3.42 Serious-Quorum requirement applied identically to every candidate, §13.1.5.3 item 3) is the structural defense against SCHISM, so directive consistency over the promotion authority is preserved by construction. A successful induction is witnessed as AUTHORITY_CHANGE (§3.95.7 / §6.3); a refused one as VETO_REJECTION."
        dismissal_trigger: "A candidate-evaluation (PROPOSE half) that resolves to no-promotion yields no call to the deterministic half — the induction is simply not pursued and no AUTHORITY_CHANGE is emitted. At the deterministic ratification boundary, any call failing a precondition is dispositioned as a §3.69 deterministic-disposes rejection emitting VETO_REJECTION with exactly one typed reason (INSUFFICIENT_TENURE / INSUFFICIENT_QUORUM / ALREADY_INDUCTED); the promotion is dismissed without an authority change and the §3.21 signing operation is never reached. Bypass of the §3.42 Serious-Quorum gate is non-conformant per CTS-MEM-PMS-016..020."
        provenance: "Behavior sourced verbatim from §13.1.5.3 Hybrid Tools item 3: Persistent-monitor induction = (inference: candidate evaluation — should this ephemeral expert be promoted?) + (deterministic: `pms.induction.approve_persistent_monitor` emits the signed approval); the deterministic half MUST verify the candidate has accumulated sufficient PMS workflow tenure per PMS-7 before signing. The deterministic RATIFY+EMIT half is FN-064 / §13.1.5.1.10 (PMS Induction Approval). Workflow-Induction promotion is a §3.94 high-stakes operation authored through the §3.42 Serious-Quorum gate (§3.95.5 under P14: an Induced Workflow is a plastic-surface Procedural Memory artifact, not a gradient update). Serious-Quorum composition Four-Eyes N>=2 with the SOVEREIGN as one required principal per §3.94.3. Signing per §3.21 / §3.21.3 (hybrid Ed25519 + ML-DSA-65). Single-shot induction from the one-time Ephemeral-to-Persistent promotion semantics. Typed slots verbatim: kind=PROCESS, class=HYBRID, substrate=HYBRID, authority=SOVEREIGN_CREDENTIAL, paths=[]."
