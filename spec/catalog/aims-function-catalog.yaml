          - "ARCHITECT (authors the Operational Risk annotations carried in the record per §3.93.3)"
          - "ENFORCER (validates Operational Risk annotations per §3.93.3)"
          - "Witness Layer per §6"
        consensus_role: >-
          Deterministic signing half of the §13.1.5.3.2 Source-Ecosystem-registration hybrid (hybrid
          tool 2): emits one signed registration record AFTER the inference half's trust assessment is
          verified against the Egalitarian Ingress Trust Class rule (SKI-3.2 / §3.93.3) and the Four-Eyes
          composition (SOVEREIGN + an Operator with cross-ecosystem authority) is confirmed per §3.42.
          Four-Eyes here is the §3.42 Serious-Quorum-with-N=2 specialization (two distinct approving
          principals, SOVEREIGN as one), NOT a full N-member Critical Quorum. A two-principal Four-Eyes
          input is REQUIRED; a missing or non-distinct pair yields a typed deterministic refusal
          (FOUR_EYES_INCOMPLETE), Witness-recorded as VETO_REJECTION, never a signed record.
        witness_events:
          - AUTHORITY_CHANGE
          - VETO_REJECTION
        shadow_relevance: >-
          SOVEREIGN shadow is SCHISM (metric directive_consistency_score, §3.16 line 3309): the failure
          mode is the Sovereign authorizing a trust posture inconsistent with the deployment's uniform
          external-trust directive. Registering an external Source Ecosystem above the uniformly-low
          Ingress Trust Class (perceived-quality discrimination, non-conformant per §3.93.3), or letting a
          single principal set ingress trust by bypassing the §3.42 Four-Eyes pair, are the SCHISM
          surfaces. The deterministic SKI-3.2 egalitarian-trust-class gate + the §3.42 Four-Eyes gate are
          the no-schism guardrails; a refused attempt is Witness-recorded as VETO_REJECTION and surfaces as
          a directive_consistency_score delta.
        dismissal_trigger: >-
          Per §3.42.1 Structured Dismissal Protocol applied to the Four-Eyes pair: a principal's approving
          signature is refused / not solicited when the convening no longer justifies its participation or
          at quorum dissolution. A registration attempt is itself refused (deterministic dispose, §3.69 →
          VETO_REJECTION) when it asserts an Ingress Trust Class above the uniformly-low external default
          (§3.93.3), lacks the §3.42 Four-Eyes pair (SOVEREIGN + cross-ecosystem Operator), targets a Native
          taxonomy class (Native enters via §3.95.4 Skill Authoring, never the Ingress Pipeline per §3.93.3),
          or re-registers an already-registered ecosystem identity (reclassification is the distinct
          ski.source_ecosystem.reclassify per §3.93.3).
