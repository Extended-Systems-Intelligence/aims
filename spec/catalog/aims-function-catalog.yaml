          Source behavior verbatim from §13.1.5.1 Deterministic Tools tool 7 (:
          "ski.source_ecosystem.register — emits a signed Source Ecosystem registration record")
          + §13.1.5.3 Hybrid Tools tool 2 (: deterministic half emits the signed record after
          verifying the inference-half trust assessment against the Egalitarian Ingress Trust Class rule
          per SKI-3.2) + §3.93.3 Source Ecosystem Classification and Taxonomy (: registration MUST
          require Four-Eyes per §3.42 composed of the SOVEREIGN and an Operator with cross-ecosystem
