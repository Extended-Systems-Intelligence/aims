      - id: FN-412
        name: "Aux-Router available-model register maintenance"
        tool_ref: "auxrouter.register.maintain"
        kind: TOOL
        class: DETERMINISTIC
        substrate: PERSISTENT_SUBSTRATE
        authority: STANDING
        paths: []
        status: ACTIVE
        ver: "2.0"
        sec_ref:
          - "§3.X.AUXROUTER"
          - "§3.118"
          - "§13.10"
          - "§3.22"
          - "§3.17.13"
          - "§3.17.13.2"
        # ---- 9 queryable attributes ----
        counterparties:
          - "ENFORCER (§3.17.13 registry-of-record) — the available-model register syncs-with and never replaces the ENF registry-of-record; ENF approval is the eligibility ground truth FN-413 reads"
          - "PROVIDER (§3.17.13.2 discovery) — the source of advertised capability cards + pricing the register ingests"
          - "auxrouter.invoke.dispatch (FN-413) — consumes the register's {model x endpoint x capabilities x cost} rows as the candidate set for the deterministic eligibility gate"
          - "Witness Layer (§6 hash-chain anchor)"
        consensus_role: "NONE — the EXECUTOR Aux-Router maintains the durable available-model register (the working catalog of unbound candidate endpoints {model x endpoint x capabilities x cost}); a deterministic refresh that syncs-with the §3.17.13 ENF registry-of-record (never replaces it) and ingests §3.17.13.2 PROVIDER-advertised capability cards + pricing."
        witness_events:
          - AUXROUTER_REGISTER_REFRESHED
          - VETO_REJECTION
        shadow_relevance: "ILLUSION (the EXECUTOR's behavioral shadow per §3.16; catalog metric deep_validation_failure_rate). The failure mode is a register row that diverges from the §3.17.13 ENF registry-of-record (a stale or fabricated endpoint admitted into the candidate set). The structural guard is the ENF-sync precondition (the register syncs-with, never replaces, the registry-of-record); a row that is not ENF-reconciled is a §3.69 VETO_REJECTION. Per §3.18 Deterministic Shadow Governance, detection runs on this deterministic substrate event."
        dismissal_trigger: "Refusal (typed reason) on any unmet precondition, emitting VETO_REJECTION per §3.69.4: the refresh source is not reconciled against the §3.17.13 ENF registry-of-record (REGISTRY_DESYNC), or an advertised capability card / pricing record is malformed (CAPABILITY_CARD_MALFORMED). No autonomous remediation; the prior committed register is retained."
        provenance: "§13.10 EXECUTOR Tools (Deterministic) — `auxrouter.register.maintain` (/ §3.X.AUXROUTER F1, Phase-D D3); the durable available-model register of unbound candidate endpoints, distinct from the §3.22 bound-Auxiliary registry. witness_events = ['AUXROUTER_REGISTER_REFRESHED', 'VETO_REJECTION']."
        credential_refs: []
        emit_class: AUXROUTER_REGISTER_REFRESHED
        conformance_refs:
          - "§3.118.8 conformance (CTS-AUXROUTER-001..006 register / ENF-sync)"
          - "§3.70 Formal-Verification Requirement (DETERMINISTIC item; machine-checked model)"
          - "§4.8 conformance claim format"
        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [refresh_source, registry_of_record_reconciled]
            properties:
              refresh_source:
                type: object
                description: "The refresh input: §3.17.13.2 PROVIDER-advertised capability cards + pricing for candidate endpoints."
                required: [capability_card_wellformed]
                properties:
                  capability_card_wellformed: { type: boolean, description: "Whether every advertised {model x endpoint x capabilities x cost} card is well-formed." }
              registry_of_record_reconciled: { type: boolean, description: "Whether the refresh source is reconciled against the §3.17.13 ENF registry-of-record (the register syncs-with, never replaces, the registry-of-record)." }
          out:
            type: object
            description: "On success: the durable available-model register refreshed and ENF-synced."
            required: [status, witness_id]
            properties:
              status: { type: string, enum: [REFRESHED, REFUSED] }
              refusal_reason: { type: string, enum: [REGISTRY_DESYNC, CAPABILITY_CARD_MALFORMED], description: "Present only when status=REFUSED." }
              witness_id: { type: string, description: "§6 anchor: AUXROUTER_REGISTER_REFRESHED on success, VETO_REJECTION on refusal." }
          invariant: "The register is refreshed ONLY when (a) the refresh source is reconciled against the §3.17.13 ENF registry-of-record and (b) every advertised capability card is well-formed. A call refreshes XOR is refused with exactly one typed reason (no-bypass per §3.69). The register syncs-with the registry-of-record and NEVER replaces it; no endpoint absent from / unapproved by the ENF registry-of-record is admitted to the candidate set."
        errors:
          - "REGISTRY_DESYNC — the refresh source is not reconciled against the §3.17.13 ENF registry-of-record. Refuse; emit VETO_REJECTION; retain the prior committed register (the register may never diverge from the registry-of-record)."
          - "CAPABILITY_CARD_MALFORMED — an advertised capability card / pricing record is malformed. Refuse; emit VETO_REJECTION; no row admitted."
        concurrency:
          idempotency_key: "(refresh_source hash) — the refresh is deterministic over the source + the reconciled registry-of-record snapshot."
          retry: "Safe to retry on transient failure; refusals are deterministic given identical input."
          ordering: "The §6 AUXROUTER_REGISTER_REFRESHED entry is appended before the refreshed register is observable to auxrouter.invoke.dispatch (FN-413)."
          locks: "Register single-writer lock serializes concurrent refresh attempts."
        test_vectors:
          - "CTS-AUXROUTER-FN412-01: ENF-reconciled source + well-formed capability cards -> status=REFRESHED, AUXROUTER_REGISTER_REFRESHED."
          - "CTS-AUXROUTER-FN412-02: source not reconciled against the §3.17.13 registry-of-record -> status=REFUSED, refusal_reason=REGISTRY_DESYNC, VETO_REJECTION (sync-with, never replace)."
