          The LLM-driven clarification dialogue transforms the principal's natural-language intent into a structured directive form (§13.0.3.1) — this codified directive is a PROPOSAL, not a committed authority-bearing emission.
          Per §3.69 Deterministic Ratification (LLM proposes, deterministic disposes), this is the inference/PROPOSE half: its codified intent is confirmed downstream via the §13.0.3 user-CONFIRMED termination (recorded in the Witness Layer with the user's session-credential signature) and the §14 Authority Cascade — concretely, the §13.1.5.3.5 hybrid Authority Transfer whose deterministic half (authority.transfer_to_orchestrator, FN-065) ratifies plan-intent consistency against this codified intent and emits the signed AUTHORITY_TRANSFER.
