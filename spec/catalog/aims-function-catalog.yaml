          - "CTS-SOV-FN061-02 — single-shot: re-register an already-registered ecosystem_id ⇒ ECOSYSTEM_ALREADY_REGISTERED refusal + VETO_REJECTION, no second record."
          - "CTS-SOV-FN061-03 — egalitarian gate: external ecosystem submitted with an elevated trust class ⇒ TRUST_CLASS_NOT_EGALITARIAN refusal + VETO_REJECTION, no signing."
          - "CTS-SOV-FN061-04 — Four-Eyes gate: SOVEREIGN signature only, no cross-ecosystem Operator ⇒ FOUR_EYES_INCOMPLETE refusal + VETO_REJECTION."
          - "CTS-SOV-FN061-05 — taxonomy gate: Native taxonomy_class ⇒ NATIVE_NOT_REGISTRABLE refusal + VETO_REJECTION."
          - "CTS-SOV-FN061-06 — legacy tier: LEGACY_NATIVE at one tier above the external default with a complete Four-Eyes pair ⇒ registration_record emitted + AUTHORITY_CHANGE (the §3.93.3 LEGACY_NATIVE exception)."
        substrate_interface: >-
          §3.65 boundary: the tool executes inside the SOVEREIGN PERSISTENT_SUBSTRATE (INTERNAL_ENCLAVE
          custody of the §3.21 signing key). Private key material never crosses the §3.65 boundary — signing
          is performed inside the sealed substrate and only the signature bytes + the registration record +
