          - "TRUST_CLASS_NOT_EGALITARIAN — assigned_ingress_trust_class exceeds the uniformly-low external default (perceived-quality discrimination, non-conformant per §3.93.3 / SKI-3.2); refuse before signing, emit VETO_REJECTION."
          - "FOUR_EYES_INCOMPLETE — missing or non-distinct §3.42 Four-Eyes pair (SOVEREIGN + cross-ecosystem Operator) per §3.93.3; refuse, emit VETO_REJECTION, no signature."
          - "NATIVE_NOT_REGISTRABLE — taxonomy_class is Native (Native enters via §3.95.4 Skill Authoring, never the Ingress Pipeline per §3.93.3); refuse, emit VETO_REJECTION."
          - "MALFORMED_RECORD — missing a §3.93.3 required field (ecosystem identity, maintainer, risk annotation, attestation mechanisms, signatures); refuse with the missing-field set, emit VETO_REJECTION."
          - "Handling: all errors are total deterministic refusals (§3.69 deterministic-disposes) with a typed reason code; the refusal is Witness-recorded as VETO_REJECTION; no partial or unsigned-but-emitted state is reachable."
        concurrency:
