        # ---- 9 queryable attributes ----
        counterparties:
          - "ENFORCER (scope validation of the certification against the candidate's archetype-derived capability envelope per §3.99.3 — tms.certification is signed by SOVEREIGN, scope-validated by ENFORCER per §3.99.8)"
          - "RELAY (certification audit-trail maintenance per §3.99.3)"
          - "§3.42 Serious-Quorum approving principals (N=2, with the SOVEREIGN as one of the two principals per §3.94.3 / §13.1.5.1 tool 4 quorum.sign_serious_quorum; the quorum attestation is consumed as a signed precondition input)"
          - "candidate agent being certified (subject of the grant — an Ephemeral Expert approved for Persistent Monitor induction)"
          - "Witness Layer (§6 hash-chain anchor)"
        consensus_role: "SERIOUS_QUORUM (N=2) — per §3.94.3 TMS certification of a Persistent Monitor is a §3.94 high-stakes AIMS-MEM operation that routes through §3.42 Quorum Consensus at the Serious-Quorum tier (Four-Eyes Multi-Sig = Serious-Quorum-with-N=2 specialization), with the SOVEREIGN as one of the two approving principals. The deterministic emission consumes a valid §3.42 Serious-Quorum attestation as a hard precondition; absent or insufficient quorum, the grant is refused (INSUFFICIENT_QUORUM). This tool does NOT claim 'no quorum required'. ENFORCER scope-validation (§3.99.3) is an additional independent check, not a substitute for the quorum gate."
        witness_events:
          - AUTHORITY_CHANGE
          - VETO_REJECTION
        shadow_relevance: "SCHISM (SOVEREIGN shadow): the failure mode is directive inconsistency — certification grants issued whose delegated scope is inconsistent with prior directives or the candidate's archetype-derived capability envelope, or grants issued without the required §3.42 Serious-Quorum approval, fracturing the single authority line directive_consistency_score tracks. The structural guards are the quorum precondition (no grant without a valid §3.42 Serious-Quorum attestation, SOVEREIGN one principal), the single-shot gate (at most one ACTIVE certification per candidate), and ENFORCER scope-validation (§3.99.3). A bypass attempt is dispositioned as a §3.69 deterministic-disposes rejection (VETO_REJECTION), never a silently-emitted conflicting signed record."
        dismissal_trigger: "Refusal (typed reason, no signed grant record produced) on any unmet precondition, emitting VETO_REJECTION per §3.69: missing or insufficient §3.42 Serious-Quorum attestation (INSUFFICIENT_QUORUM), candidate already certified (ALREADY_CERTIFIED), no prior induction approval (NOT_INDUCTION_APPROVED), invalid Sovereign credential (INVALID_SOVEREIGN_CREDENTIAL), or requested scope exceeds the candidate's capability envelope (SCOPE_EXCEEDS_CAPABILITY_ENVELOPE per ENFORCER §3.99.3). No autonomous remediation; the uncertified candidate state is preserved. The granted certification is later ended out-of-band by tms.revocation.declare (FN-056), not by dismissal of this tool."
        provenance: "§13.1.5.1 Deterministic Tools item 1 (`tms.certification.grant_persistent_monitor` — issues a TMS certification grant; signs with Sovereign-issued credential); typed slots verbatim; behavioral grounding §3.99.3 (Archetype Ownership Mapping — Certification of Persistent Monitors) + §3.99.4 (Tool Inventory: 'Certify Persistent Monitor scope', SOVEREIGN, CRUD) + §3.99.8 (conformance: certifications signed by SOVEREIGN, scope-validated by ENFORCER) + §3.99.9 (Witness Layer Integration: AUTHORITY_CHANGE for certification grants). Quorum precondition grounding: §3.94.3 (TMS certification of Persistent Monitors routes through §3.42 Quorum; Four-Eyes = Serious-Quorum-with-N=2)."
        credential_refs:
