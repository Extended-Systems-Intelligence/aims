          Runs as an EPHEMERAL_INFERENCE workload (endpoint_class EPHEMERAL_INFERENCE_WORKLOAD) bounded to the operating context of one directive decomposition, dispatched by the ARCHITECT persistent substrate within the directive-bounded inference workload (§13.3.3.2; spawns §14 Phase 2, performs M-Constraining decomposition §14 Phase 3, occupies one slot of the per-node 3-cap). The workload sees ONLY the inbound directive and its session context and NEVER credential or key material: per §3.69.3 no LLM-class component holds signing keys, and per §3.65 the Cryptographic Boundary is the boundary key material MUST NOT cross (§3.66 enclave isolation; the inferential workload cannot reach the internal_enclave).
