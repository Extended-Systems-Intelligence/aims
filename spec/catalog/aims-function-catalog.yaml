        # ---- 5 buildability fields ----
        io_contract:
          in:
            type: object
            required: [entity_id]
            properties:
              entity_id:
                type: string
                description: "The dispatchable entity's identifier in the §3.66.7 Names Registry whose ACTIVE CIPR entry's canonical hash is requested. Modeled as KNOWN_ACTIVE (an ACTIVE CIPR entry exists for it) | NOT_FOUND (no ACTIVE entry) at the formal layer per §3.56.1.3.1 ACTIVE state."
          out:
            type: object
            description: "On found: the canonical content_hash of the ACTIVE CIPR entry for entity_id. On not-found: a typed NOT_FOUND disposition. No state change on any path; no Witness emission (read-only deterministic substrate operation per §3.66.7.4 / §3.66.7.5)."
            required: [status]
            properties:
              status:
                type: string
                enum: [FOUND, NOT_FOUND]
                description: "FOUND when an ACTIVE CIPR entry exists for entity_id; NOT_FOUND otherwise (the typed lookup-miss return per §3.66.7.6 N1; NOT a refusal, NOT a Witness event)."
              canonical_hash:
                type: string
                description: "The SHA-256 hex digest (64 chars; sha256, locked for v2.0 per §3.56.1.3.1) of the ACTIVE CIPR entry's canonical prompt content. Present only when status=FOUND. Plain digest — not key material; crosses the §3.65 boundary freely."
              cache_freshness:
                type: string
                enum: [LOCAL_CACHE_FRESH, CANONICAL_STORE]
                description: "Resolution source per §3.66.7.3.2: LOCAL_CACHE_FRESH if the read-only cache is within the PT1S staleness bound, else CANONICAL_STORE (queried the Sovereign-owned canonical store via §3.20 DCP). Informational; does not change the returned hash."
          invariant: "Read-only and total: every call returns exactly one of FOUND (with the canonical_hash of the entity's ACTIVE CIPR entry) XOR NOT_FOUND (no ACTIVE entry for entity_id), never both and never neither; the call mutates no state (registered set, entry hashes, Witness chain all UNCHANGED on every path); FOUND is returned IFF an ACTIVE CIPR entry exists for entity_id, and the returned hash is exactly that entry's content_hash (no fabricated or substituted digest); NO Witness event is emitted on any path (non-authority-bearing read per §3.66.7.4 / §3.66.7.5)."
        errors:
          - "NOT_FOUND — no ACTIVE CIPR entry resolves for entity_id (§3.66.7.6 failure mode N1 lookup-miss). Return status=NOT_FOUND as a normal typed value; this is NOT a refusal and emits NO Witness event. Per N1 the caller MUST NOT proceed with an unresolved entity — at §3.56.1.4 dispatch time a NOT_FOUND maps to the dispatcher's F2 missing-registry-entry handling (§3.56.1.6), which the dispatch path (not this read) dispositions."
          - "STALE_CACHE (handled, not surfaced) — if the local read-only cache exceeds the PT1S staleness bound (§3.66.7.6 N2), the tool forces a fresh signed-snapshot fetch from the Sovereign substrate before serving, then returns FOUND/NOT_FOUND against the fresh snapshot; reported via cache_freshness=CANONICAL_STORE. No error is surfaced to the caller."
          - "CANONICAL_STORE_UNREACHABLE — on a cache miss/stale path, the Sovereign-owned canonical store is unreachable via §3.20 DCP (cf. §3.66.7.6 N5 federation-lookup-failure). Surface a transient resolution failure to the caller scoped to the local deployment; do NOT silently return a fabricated or absent hash and do NOT assume the entity is globally absent. No state change; no Witness event."
        concurrency:
          idempotency_key: "entity_id — pure read; repeated reads of the same entity_id at the same registry version return the identical FOUND+canonical_hash (or NOT_FOUND). No side effects, no idempotency record needed."
          retry: "Always safe to retry: the operation is read-only and side-effect-free. A retry after a transient CANONICAL_STORE_UNREACHABLE resolves to FOUND/NOT_FOUND once the §3.20 DCP path recovers; a retry may observe a newer registry version if a concurrent CIPR mutation committed between calls (the read reflects the latest visible ACTIVE entry, never a torn read)."
          ordering: "No ordering anchor — the read takes no Witness commit and participates in no transaction. It observes the latest committed ACTIVE CIPR entry visible to its resolution source (local cache within PT1S, else canonical store); concurrent CIPR mutations (register/update/deprecate/retire) are linearized by their own tools, and this read sees a consistent snapshot per the §3.66.7.3.2 signed-snapshot consistency rules."
          locks: "None acquired — read-only against the Sovereign-owned canonical store or a peer read-only cache (§3.66.7.3.2). No writer lock; the canonical store's single-writer discipline (held by the CIPR mutation tools) guarantees the read observes a consistent ACTIVE entry, not a partial write."
