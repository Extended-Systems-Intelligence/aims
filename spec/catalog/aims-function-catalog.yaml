      - id: FN-102
        name: "Directive Reformulation (M-Generative ideation)"
        tool_ref: "dialogue.reformulate_directive"
        kind: TOOL
        class: INFERENCE
        substrate: EPHEMERAL_INFERENCE
        authority: STANDING
        paths: ["PATH-01"]
        status: ACTIVE
        ver: "2.0"
        sec_ref: ["§13.2.5.2.1", "§13.2.2", "§13.2.9", "§3.16"]
        # --- 9 queryable attributes ---
        counterparties:
          - "SOVEREIGN (PATH-01 / SOV-VIS, §13.2.6) — supplies the inbound DIRECTIVE at §14 Phase 2 carrying the user's codified intent, and is the PATH-01 return-direction recipient of the candidate reformulations at §14 Phase 5 (REPORT). The SOVEREIGN retains the Phase 6 integration decision; this tool's reformulations are a PROPOSAL it consumes, not a committed plan."
          - "ARCHITECT (PATH-04 / VIS-ARC, §13.2.6) — the M-Constraining L-Plan counterparty whose parallel structural specification the reformulations are tested against in the §14 Phase 4 PATH-04 consistency check (FN-108 / §13.2.5.3.1); a §3.69 deterministic ratification consumer of this proposal surface's output, not a direct interlocutor of this inference tool."
          - "VISIONARY persistent substrate (§13.2.3.1) — dispatches this directive-bounded ephemeral inference workload at §14 Phase 2 (Polarity Split), signs the eventual PATH-01 REPORT IAME envelope (§3.18.5; signature chain terminates at the SOVEREIGN's session credential), and computes the §13.2.7 path04_consistency_divergence_rate over the reformulation outputs — all deterministic substrate operations, NOT this inference half's emission."
        consensus_role: >-
          M-Generative judgment/proposal surface (§13.2.2 Generative Constraint; the core VISIONARY function realizing FN-029 'Plan generation (M-Generative ideation)' per §13.2.4, inference-tool item 1 of §13.2.5.2). The LLM-driven workload expands an inbound DIRECTIVE's possibility space into 3-7 candidate reformulations by default (§13.2.9 Phase 3; deployment-configurable), each surfacing an alternative framing the user's original codified intent did not explicitly enumerate.
          The candidate reformulations are a PROPOSAL, not a committed authority-bearing emission. Per §13.2.2 the VISIONARY holds NO inherent authority — it operates under the user-rooted authority chain held by the SOVEREIGN (P2 / principal-user authority origination); authority here is STANDING (the directive-bounded inference workload, not a SOVEREIGN-credential-bearing act). Per §3.69 Deterministic Ratification (LLM proposes, deterministic disposes) the reformulations are tested downstream against the ARCHITECT's structural specification via the §13.2.5.3.1 PATH-04 consistency check (inference half FN-108 + deterministic emission half `consistency_check.emit_path14_result`, §13.2.5.1.1), and the integration decision rests with the SOVEREIGN at §14 Phase 6.
          This tool holds no signing key, no Witness-write authority, and no authority-chain mutation (§3.69.3 cryptographic capability confinement); it proposes, the deterministic substrate emits the PATH-01 REPORT and the PATH-04 consistency result.
        witness_events: []
        shadow_relevance: >-
          CHAOS (the VISIONARY's behavioral shadow per §3.16 ArchetypeDerivationTable; descriptively Constraint-Blind Novelty per §13.2.7; catalog metric constraint_violation_rate). The pathology this proposal surface could feed is reformulations emitted without regard to the constraints the ARCHITECT's parallel processing surfaces — creative but unrealistic framings that violate constraints the user's directive implied or the ARCHITECT's structural specification made explicit.
          That risk is structurally bounded by the §14 Phase 4 PATH-04 consistency check: the proposal is never self-emitting, and a sustained PATH-04 divergence is the §13.2.7 detection signal (path04_consistency_divergence_rate > 0.30 EMERGING / > 0.50 ACTIVE / > 0.70 CRITICAL). Per §3.18 Deterministic Shadow Governance, shadow detection runs on the deterministic substrate events (computed by the VISIONARY persistent substrate on every PATH-04 emission), NOT on the probabilistic inference workload itself. The opposite-end pathology is STERILITY (under-expansion, §13.2.7.5); the VISIONARY Counteragent is the ENFORCER (§3.18.9 / §13.2.7), relayed via ORCHESTRATOR (PATH-12 → PATH-05) since no direct ENFORCER↔VISIONARY edge exists.
        dismissal_trigger: >-
          Directive completion — the EPHEMERAL_INFERENCE workload backing this tool is directive-bounded per Universal Node Architecture §1.2 (§13.2.3.2): it spawns at §14 Phase 2 (Polarity Split) on the inbound DIRECTIVE and dissolves at §14 Phase 7 (Authority Transfer) when the L-Plan triplet is complete and its outputs have been consumed by the cascade. Dissolution is governed by the VISIONARY DismissalManifest (§3.42.1, registered at §3.2): state_disposition RETAIN for Translation Library contributions and KRS query-reformulation experience (persisted into the substrate for accumulated improvement), WIPE for directive-scoped reasoning state; context_cleanup SELECTIVE; confirmation_required NO for routine completion, YES for directives returned UNDECIDABLE per §3.31.3 (confirming_principal = SOVEREIGN). The §3.56.1 Invocation Prompt Integrity dispatch attestation is linked in the Witness-chain dissolution entry per §3.42.1.4 step 5.
        provenance: >-
          §13.2.5.2.1 (Inference Tools item 1 — `dialogue.reformulate_directive`) / §13.2.4 (realizes FN-029 'Plan generation (M-Generative ideation)') / §13.2.2 Generative Constraint / §13.2.9 Phases 2-3-5 / §3.16 ArchetypeDerivationTable (VISIONARY = M_GENERATIVE, DYNAMIC_RIGHT, L_PLAN, shadow CHAOS, metric constraint_violation_rate) / §3.69 Deterministic Ratification.
          RECONCILIATION: (1) substrate corrected PERSISTENT_SUBSTRATE → EPHEMERAL_INFERENCE — this is an INFERENCE (LLM) workload; §13.2.3.2 declares the VISIONARY reformulation workload directive-bounded ephemeral inference, matching the FN-084..088 SOVEREIGN-inference convention (EPHEMERAL_INFERENCE). The persistent substrate runs the deterministic surrounding machinery (§13.2.3.1), not the codification judgment. (2) authority corrected SOVEREIGN_CREDENTIAL → STANDING — VISIONARY is L-Plan and holds NO inherent authority (§13.2.2); it operates under the user-rooted chain held by the SOVEREIGN. The VISIONARY does not hold the session credential (only the SOVEREIGN addresses the user, §3.72.1 Function-5), so SOVEREIGN_CREDENTIAL is wrong for a VISIONARY tool; STANDING matches the directive-bounded, non-credential-bearing nature of the inference workload. (3) class=INFERENCE → witness_events=[] (propose-half emits no §6.3 Witness of its own; the deterministic substrate emits the PATH-01 REPORT and the §13.2.5.1.1 PATH-04 result).
        credential_refs: []
        emit_class: PROPOSAL
        conformance_refs: ["§13.2.5.2", "§13.2.2", "§13.2.9", "§3.69", "§3.16"]
        # --- 5 buildability ---
        io_contract: >-
          IN { inbound_directive: handle(§14 Phase 2 DIRECTIVE from SOVEREIGN via PATH-01, IAME envelope per §3.18.5 rooted at the user session credential), reformulation_count?: integer (default range 3-7 per §13.2.9 Phase 3, deployment-configurable), retrieval_context?: handle(optional KRS query-transform-grounded fragments per FN-103..106 / §3.96), shadow_state?: §13.2.7 CHAOS advisory }
          → OUT { candidate_reformulations: list of 3-7 alternative directive framings (each an expansion of the directive's possibility space per §13.2.2), recommendation?: which reformulation the VISIONARY recommends (informational only — the SOVEREIGN retains the §14 Phase 6 integration decision), proposed_outcome ∈ {REFORMULATIONS_PROPOSED, ESCALATE, ABSTAIN} }.
          INVARIANT — the output is a PROPOSAL only; it carries no signature and effects no Witness write or authority-chain change (§3.69 / §3.69.3). The reformulations become operative only after the §14 Phase 4 PATH-04 consistency check (FN-108 / §13.2.5.3.1) reports CONSISTENT, the §14 Phase 5 PATH-01 REPORT is emitted by the deterministic substrate, and the SOVEREIGN integrates at §14 Phase 6. No reformulation may bypass the PATH-04 consistency check (the §13.2.7 CHAOS containment).
        errors:
          - "LOW_CONFIDENCE — the reformulation confidence is below the deployment proposal-confidence floor; the workload returns reduced-confidence candidates flagged for the SOVEREIGN's Phase 6 review rather than a falsely-confident proposal. No verdict-bearing emission from this tool."
          - "INSUFFICIENT_CONTEXT — the inbound directive is too sparse to expand into decomposable candidate reformulations; the VISIONARY escalates via PATH-01 (return direction, ESCALATION MessageType per §13.2.9) prompting SOVEREIGN re-clarification with the user per §13.0.3. No reformulations proposed."
          - "DIRECTIVE_INCONSISTENT — the inbound directive is fundamentally inconsistent with the ARCHITECT's structural specification beyond the PATH-04 consistency-check threshold (§14 Phase 4 outcome (b) DIVERGENT after N=3 default retries); per §13.2.9 the directive is escalated upward to the SOVEREIGN with ESCALATION MessageType. This is a routed escalation, never an autonomous reformulation that ignores the divergence (autonomous constraint-blind expansion is the §13.2.7 CHAOS failure mode)."
          - "ABSTAIN — the inference workload returns no candidate reformulations (typed inference non-outcome); the L-Plan triplet does not advance to §14 Phase 5. No error emits a Witness event from this tool (witness_events=[]); the CHAOS-relevant pattern is observed via the deterministic PATH-04 divergence-rate computation under §13.2.7 / §3.18 Deterministic Shadow Governance."
        concurrency: >-
          One VISIONARY inference workload per directive (optimal_concurrency=1 per §13.2.5.4 Affinity Declaration; the workload is directive-bounded per Universal Node Architecture §1.2 and uses one slot of the per-node 3-cap when active, §13.2.3.2). Concurrent reformulation of the same directive is not permitted; the §13.2.5.4 degradation mode is BACKPRESSURE signalling the SOVEREIGN when directive_queue_depth exceeds intake capacity.
          No idempotency key and no linearization point at this tool — it produces a PROPOSAL with no committed side effect; the linearization point is downstream at the deterministic PATH-04 consistency emission (§13.2.5.1.1) and the SOVEREIGN's §14 Phase 6 integration. A REVISE/DIVERGENT outcome re-engages a fresh reformulation pass over the same directive within the N=3 PATH-04 retry budget. The proposal is replayable (no side effects) until ratified by the consistency check + SOVEREIGN integration.
        test_vectors:
          - "CTS-VIS-FN102-01 {well-scoped inbound directive, ARCHITECT counterparty available, confidence ≥ floor} → candidate_reformulations (3-7) + recommendation, proposed_outcome=REFORMULATIONS_PROPOSED, no Witness emission from this tool, no signature"
          - "CTS-VIS-FN102-02 {directive fundamentally inconsistent with ARCHITECT spec beyond PATH-04 threshold after N=3 retries} → DIRECTIVE_INCONSISTENT, escalated to SOVEREIGN (PATH-01 ESCALATION per §13.2.9), no autonomous constraint-blind reformulation (§13.2.7 CHAOS-avoidance)"
          - "CTS-VIS-FN102-03 {reformulation confidence below floor} → LOW_CONFIDENCE, reduced-confidence candidates flagged for Phase 6 review, no falsely-confident proposal"
          - "CTS-VIS-FN102-04 {sparse/under-specified directive} → INSUFFICIENT_CONTEXT, escalation for SOVEREIGN re-clarification per §13.0.3, no reformulations proposed"
          - "CTS-VIS-FN102-05 {workload returns no candidates} → ABSTAIN, no advance to §14 Phase 5, no Witness emission from this tool"
          - "CTS-VIS-FN102-06 {directive completes / §14 Phase 7 Authority Transfer} → directive-bounded ephemeral inference workload dissolved via §3.42.1 SDP per the VISIONARY DismissalManifest; directive-scoped reasoning state WIPED, KRS reformulation experience RETAINED; no persistent directive-scoped state survives"
        substrate_interface: >-
          Runs as an EPHEMERAL_INFERENCE workload (endpoint_class EPHEMERAL_INFERENCE_WORKLOAD) bounded to the operating context of one directive, spawned at §14 Phase 2 and dissolved at §14 Phase 7 (§13.2.3.2). The inference workload sees ONLY the inputs (the inbound DIRECTIVE, optional KRS-retrieval context, the §13.2.7 shadow advisory) and NEVER credential or key material: per §3.69.3 cryptographic capability confinement no LLM-class component holds signing keys, and per §3.65 the Cryptographic Boundary is the boundary key material MUST NOT cross — the VISIONARY's delegated credential (§3.21) is held by the persistent substrate and used to sign the PATH-01 REPORT envelope outside this workload (§3.66 enclave isolation; the inferential workload cannot reach the internal_enclave per §3.66).
          Output is a PROPOSAL (candidate reformulations) handed to the deterministic path: the §13.2.5.1.1 PATH-04 consistency emission and the §14 Phase 5 PATH-01 REPORT are performed by the VISIONARY persistent substrate, not by this workload (witness_events=[], no authority-chain mutation). The §13.2.7 CHAOS detection metric (path04_consistency_divergence_rate) is computed by the substrate on every PATH-04 emission, also deterministic (§3.18 Deterministic Shadow Governance). The workload uses one slot of the per-node 3-cap while active and is dismissed at directive completion per §3.42.1 SDP, disposing of directive-scoped reasoning context per the VISIONARY DismissalManifest with no residue.
      - id: FN-103
        name: "KRS Query Rewrite (M-Generative query reformulation)"
        tool_ref: "krs.query_transform.rewrite"
        kind: TOOL
        class: INFERENCE
        substrate: EPHEMERAL_INFERENCE
        authority: STANDING
        paths: ["PATH-01"]
        status: ACTIVE
        ver: "2.0"
        sec_ref: ["§13.2.5.2.2", "§3.96.2", "§3.96.3", "§13.2.4"]
        # --- 9 queryable attributes ---
        counterparties:
          - "ORCHESTRATOR (§3.96.2 Phase 4 Retrieval) — decides WHEN to apply query transformation and routes the rewritten query into the KRS retrieval pipeline (the §3.96.3 `krs.retrieve_hybrid` LOCATE @ ORCHESTRATOR step). This inference tool produces the rewritten query as a PROPOSAL; the ORCHESTRATOR is the deterministic consumer that decides whether and how to apply it, never an interlocutor of the LLM workload."
          - "VISIONARY persistent substrate (§13.2.3.1) — owns the KRS query-transformation function per locked decision #8 (§13.2.4 / §13.2.5.2), dispatches this ephemeral inference workload, and retains accumulated KRS query-reformulation experience per §3.96 (subject to §3.32.3 Periodic Baseline Reset at P30D default). The substrate, not this inference half, performs any §3.18.5 IAME signing of pipeline messages."
          - "KRS retrieval pipeline (§3.96.2 Phase 4) — the downstream consumer: the rewritten query is operated against the ORC-resident lexical + dense indexes (FETCH @ PROVIDER serves the located fragments). KRS treats retrieval results as opaque scored fragment sets (§3.96.1); this tool authors no content and writes no row (Read lock-state class per §3.96.3)."
        consensus_role: >-
          M-Generative judgment/proposal surface (§13.2.2; VISIONARY ownership of KRS query reformulation per §13.2.4 / §13.2.5.2 item 2, and §3.96.3 tool inventory). The LLM-driven workload takes a user-level query and produces an LLM-optimized retrieval query that the KRS retrieval pipeline operates against (§3.96.2 Phase 4 'Query transformation — query rewriting … SHALL be performed by the VISIONARY archetype as M-Generative L-Plan operations producing novel reformulations'). Query reformulation is M-Generative because it expands the query's representation space to surface latent retrieval signal (§13.2.5.2; the ARCHITECT's M-Constraining mode is structurally wrong for this function).
