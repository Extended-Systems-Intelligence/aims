    outputs: [marketplace_listing, listing_publication_witness_id]
    witness_emission:
      - MARKETPLACE_LISTING_EVENT
    spec_section: §3.17.11.6
    formal_verification: partial  # schema + signature checks
    adversarial_fuzzing: required

  - id: FN-105
    name: marketplace_listing_state_transition
    archetype: ENFORCER
    class: rigid
    layer: L-Form
    mode: M-Constraining
    description: |
      Apply state machine transition to a Marketplace Listing per §3.17.11.6.
      Transitions: PUBLISHED→UPDATED, PUBLISHED→FLAGGED, FLAGGED→PUBLISHED,
      FLAGGED→REVOKED, PUBLISHED→REVOKED, any→DE_LISTED. Strict transition
      table; non-listed transitions REJECTED. Every transition emits Witness
      record with MARKETPLACE_LISTING_EVENT type and DCP-propagates within
