          - "FEDERATION_LOOKUP_SCOPE (informational) — for a cross-deployment archetype enumeration, a failed §3.20 DCP federation lookup returns the result-set scoped to the local deployment only; the caller MUST NOT assume the archetype is absent globally (§3.66.7.6 N5). Out of this single-deployment read's transactional scope."
        concurrency:
          idempotency_key: "archetype — a pure read; repeated lookups of the same archetype identifier are idempotent and side-effect-free (no registry mutation, no Witness emission). Two concurrent lookups of the same archetype observe the same snapshot-bounded result-set within the PT1S staleness window."
          retry: "Freely retryable: a read has no side effects. A retry resolves to the FOUND result-set (with the then-current snapshot's matching entries) or the empty NOT_FOUND set deterministically given the registry state at read time. On STALE_CACHE the retry path is the same fresh-snapshot fetch; no duplicate side effect is possible (there are none)."
