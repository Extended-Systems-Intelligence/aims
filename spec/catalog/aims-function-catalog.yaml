          non-bypassable from the inference side per §3.69 Deterministic Ratification. Emission and
          refusal each write a §6 Witness chain entry via the substrate witness primitive
          (AUTHORITY_CHANGE on CONTRIBUTED / VETO_REJECTION on REFUSED), per §6.2 WitnessRecord schema.
